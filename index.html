<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f3f1" id="meta-theme-color">
<title>Gestionale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* =====================================================================
     DESIGN SYSTEM — "Gestionale La Strada der Weg"
     Palette neutra e calda, rosso mattone come unico accento.
     Scala di spaziatura 4px, tipografia Inter, ombre morbide a due livelli.
     ===================================================================== */
  :root{
    /* Superfici e struttura */
    --bg:#f4f3f1;
    --surface:#ffffff;
    --surface-2:#faf9f8;
    --bg-soft:#f6f4f2;
    --border:#e7e4df;
    --border-strong:#d9d5cf;

    /* Colori di marca */
    --accent:#c0392f;
    --accent-dark:#96271f;
    --accent-soft:#fbeeec;
    --accent-shadow:rgba(150,39,31,.28);
    --focus-shadow:rgba(192,57,47,.14);

    /* Testo */
    --head:#211f1c;
    --text-main:#33302b;
    --text-muted:#84806f;
    --num-color:#33302b;

    /* Stati */
    --free:#eef6ef;
    --free-border:#d2e6d5;
    --free-text:#2b7a45;
    --busy-bg:#fbefee;
    --busy-border:#f0d2ce;
    --busy-text:#a13d36;
    --danger:#c0392f;
    --now-line:#e11d48;
    --warn-bg:#fdf6e7;
    --warn-text:#96690a;
    --warn-border:#f0dda8;

    /* Elementi secondari */
    --btn-secondary-bg:#f0eeeb;
    --btn-secondary-text:#5b574f;
    --muted-timeline:#84806f;
    --muted-free-label:#4a7a5a;
    --muted-week-time:#84806f;
    --muted-empty:#a8a396;

    /* Compat (usati dal vecchio markup) */
    --page-grad-start:#f4f3f1;
    --page-grad-end:#f4f3f1;
    --shadow-soft:rgba(30,25,20,.06);
    --shadow-strong:rgba(30,25,20,.10);

    /* Scala spaziatura e tipografia */
    --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-8:32px; --sp-10:40px;
    --fs-xs:12px; --fs-sm:13px; --fs-base:14px; --fs-md:15px; --fs-lg:17px; --fs-xl:20px; --fs-2xl:26px;
    --radius-sm:8px; --radius-md:12px; --radius-lg:16px;
    --shadow-card:0 1px 2px rgba(30,25,20,.05), 0 6px 20px -8px rgba(30,25,20,.10);
    --shadow-card-hover:0 2px 4px rgba(30,25,20,.06), 0 12px 28px -10px rgba(30,25,20,.14);
    --shadow-pop:0 24px 60px -12px rgba(30,25,20,.30);
  }

  body.dark-mode{
    --bg:#151412;
    --surface:#1e1c19;
    --surface-2:#242220;
    --bg-soft:#262421;
    --border:#33302b;
    --border-strong:#44403a;

    --accent:#e2594c;
    --accent-dark:#b93a2f;
    --accent-soft:#3a221f;
    --accent-shadow:rgba(0,0,0,.5);
    --focus-shadow:rgba(226,89,76,.18);

    --head:#f2efe9;
    --text-main:#dcd8d0;
    --text-muted:#9a958a;
    --num-color:#dcd8d0;

    --free:#1b2b20;
    --free-border:#2f4d38;
    --free-text:#7fd6a0;
    --busy-bg:#2e1c1a;
    --busy-border:#583029;
    --busy-text:#f0a099;
    --danger:#f07168;
    --now-line:#ff5577;
    --warn-bg:#2c2413;
    --warn-text:#e0b055;
    --warn-border:#57481f;

    --btn-secondary-bg:#2b2925;
    --btn-secondary-text:#cfcac1;
    --muted-timeline:#9a958a;
    --muted-free-label:#7fd6a0;
    --muted-week-time:#9a958a;
    --muted-empty:#767065;

    --page-grad-start:#151412;
    --page-grad-end:#151412;
    --shadow-soft:rgba(0,0,0,.35);
    --shadow-strong:rgba(0,0,0,.5);
    --shadow-card:0 1px 2px rgba(0,0,0,.4), 0 8px 24px -8px rgba(0,0,0,.5);
    --shadow-card-hover:0 2px 4px rgba(0,0,0,.45), 0 14px 32px -10px rgba(0,0,0,.6);
    --shadow-pop:0 24px 60px -12px rgba(0,0,0,.7);
  }
  body.dark-mode{ background:var(--bg); }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{overflow-x:hidden;background:var(--bg);min-height:100%;}
  body{
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-feature-settings:"tnum" 1;
    margin:0;
    background:
      radial-gradient(1100px 700px at 12% -8%, rgba(192,57,47,.07), transparent 55%),
      radial-gradient(900px 700px at 105% 15%, rgba(192,57,47,.05), transparent 55%),
      var(--bg);
    background-attachment:fixed;
    min-height:100vh;min-height:100dvh;color:var(--text-main);
    overscroll-behavior-y:contain;overflow-x:hidden;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  button, input, select, textarea{font-family:inherit;}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important;}
  }

  .app{max-width:900px;width:100%;margin:0 auto;padding:12px;padding-bottom:90px;}
  .main-layout{display:flex;flex-direction:column;}
  .main-col{width:100%;}
  #side-detail-card{margin-bottom:var(--sp-2);}
  .side-card{padding:var(--sp-4);}

  /* ---------- Header ---------- */
  header{
    display:flex;align-items:center;gap:var(--sp-3);
    background:var(--surface);padding:var(--sp-2) var(--sp-4);
    border:1px solid var(--border);border-radius:var(--radius-md);
    box-shadow:var(--shadow-card);margin-bottom:var(--sp-3);
  }
  header img{height:36px;width:auto;border-radius:var(--radius-sm);}
  header h1{
    flex:1;font-size:var(--fs-lg);color:var(--head);margin:0;
    font-weight:700;letter-spacing:-.02em;
  }
  #theme-toggle, #search-toggle, #users-toggle, #announce-toggle{
    border:1px solid var(--border);background:var(--surface);color:var(--head);
    width:38px;height:38px;border-radius:var(--radius-sm);font-size:15px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    transition:background .15s,border-color .15s;position:relative;
  }
  #logout-toggle{
    border:1px solid var(--border);background:var(--surface);color:var(--head);
    height:38px;padding:0 var(--sp-3);border-radius:var(--radius-sm);
    font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:background .15s,border-color .15s;white-space:nowrap;
  }
  #theme-toggle:hover, #search-toggle:hover, #logout-toggle:hover, #users-toggle:hover, #announce-toggle:hover{
    background:var(--bg-soft);border-color:var(--border-strong);
  }
  #search-toggle.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .announce-badge{
    position:absolute;top:-5px;right:-5px;background:var(--danger);color:#fff;font-size:9px;font-weight:800;
    min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;
    border:2px solid var(--surface);
  }
  .profile-badge{
    display:flex;align-items:center;gap:var(--sp-2);background:var(--bg-soft);
    border:1px solid var(--border);border-radius:999px;padding:4px 12px 4px 4px;flex-shrink:0;
  }
  .profile-pic{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--accent);}
  .profile-name{
    font-size:12.5px;font-weight:600;color:var(--head);white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;max-width:110px;
  }
  #logo-img{transition:filter .2s;}
  body.dark-mode #logo-img{filter:invert(1) hue-rotate(160deg) saturate(2.4);mix-blend-mode:screen;}

  .announce-banner{display:none;}

  /* ---------- Ricerca ---------- */
  .search-bar{
    display:flex;align-items:center;gap:var(--sp-2);background:var(--surface);
    border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-2) var(--sp-3);
    margin-bottom:var(--sp-3);box-shadow:var(--shadow-card);
  }
  .search-icon{font-size:14px;flex-shrink:0;opacity:.7;}
  .search-bar input{
    flex:1;border:none;background:transparent;font-size:16px;color:var(--text-main);outline:none;min-width:0;
  }
  .search-bar input::placeholder{color:var(--text-muted);}
  #search-clear{
    border:none;background:var(--bg-soft);color:var(--head);width:26px;height:26px;border-radius:50%;
    cursor:pointer;font-size:12px;flex-shrink:0;
  }
  #search-resource-filter{
    border:1px solid var(--border);background:var(--bg-soft);color:var(--text-main);
    border-radius:var(--radius-sm);padding:6px 8px;font-size:12px;flex-shrink:0;max-width:120px;
  }
  .search-results{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
    box-shadow:var(--shadow-card);margin-bottom:var(--sp-3);max-height:320px;overflow-y:auto;
  }
  .search-result-item{
    padding:var(--sp-3) var(--sp-4);border-bottom:1px solid var(--border);cursor:pointer;
    display:flex;flex-direction:column;gap:2px;transition:background .12s;
  }
  .search-result-item:last-child{border-bottom:none;}
  .search-result-item:hover{background:var(--bg-soft);}
  .search-result-item .sr-label{font-weight:600;color:var(--head);font-size:var(--fs-base);}
  .search-result-item .sr-meta{font-size:var(--fs-xs);color:var(--text-muted);}
  .search-no-results{padding:var(--sp-4);text-align:center;color:var(--text-muted);font-size:var(--fs-sm);}

  /* ---------- Selettore vista ---------- */
  .view-switch{
    display:flex;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-md);padding:4px;gap:4px;
    box-shadow:var(--shadow-card);margin-bottom:var(--sp-3);
  }
  .view-switch button{
    flex:1;min-width:0;border:none;background:transparent;color:var(--text-muted);
    padding:10px 6px;border-radius:var(--radius-sm);font-size:var(--fs-sm);font-weight:600;cursor:pointer;
    transition:background .15s,color .15s;display:flex;align-items:center;justify-content:center;gap:6px;
    overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  }
  .view-switch button i{font-size:16px;flex-shrink:0;}
  .view-switch button.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px var(--accent-shadow);}

  /* ---------- Navigazione data ---------- */
  .date-nav{
    display:flex;align-items:center;justify-content:space-between;gap:var(--sp-2);
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
    padding:6px 8px;margin-bottom:var(--sp-3);box-shadow:var(--shadow-card);
  }
  .date-nav-arrows{display:flex;gap:6px;flex-shrink:0;}
  .date-nav-arrows button{
    border:1px solid var(--border);background:var(--surface);color:var(--head);
    width:36px;height:36px;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:background .15s;
  }
  .date-nav-arrows button:hover{background:var(--bg-soft);}
  .date-nav .date-label{
    font-weight:700;font-size:var(--fs-md);color:var(--head);text-align:center;flex:1;min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.01em;
  }
  .today-text-btn{
    border:1px solid var(--border);background:var(--surface);color:var(--head);
    padding:0 var(--sp-4);height:36px;border-radius:var(--radius-sm);
    font-size:var(--fs-sm);font-weight:600;cursor:pointer;flex-shrink:0;transition:background .15s;
  }
  .today-text-btn:hover{background:var(--bg-soft);}

  /* ---------- Card ---------- */
  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
    box-shadow:var(--shadow-card);overflow:hidden;margin-bottom:var(--sp-3);
  }

  /* ---------- Timeline giornaliera (mega) ---------- */
  .mega-timeline-header{
    padding:var(--sp-3) var(--sp-4);border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;background:var(--surface-2);
  }
  .mega-timeline-title{font-size:var(--fs-sm);font-weight:700;color:var(--head);letter-spacing:-.01em;}
  .mega-timeline-scroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;}
  .mega-timeline-grid{
    display:grid;grid-template-columns:90px repeat(48, minmax(16px, 1fr));min-width:max-content;position:relative;
  }
  .mtl-corner{
    position:sticky;left:0;z-index:3;background:var(--surface);
    border-right:1px solid var(--border-strong);border-bottom:1px solid var(--border);
  }
  .mtl-hour-label{
    text-align:center;font-size:9px;font-weight:600;color:var(--text-muted);padding:6px 0;
    border-bottom:1px solid var(--border);border-right:1px solid var(--border);background:var(--surface-2);
    grid-column:span 2;
  }
  .mtl-res-label{
    position:sticky;left:0;z-index:2;background:var(--surface);
    border-right:1px solid var(--border-strong);border-top:1px solid var(--border);
    padding:var(--sp-2) var(--sp-3);font-size:11px;font-weight:600;color:var(--head);
    display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .mtl-res-label .mtl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .mtl-track{
    position:relative;grid-column:span 48;border-top:1px solid var(--border);height:44px;
    background-image:repeating-linear-gradient(to right, var(--bg-soft) 0, var(--bg-soft) calc(2 * (100% / 48)), var(--surface) calc(2 * (100% / 48)), var(--surface) calc(4 * (100% / 48)));
  }
  .mtl-block{
    position:absolute;top:6px;height:32px;border-radius:6px;color:#fff;font-size:9.5px;font-weight:600;
    padding:3px 7px;overflow:hidden;white-space:nowrap;cursor:pointer;
    box-shadow:0 1px 4px rgba(0,0,0,.22);display:flex;flex-direction:column;justify-content:center;gap:0;
    transition:transform .12s, box-shadow .12s;
  }
  .mtl-block:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,.3);z-index:5;}
  .mtl-block .mtl-block-name{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mtl-block .mtl-block-time{font-size:8px;opacity:.9;}
  .mtl-now-line{position:absolute;top:0;bottom:0;width:2px;background:var(--now-line);z-index:4;pointer-events:none;}
  .mtl-empty{padding:var(--sp-6);text-align:center;color:var(--text-muted);font-size:var(--fs-sm);}

  /* ---------- Toggle pannello giorno (mobile) ---------- */
  .day-view-toggle-mobile{
    display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-md);padding:4px;margin-bottom:var(--sp-3);box-shadow:var(--shadow-card);
  }
  .day-view-toggle-mobile button{
    flex:1;border:none;background:transparent;color:var(--text-muted);padding:9px 8px;
    border-radius:var(--radius-sm);font-size:12.5px;font-weight:600;cursor:pointer;
    transition:background .15s,color .15s;
  }
  .day-view-toggle-mobile button.active{background:var(--accent);color:#fff;}
  .day-view-split{display:block;}
  .day-view-split .mega-timeline-card.mobile-hidden,
  .day-view-split #view-day-el.mobile-hidden{display:none;}

  /* ---------- Layout desktop ---------- */
  @media (min-width:1100px){
    .day-view-toggle-mobile{display:none;}
    .day-view-split{display:grid;grid-template-columns:1.6fr 1fr;gap:var(--sp-5);align-items:start;}
    .day-view-split .mega-timeline-card.mobile-hidden,
    .day-view-split #view-day-el.mobile-hidden{display:block;}
    #side-detail-card{width:calc((100% - 20px) * 1.6 / 2.6);margin-bottom:var(--sp-4);}
    .date-nav{width:calc((100% - 20px) * 1.6 / 2.6);margin-bottom:var(--sp-4);}
  }

  @media (min-width:1100px){
    .app{max-width:1280px;padding:var(--sp-6) var(--sp-8);}

    header{padding:var(--sp-3) var(--sp-5);margin-bottom:var(--sp-4);}
    header h1{font-size:var(--fs-xl);}
    header img{height:38px;}

    .view-switch{max-width:440px;margin-bottom:var(--sp-4);}
    .view-switch button{font-size:var(--fs-sm);padding:var(--sp-2) var(--sp-4);}

    .date-nav .date-label{font-size:var(--fs-md);}

    .main-layout{display:block;}
    .main-col{min-width:0;}

    .week-month-split{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-5);align-items:start;}
    .week-month-split .card{margin-bottom:0;}

    /* In vista Settimana, allinea intestazione e navigazione data alla larghezza
       della colonna sinistra (settimana) invece di estendersi su tutta l'area */
    body.view-is-week .view-switch,
    body.view-is-week .date-nav{
      width:calc((100% - var(--sp-5)) / 2);
    }
    .week-list{max-height:640px;overflow-y:auto;}

    .agenda-top-split{display:grid;grid-template-columns:1fr 1fr;gap:0;}
    .agenda-top-split .agenda-notes{border-bottom:none;border-right:1px solid var(--border);}
    .agenda-top-split .todo-section{border-right:none;}

    .resource-tabs{padding:var(--sp-4) var(--sp-5);gap:var(--sp-2);}
    .resource-tabs button{padding:var(--sp-2) var(--sp-4);font-size:var(--fs-sm);}
    .duplicate-day-btn, .manage-res-btn{padding:var(--sp-2) var(--sp-4);font-size:var(--fs-sm);}
    .toolbar-actions{margin-right:var(--sp-5);}

    .mini-timeline-wrap{padding:var(--sp-4) var(--sp-5) var(--sp-2);}
    .mini-timeline{height:36px;}
    .day-countdown{margin:0 var(--sp-5) var(--sp-3);padding:var(--sp-3) var(--sp-4);font-size:var(--fs-sm);}

    .mega-timeline-card{display:block;}
    .mega-timeline-header{padding:var(--sp-4) var(--sp-5);}
    .mega-timeline-title{font-size:var(--fs-base);}
    .mega-timeline-grid{grid-template-columns:130px repeat(48, minmax(22px, 1fr));}
    .mtl-hour-label{font-size:var(--fs-xs);padding:var(--sp-2) 0;}
    .mtl-res-label{padding:var(--sp-3) var(--sp-4);font-size:var(--fs-sm);}
    .mtl-track{height:50px;}
    .mtl-block{top:7px;height:36px;font-size:var(--fs-xs);padding:4px 8px;border-radius:7px;}
    .mtl-block .mtl-block-time{font-size:10px;}

    .slot-list{padding:var(--sp-3) var(--sp-5);max-height:none;}
    .slot{padding:var(--sp-3) var(--sp-4);}
    .slot-time{font-size:var(--fs-md);}

    .week-list{padding:var(--sp-4);}
    .month-grid{padding:var(--sp-5);gap:var(--sp-1);}

    .fab{
      width:56px;height:56px;font-size:24px;bottom:var(--sp-6);right:var(--sp-6);
      box-shadow:0 4px 14px var(--accent-shadow), 0 1px 3px rgba(0,0,0,.1);
    }
    .fab:hover{transform:translateY(-2px);box-shadow:0 8px 22px var(--accent-shadow), 0 2px 5px rgba(0,0,0,.12);}
  }

  /* ---------- Appunti agenda / To-do ---------- */
  .agenda-notes{padding:var(--sp-4);border-bottom:1px solid var(--border);}
  .agenda-notes-title{font-size:var(--fs-sm);font-weight:700;color:var(--head);margin-bottom:var(--sp-2);}
  .agenda-notes textarea{
    width:100%;min-height:80px;border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:10px 12px;font-size:var(--fs-base);background:var(--bg-soft);color:var(--text-main);resize:vertical;
  }
  .agenda-notes textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--focus-shadow);}
  .agenda-notes textarea::placeholder{color:var(--text-muted);}

  .todo-section{padding:var(--sp-4);border-bottom:1px solid var(--border);}
  .todo-add-row{display:flex;gap:var(--sp-2);margin-bottom:var(--sp-3);}
  .todo-add-row input{
    flex:1;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:16px;
    background:var(--bg-soft);color:var(--text-main);
  }
  .todo-add-row input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--focus-shadow);}
  .todo-add-row input::placeholder{color:var(--text-muted);}
  .todo-add-row button{
    background:var(--accent);color:#fff;border:none;padding:0 var(--sp-4);
    border-radius:var(--radius-sm);font-size:var(--fs-sm);font-weight:700;cursor:pointer;white-space:nowrap;
    transition:background .15s;
  }
  .todo-add-row button:hover{background:var(--accent-dark);}
  .todo-list{display:flex;flex-direction:column;gap:6px;}
  .todo-item{
    display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--radius-sm);
    background:var(--bg-soft);border:1px solid var(--border);font-size:var(--fs-base);
  }
  .todo-item input[type="checkbox"]{width:17px;height:17px;flex-shrink:0;cursor:pointer;accent-color:var(--accent);}
  .todo-item .todo-text{flex:1;color:var(--text-main);word-break:break-word;}
  .todo-item.done .todo-text{text-decoration:line-through;color:var(--text-muted);}
  .todo-item .todo-del{color:var(--danger);cursor:pointer;flex-shrink:0;font-size:14px;padding:6px 9px;}
  .todo-empty{color:var(--text-muted);font-size:var(--fs-sm);text-align:center;padding:var(--sp-2) 0;}

  /* ---------- Agenda ---------- */
  .agenda-list{padding:var(--sp-2) var(--sp-1);}
  .agenda-date-title{
    font-size:var(--fs-xs);font-weight:700;color:var(--text-muted);padding:var(--sp-3) var(--sp-4) var(--sp-1);
    text-transform:uppercase;letter-spacing:.06em;
  }
  .agenda-date-title.today{color:var(--accent);}
  .agenda-item{
    display:flex;align-items:center;gap:10px;padding:10px var(--sp-4);margin:0 var(--sp-2) 4px;
    border-radius:var(--radius-sm);cursor:pointer;transition:background .12s;
  }
  .agenda-item:hover{background:var(--bg-soft);}
  .agenda-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .agenda-time{font-size:var(--fs-xs);font-weight:700;color:var(--text-muted);flex-shrink:0;width:88px;}
  .agenda-info{font-size:var(--fs-sm);color:var(--text-main);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  /* ---------- Toolbar giorno ---------- */
  .day-toolbar{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-2);border-bottom:1px solid var(--border);background:var(--surface-2);}
  .resource-tabs{display:flex;flex-wrap:wrap;gap:6px;padding:var(--sp-2) var(--sp-3);flex:1;}
  .toolbar-actions{display:flex;gap:var(--sp-2);flex-shrink:0;margin-right:var(--sp-3);}
  .duplicate-day-btn, .manage-res-btn{
    flex-shrink:0;border:1px solid var(--border);background:var(--surface);color:var(--head);
    padding:7px 12px;border-radius:var(--radius-sm);font-size:var(--fs-xs);font-weight:600;cursor:pointer;
    display:flex;align-items:center;gap:6px;transition:background .15s;white-space:nowrap;
  }
  .duplicate-day-btn:hover, .manage-res-btn:hover{background:var(--bg-soft);}
  .resource-tabs button{
    border:1px solid var(--border);background:var(--surface);color:var(--text-main);
    padding:7px 12px;border-radius:999px;font-size:var(--fs-xs);font-weight:600;cursor:pointer;
    transition:all .15s;white-space:nowrap;
  }
  .resource-tabs button:hover{border-color:var(--border-strong);}
  .resource-tabs button.active{
    background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 6px var(--accent-shadow);
  }

  /* ---------- Mini timeline ---------- */
  .mini-timeline-wrap{padding:var(--sp-3) var(--sp-3) var(--sp-2);border-bottom:1px solid var(--border);}
  .mini-timeline{
    position:relative;height:32px;background:var(--free);border:1px solid var(--free-border);
    border-radius:var(--radius-sm);overflow:hidden;
  }
  .mini-timeline .mt-tick{position:absolute;top:0;bottom:0;width:1px;background:rgba(0,0,0,.07);}
  body.dark-mode .mini-timeline .mt-tick{background:rgba(255,255,255,.08);}
  .mini-timeline .mt-segment{
    position:absolute;top:0;bottom:0;cursor:pointer;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
  }
  .mini-timeline .mt-segment span{color:#fff;font-size:9.5px;font-weight:700;white-space:nowrap;padding:0 3px;}
  .mini-timeline .mt-now{
    position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--now-line);z-index:2;border-radius:2px;
  }
  .mini-timeline-labels{
    display:flex;justify-content:space-between;font-size:10.5px;font-weight:600;
    color:var(--muted-timeline);margin-top:6px;padding:0 1px;
  }

  /* ---------- Lista slot ---------- */
  .slot-list{
    padding:var(--sp-3);display:flex;flex-direction:column;gap:6px;max-height:65vh;overflow-y:auto;
    -webkit-overflow-scrolling:touch;overscroll-behavior:contain;touch-action:pan-y;
  }
  .slot{
    display:flex;align-items:center;justify-content:space-between;padding:12px 14px;
    border-radius:var(--radius-md);border:1px solid var(--free-border);background:var(--free);
    cursor:pointer;transition:transform .1s,box-shadow .1s;
  }
  .slot:active{transform:scale(0.985);}
  .slot .slot-time{font-weight:700;font-size:var(--fs-base);color:var(--free-text);}
  .slot .slot-label{font-size:var(--fs-xs);color:var(--muted-free-label);}
  .slot.busy{background:var(--busy-bg);border-color:var(--busy-border);}
  .slot.busy .slot-time{color:var(--head);}
  .slot.busy .slot-label{color:var(--busy-text);font-weight:600;}
  .slot .slot-icon{font-size:17px;color:inherit;opacity:.7;font-style:normal;}
  .slot.busy .slot-icon{color:var(--danger);}
  .slot.free .slot-icon{color:var(--muted-free-label);}

  .allday-chips{display:flex;flex-wrap:wrap;gap:6px;padding:var(--sp-2) var(--sp-3) var(--sp-3);}
  .allday-chip{
    color:#fff;font-size:11.5px;font-weight:700;padding:6px 12px;border-radius:999px;cursor:pointer;
    box-shadow:0 1px 4px rgba(0,0,0,.18);transition:transform .1s;
  }
  .allday-chip:hover{transform:translateY(-1px);}

  .day-countdown{
    margin:var(--sp-2) var(--sp-3);padding:10px 14px;border-radius:var(--radius-sm);
    font-size:var(--fs-sm);font-weight:600;text-align:center;
  }
  .day-countdown.upcoming{background:var(--warn-bg);color:var(--warn-text);border:1px solid var(--warn-border);}
  .day-countdown.ongoing{background:var(--busy-bg);color:var(--busy-text);border:1px solid var(--busy-border);}

  .slot-now-line{position:relative;display:flex;align-items:center;gap:8px;margin:6px 2px;}
  .slot-now-line::before, .slot-now-line::after{content:"";flex:1;height:1.5px;background:var(--now-line);border-radius:2px;opacity:.55;}
  .slot-now-line span{
    font-size:10px;font-weight:700;color:#fff;background:var(--now-line);padding:3px 9px;
    border-radius:999px;white-space:nowrap;box-shadow:0 2px 5px rgba(225,29,72,.3);letter-spacing:.02em;
  }

  /* ---------- Vista settimana ---------- */
  .week-list{padding:var(--sp-3);display:flex;flex-direction:column;gap:var(--sp-3);}
  .week-day{border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;background:var(--surface);}
  .week-day-header{
    display:flex;align-items:center;justify-content:space-between;padding:11px 14px;
    background:var(--surface-2);cursor:pointer;
  }
  .week-mini-timeline-wrap{padding:0 14px 10px;background:var(--surface-2);}
  .week-mini-timeline-wrap .mini-timeline{height:18px;}
  .week-mini-timeline-wrap .mt-segment span{display:none;}
  .week-day-header.today{background:var(--accent-soft);}
  .week-day-header.today + .week-mini-timeline-wrap{background:var(--accent-soft);}
  .week-day-header .wd-name{font-weight:700;color:var(--head);font-size:var(--fs-base);letter-spacing:-.01em;}
  .week-day-header .wd-count{
    font-size:var(--fs-xs);color:var(--text-muted);background:var(--surface);
    padding:3px 9px;border-radius:999px;border:1px solid var(--border);
  }
  .week-day-body{padding:0 14px 12px;display:none;flex-direction:column;gap:6px;}
  .week-day-body.open{display:flex;padding-top:10px;}
  .week-item{
    display:flex;align-items:center;justify-content:space-between;padding:9px 11px;
    border-radius:var(--radius-sm);background:var(--bg-soft);border:1px solid var(--border);font-size:var(--fs-sm);
  }
  .week-item .wi-res{font-weight:700;color:var(--head);}
  .week-item .wi-time{color:var(--muted-week-time);}
  .week-item .wi-del{color:var(--danger);cursor:pointer;font-size:15px;padding:6px 9px;}
  .week-empty{padding:10px 0;text-align:center;color:var(--muted-empty);font-size:var(--fs-sm);}

  /* ---------- Vista mese ---------- */
  .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:var(--sp-3);}
  .month-dow{
    text-align:center;font-size:10.5px;font-weight:700;color:var(--text-muted);
    padding:6px 0;text-transform:uppercase;letter-spacing:.06em;
  }
  .month-cell{
    aspect-ratio:1;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:5px 2px;
    cursor:pointer;transition:background .15s,border-color .15s;position:relative;
  }
  .month-cell:hover{background:var(--bg-soft);border-color:var(--border-strong);}
  .month-cell.other-month{opacity:.35;}
  .month-cell.today{border-color:var(--accent);border-width:2px;background:var(--accent-soft);}
  .month-cell .mc-num{font-size:13px;font-weight:600;color:var(--num-color);}
  .month-cell.today .mc-num{color:var(--accent);font-weight:800;}
  .month-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:4px;max-width:100%;}
  .month-dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);}

  /* ---------- FAB ---------- */
  .fab{
    position:fixed;right:20px;bottom:20px;width:56px;height:56px;border-radius:50%;
    background:var(--accent);color:#fff;border:none;font-size:26px;
    box-shadow:0 6px 18px var(--accent-shadow);cursor:pointer;z-index:60;
    display:flex;align-items:center;justify-content:center;transition:transform .12s,background .15s,box-shadow .15s;
  }
  .fab:hover{background:var(--accent-dark);}
  .fab:active{transform:scale(0.92);}

  /* ---------- Modali ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(22,18,14,.5);display:none;align-items:center;justify-content:center;
    z-index:100;padding:16px;backdrop-filter:blur(3px);
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
    padding:var(--sp-6);width:100%;max-width:400px;box-shadow:var(--shadow-pop);
  }
  .modal h3{margin:0 0 var(--sp-4);color:var(--head);font-size:var(--fs-lg);font-weight:700;letter-spacing:-.01em;}
  .modal label{display:block;font-size:var(--fs-xs);font-weight:600;color:var(--text-muted);margin:var(--sp-3) 0 5px;text-transform:uppercase;letter-spacing:.05em;}
  .modal select, .modal input{
    width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);
    font-size:16px;background:var(--bg-soft);color:var(--text-main);
  }
  .modal select:focus, .modal input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--focus-shadow);}
  .allday-toggle{
    display:flex !important;align-items:center;gap:8px;font-size:var(--fs-sm) !important;font-weight:600;
    color:var(--head) !important;cursor:pointer;margin:var(--sp-3) 0 5px;text-transform:none !important;letter-spacing:0 !important;
  }
  .allday-toggle input{width:17px !important;height:17px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;padding:0;}
  .modal-row{display:flex;gap:10px;}
  .modal-row > div{flex:1;}
  .modal-actions{display:flex;gap:10px;margin-top:var(--sp-5);}
  .modal-actions button{
    flex:1;padding:12px;border:none;border-radius:var(--radius-sm);font-size:var(--fs-base);font-weight:700;cursor:pointer;
    transition:background .15s;
  }
  .modal-actions .btn-cancel{background:var(--btn-secondary-bg);color:var(--btn-secondary-text);}
  .modal-actions .btn-cancel:hover{background:var(--border);}
  .modal-actions .btn-confirm{background:var(--accent);color:#fff;box-shadow:0 3px 10px var(--accent-shadow);}
  .modal-actions .btn-confirm:hover{background:var(--accent-dark);}

  /* ---------- Login ---------- */
  #login-overlay{
    position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;
    background:
      radial-gradient(900px 600px at 15% -10%, rgba(192,57,47,.20), transparent 60%),
      radial-gradient(800px 600px at 110% 110%, rgba(192,57,47,.14), transparent 60%),
      var(--bg);
  }
  .login-card{
    background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:40px 32px;width:100%;max-width:380px;box-shadow:var(--shadow-pop);text-align:center;
    animation:loginCardIn .45s cubic-bezier(.2,.8,.3,1);
  }
  @keyframes loginCardIn{
    from{opacity:0;transform:translateY(14px) scale(.97);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }
  .login-logo{height:56px;margin-bottom:var(--sp-4);border-radius:var(--radius-md);}
  .login-card h2{margin:0 0 4px;color:var(--head);font-size:22px;font-weight:800;letter-spacing:-.02em;}
  .login-subtitle{margin:0 0 var(--sp-6);color:var(--text-muted);font-size:var(--fs-sm);}
  .login-card input{
    width:100%;padding:13px 14px;margin-bottom:12px;border:1px solid var(--border);
    border-radius:var(--radius-sm);font-size:16px;background:var(--bg-soft);color:var(--text-main);
    transition:border-color .15s, box-shadow .15s;
  }
  .login-card input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--focus-shadow);}
  .login-error{color:var(--danger);font-size:var(--fs-xs);min-height:16px;margin-bottom:8px;font-weight:600;}
  .login-btn{
    width:100%;padding:14px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;
    background:var(--accent);color:#fff;box-shadow:0 6px 18px var(--accent-shadow);letter-spacing:.01em;
    transition:transform .12s, background .15s, box-shadow .15s;
  }
  .login-btn:hover{background:var(--accent-dark);transform:translateY(-1px);}
  .login-btn:active{transform:translateY(0);}

  .captcha-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .captcha-box{
    flex:1 1 auto;min-width:120px;background:var(--bg-soft);border:1px dashed var(--border-strong);
    border-radius:var(--radius-sm);padding:12px 8px;font-size:22px;font-weight:700;letter-spacing:7px;
    color:var(--head);user-select:none;text-align:center;font-family:'Courier New',monospace;min-height:24px;
  }
  .captcha-refresh{
    border:1px solid var(--border);background:var(--surface);color:var(--head);
    border-radius:var(--radius-sm);padding:11px 14px;cursor:pointer;font-size:16px;flex-shrink:0;
    transition:background .15s,transform .2s;
  }
  .captcha-refresh:hover{background:var(--bg-soft);transform:rotate(90deg);}

  #loading-overlay{
    display:none;position:fixed;inset:0;z-index:600;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    background:var(--bg);
  }
  .loading-spinner{
    width:44px;height:44px;border-radius:50%;border:4px solid var(--border);border-top-color:var(--accent);
    animation:spin .8s linear infinite;
  }
  .loading-text{color:var(--head);font-size:var(--fs-base);font-weight:700;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------- Gestione risorse / utenti ---------- */
  .manage-res-modal{max-width:440px;}
  .res-manage-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;margin-bottom:var(--sp-4);}
  .res-manage-item{
    display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--radius-sm);
    background:var(--bg-soft);border:1px solid var(--border);cursor:grab;
  }
  .res-manage-item.dragging{opacity:.4;}
  .res-manage-item .rm-handle{color:var(--text-muted);font-size:15px;flex-shrink:0;cursor:grab;}
  .rm-color-picker{
    -webkit-appearance:none;appearance:none;
    width:26px !important;min-width:26px;max-width:26px;height:26px;min-height:26px;max-height:26px;
    flex-shrink:0;border:2px solid var(--border);border-radius:50%;
    padding:0 !important;cursor:pointer;background:none;overflow:hidden;
  }
  .rm-color-picker::-webkit-color-swatch-wrapper{padding:0;border-radius:50%;width:100%;height:100%;}
  .rm-color-picker::-webkit-color-swatch{border:none;border-radius:50%;}
  .rm-color-picker::-moz-color-swatch{border:none;border-radius:50%;}
  .res-manage-item .rm-name{flex:1;font-size:var(--fs-sm);font-weight:600;color:var(--text-main);}
  .res-manage-item .rm-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .user-announce-toggle{display:flex;align-items:center;gap:4px;font-size:var(--fs-sm);cursor:pointer;flex-shrink:0;color:var(--text-muted);}
  .user-announce-toggle input{width:15px;height:15px;cursor:pointer;accent-color:var(--accent);}
  .rm-arrows{display:flex;flex-direction:column;gap:1px;flex-shrink:0;}
  .rm-arrows button{
    border:none;background:transparent;color:var(--text-muted);font-size:11px;cursor:pointer;
    padding:5px 8px;line-height:1;min-width:28px;min-height:20px;
  }
  .rm-arrows button:hover:not(:disabled){color:var(--accent);}
  .rm-arrows button:disabled{opacity:.25;cursor:default;}
  .res-manage-item .rm-delete{color:var(--danger);cursor:pointer;font-size:15px;padding:6px 9px;flex-shrink:0;}
  .res-add-row{display:flex;gap:8px;}
  .res-add-row input{flex:1;}
  .res-add-row button{
    background:var(--accent);color:#fff;border:none;padding:0 var(--sp-4);
    border-radius:var(--radius-sm);font-size:var(--fs-sm);font-weight:700;cursor:pointer;white-space:nowrap;
    transition:background .15s;
  }
  .res-add-row button:hover{background:var(--accent-dark);}

  /* ---------- Dettaglio giorno ---------- */
  .day-detail{
    background:var(--surface);border-radius:var(--radius-md);padding:var(--sp-4);
  }
  .side-card .day-detail{padding:2px;}
  .day-detail.is-today{border-left:3px solid var(--accent);padding-left:calc(var(--sp-4) - 3px);}
  .side-card .day-detail.is-today{padding-left:10px;}
  .day-detail h4{margin:0 0 var(--sp-3);color:var(--head);font-size:var(--fs-base);display:flex;align-items:center;gap:8px;flex-wrap:wrap;letter-spacing:-.01em;}
  .today-badge{
    background:var(--accent);color:#fff;font-size:10px;font-weight:800;
    padding:3px 9px;border-radius:999px;letter-spacing:.06em;
  }
  .month-mini-timeline-wrap{margin-bottom:var(--sp-3);}
  .day-detail .dd-item{
    display:flex;justify-content:space-between;align-items:center;padding:8px 10px;
    background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius-sm);
    margin-bottom:6px;font-size:var(--fs-sm);
  }
  .day-detail .dd-item .dd-del{color:var(--danger);cursor:pointer;padding:6px 9px;}
  .day-detail .dd-empty{color:var(--muted-empty);font-size:var(--fs-sm);text-align:center;padding:var(--sp-2) 0;}

  /* ---------- Mobile ---------- */
  @media (max-width:600px){
    .app{padding:10px;padding-bottom:96px;}
    header{padding:8px 10px;flex-wrap:wrap;gap:6px;row-gap:8px;}
    header h1{font-size:15px;flex:1 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    header img{height:28px;}
    #theme-toggle, #search-toggle, #users-toggle, #announce-toggle{width:32px;height:32px;font-size:13px;}
    #logout-toggle{height:32px;padding:0 9px;font-size:11px;}
    .profile-pic{width:24px;height:24px;}
    .profile-name{font-size:11px;max-width:70px;}
    .profile-badge{padding:3px 9px 3px 3px;gap:5px;}
    .date-nav .date-label{font-size:13.5px;}
    .month-cell .mc-num{font-size:12px;}
    .fab{right:16px;bottom:calc(16px + env(safe-area-inset-bottom));width:54px;height:54px;font-size:24px;}
    .view-switch button{font-size:10.5px;padding:9px 3px;gap:3px;}
    .view-switch button i{font-size:14px;}

    .announce-banner.visible{
      display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--accent);
      border-radius:var(--radius-sm);padding:9px 12px;margin-bottom:10px;box-shadow:var(--shadow-card);
    }
    .ab-icon{font-size:14px;flex-shrink:0;}
    .ab-text{flex:1;min-width:0;font-size:12px;color:var(--text-main);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .ab-check{
      border:none;background:var(--accent);color:#fff;width:26px;height:26px;border-radius:50%;
      font-size:13px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    }

    #side-detail-card .day-detail{
      padding:8px 12px;margin-top:0;display:flex;align-items:center;gap:8px;flex-wrap:nowrap;
      border-radius:var(--radius-sm);
    }
    #side-detail-card .day-detail h4{margin:0;font-size:11.5px;flex-shrink:1;gap:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}

<script>
/* =========================================================================
   SISTEMA DI AUTENTICAZIONE
   ATTENZIONE — nota di sicurezza onesta: questo sito gira interamente nel
   browser senza un server dietro. Le password vengono trasformate con SHA-256
   prima di essere salvate (quindi non sono leggibili in chiaro), ma chiunque
   apra gli strumenti sviluppatore del browser può comunque vedere il codice
   sorgente e i dati salvati in locale. Non è equivalente alla sicurezza di un
   vero sistema server-side con database. Ogni account creato/loggato resta
   solo sul dispositivo/browser dove viene creato, finché non verrà collegato
   un backend condiviso (Firebase, come discusso).
   ========================================================================= */

const ADMIN_USERNAME = "Admin";
const ADMIN_PASSWORD = "derwegadmin";
const SPECIAL_VIEWER_EMAIL = "dario.volani@lastrada-derweg.org";

async function sha256(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}

function loadUsers(){
  try{
    const raw = localStorage.getItem("gestionale_users");
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {};
}
function saveUsers(users){
  try{ localStorage.setItem("gestionale_users", JSON.stringify(users)); }catch(e){}
}

let currentUser = null;

function isAdmin(){ return currentUser === ADMIN_USERNAME; }
function isSpecialViewer(){ return currentUser === SPECIAL_VIEWER_EMAIL; }
function canSeeCheckmarkCounts(){ return isAdmin() || isSpecialViewer(); }

let currentCaptcha = "";
function randCaptcha(){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s = "";
  for(let i=0;i<5;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function newCaptcha(){
  currentCaptcha = randCaptcha();
  const box = document.getElementById("captcha-text");
  const inp = document.getElementById("login-captcha");
  if(box) box.textContent = currentCaptcha;
  if(inp) inp.value = "";
}

async function attemptLogin(){
  const nameInp = document.getElementById("login-username");
  const passInp = document.getElementById("login-password");
  const captchaInp = document.getElementById("login-captcha");
  const errEl = document.getElementById("login-error");
  const name = nameInp.value.trim();
  const pass = passInp.value;
  const captchaValue = captchaInp.value.trim().toUpperCase();

  if(!name || !pass){
    errEl.textContent = "Inserisci nome utente e password.";
    return;
  }

  if(captchaValue !== currentCaptcha){
    errEl.textContent = "Codice di verifica non corretto.";
    newCaptcha();
    return;
  }

  if(name === ADMIN_USERNAME){
    if(pass === ADMIN_PASSWORD){
      completeLogin(ADMIN_USERNAME, true);
    } else {
      errEl.textContent = "Password errata.";
      newCaptcha();
    }
    return;
  }

  const users = loadUsers();
  const user = users[name];
  if(!user){
    errEl.textContent = "Utente non trovato.";
    newCaptcha();
    return;
  }
  const hashed = await sha256(pass);
  if(hashed !== user.passwordHash){
    errEl.textContent = "Password errata.";
    newCaptcha();
    return;
  }
  completeLogin(name, true);
}

function completeLogin(username, showLoading){
  currentUser = username;
  try{ sessionStorage.setItem("gestionale_current_user", username); }catch(e){}
  document.getElementById("login-overlay").style.display = "none";
  document.getElementById("login-error").textContent = "";
  document.getElementById("login-username").value = "";
  document.getElementById("login-password").value = "";

  document.getElementById("users-toggle").style.display = isAdmin() ? "flex" : "none";
  document.getElementById("announce-toggle").style.display = "flex";
  const profileNameEl = document.getElementById("profile-name");
  if(profileNameEl) profileNameEl.textContent = username;

  refreshAnnouncementBadge();
  if(typeof switchView === "function") switchView("day");

  if(showLoading){
    showLoadingScreen();
    setTimeout(hideLoadingScreen, 3000);
  }
}

function showLoadingScreen(){
  const el = document.getElementById("loading-overlay");
  if(el) el.style.display = "flex";
}
function hideLoadingScreen(){
  const el = document.getElementById("loading-overlay");
  if(el) el.style.display = "none";
}

function doLogout(){
  currentUser = null;
  try{ sessionStorage.removeItem("gestionale_current_user"); }catch(e){}
  document.getElementById("login-overlay").style.display = "flex";
}

function tryRestoreSession(){
  let saved = null;
  try{ saved = sessionStorage.getItem("gestionale_current_user"); }catch(e){}
  if(saved === ADMIN_USERNAME){
    completeLogin(ADMIN_USERNAME);
    return true;
  }
  if(saved){
    const users = loadUsers();
    if(users[saved]){
      completeLogin(saved);
      return true;
    }
  }
  return false;
}

/* ---- Gestione utenti (solo Admin) ---- */
function openUsersPanel(){
  if(!isAdmin()) return;
  renderUsersManageList();
  document.getElementById("users-overlay").classList.add("open");
}
function closeUsersPanel(){
  document.getElementById("users-overlay").classList.remove("open");
}
function renderUsersManageList(){
  const listEl = document.getElementById("users-manage-list");
  listEl.innerHTML = "";
  const users = loadUsers();
  const names = Object.keys(users);

  if(names.length === 0){
    listEl.innerHTML = "<div class='todo-empty'>Nessun utente creato oltre ad Admin.</div>";
    return;
  }

  names.forEach(name=>{
    const item = document.createElement("div");
    item.className = "res-manage-item";
    const isSpecial = name === SPECIAL_VIEWER_EMAIL;
    const canAnnounce = !!users[name].canAnnounce;
    item.innerHTML = `
      <span class="rm-dot" style="background:${isSpecial ? 'var(--accent)' : 'var(--text-muted)'};"></span>
      <span class="rm-name">${escapeHtml(name)}${isSpecial ? " <small>(vede i checkmark)</small>" : ""}</span>
      <label class="user-announce-toggle" title="Può scrivere annunci">
        <input type="checkbox" ${canAnnounce ? "checked" : ""}> 📣
      </label>
      <span class="rm-delete" title="Elimina utente">🗑</span>
    `;
    item.querySelector(".user-announce-toggle input").onchange = (e)=>{
      const u = loadUsers();
      if(u[name]){
        u[name].canAnnounce = e.target.checked;
        saveUsers(u);
      }
    };
    item.querySelector(".rm-delete").onclick = ()=>{
      if(confirm("Eliminare l'utente \""+name+"\"?")){
        const u = loadUsers();
        delete u[name];
        saveUsers(u);
        renderUsersManageList();
      }
    };
    listEl.appendChild(item);
  });
}
async function addNewUser(){
  const nameInp = document.getElementById("new-user-name");
  const passInp = document.getElementById("new-user-pass");
  const name = nameInp.value.trim();
  const pass = passInp.value;

  if(!name || !pass){ alert("Inserisci nome utente e password."); return; }
  if(name === ADMIN_USERNAME){ alert("Questo nome è riservato."); return; }

  const users = loadUsers();
  if(users[name]){ alert("Esiste già un utente con questo nome."); return; }

  const passwordHash = await sha256(pass);
  users[name] = { passwordHash };
  saveUsers(users);

  nameInp.value = "";
  passInp.value = "";
  renderUsersManageList();
}
document.getElementById("users-overlay").addEventListener("click",(e)=>{
  if(e.target.id==="users-overlay") closeUsersPanel();
});

const DEFAULT_RESOURCES = ["1"];


let RESOURCES = loadResources();

const RESOURCE_COLORS = {
  "Sala C": ["#e0a800","#b88700"],
  "Furgone": ["#6c757d","#495157"],
  "Gazebo": ["#2b7fd6","#1c5aa0"],
  "Impianto audio": ["#8a4fd6","#6a35ab"],
  "Tavoli": ["#2ca86b","#1f8253"]
};
const AUTO_PALETTE = [
  ["#d6486f","#a8355a"], ["#3ba8a0","#297f78"], ["#c98a2b","#a06d1e"],
  ["#5b7fd6","#3f5cab"], ["#9a5bd6","#7440ab"], ["#5bb85b","#3f8f3f"]
];

let customResourceColors = loadCustomColors();

function loadCustomColors(){
  try{
    const raw = localStorage.getItem("gestionale_resource_colors");
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {};
}
function saveCustomColors(){
  try{ localStorage.setItem("gestionale_resource_colors", JSON.stringify(customResourceColors)); }catch(e){}
}
function darkenColor(hex, amount){
  hex = hex.replace("#","");
  const r = Math.max(0, parseInt(hex.substring(0,2),16) - amount);
  const g = Math.max(0, parseInt(hex.substring(2,4),16) - amount);
  const b = Math.max(0, parseInt(hex.substring(4,6),16) - amount);
  return "#" + [r,g,b].map(v=>v.toString(16).padStart(2,"0")).join("");
}
function setResourceColor(res, hex){
  customResourceColors[res] = [hex, darkenColor(hex, 35)];
  saveCustomColors();
}
function getResourceColor(res){
  if(customResourceColors[res]) return customResourceColors[res];
  if(RESOURCE_COLORS[res]) return RESOURCE_COLORS[res];
  let hash = 0;
  for(let i=0;i<res.length;i++) hash = (hash*31 + res.charCodeAt(i)) >>> 0;
  return AUTO_PALETTE[hash % AUTO_PALETTE.length];
}

function loadResources(){
  try{
    const raw = localStorage.getItem("gestionale_resources");
    if(raw){
      const parsed = JSON.parse(raw);
      if(Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  }catch(e){}
  return DEFAULT_RESOURCES.slice();
}
function saveResources(){
  try{ localStorage.setItem("gestionale_resources", JSON.stringify(RESOURCES)); }catch(e){}
}

function safeGetInit(){
  try{
    const raw = localStorage.getItem("gestionale_data_v2");
    return raw || "{}";
  }catch(e){ return "{}"; }
}
function computeMaxId(b){
  let max = 0;
  Object.values(b).forEach(arr=>arr.forEach(x=>{ if(x.id>max) max=x.id; }));
  return max;
}
function persist(){
  try{
    localStorage.setItem("gestionale_data_v2", JSON.stringify(bookings));
  }catch(e){ /* storage non disponibile, i dati restano solo in memoria per la sessione */ }
}

let bookings = JSON.parse(safeGetInit());
let idCounter = computeMaxId(bookings) + 1;

function fmtDate(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+day;
}
function todayDate(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function sameDay(a,b){ return fmtDate(a)===fmtDate(b); }

let currentView = "day";
let currentDate = todayDate();
let selectedResource = RESOURCES[0];
let openWeekDayKey = null;

function onSearchInput(){
  const q = document.getElementById("search-input").value.trim().toLowerCase();
  const resFilter = document.getElementById("search-resource-filter").value;
  const clearBtn = document.getElementById("search-clear");
  const resultsEl = document.getElementById("search-results");

  clearBtn.style.display = q ? "flex" : "none";

  if(!q && !resFilter){
    resultsEl.style.display = "none";
    return;
  }

  const matches = [];
  Object.keys(bookings).forEach(key=>{
    (bookings[key]||[]).forEach(it=>{
      const matchesText = !q || it.label.toLowerCase().includes(q) || it.res.toLowerCase().includes(q);
      const matchesRes = !resFilter || it.res === resFilter;
      if(matchesText && matchesRes){
        matches.push({key, item:it});
      }
    });
  });
  matches.sort((a,b)=> a.key.localeCompare(b.key) || a.item.start-b.item.start);

  resultsEl.innerHTML = "";
  resultsEl.style.display = "block";

  if(matches.length === 0){
    resultsEl.innerHTML = "<div class='search-no-results'>Nessun risultato</div>";
    return;
  }

  matches.slice(0,30).forEach(m=>{
    const d = new Date(m.key+"T00:00:00");
    const dateStr = d.toLocaleDateString("it-IT",{day:"numeric",month:"short",year:"numeric"});
    const row = document.createElement("div");
    row.className = "search-result-item";
    row.innerHTML = "<span class='sr-label'>"+escapeHtml(m.item.label)+"</span><span class='sr-meta'>"+escapeHtml(m.item.res)+" · "+dateStr+" · "+fmtHourLabel(m.item.start)+"–"+fmtHourLabel(m.item.end)+"</span>";
    row.onclick = ()=>{ showEventDetail(m.key, m.item.id); };
    resultsEl.appendChild(row);
  });
}

function clearSearch(){
  document.getElementById("search-input").value = "";
  document.getElementById("search-resource-filter").value = "";
  document.getElementById("search-clear").style.display = "none";
  document.getElementById("search-results").style.display = "none";
}

function toggleSearchBar(){
  const bar = document.getElementById("search-bar");
  const btn = document.getElementById("search-toggle");
  const isOpen = bar.style.display !== "none";
  if(isOpen){
    bar.style.display = "none";
    btn.classList.remove("active");
    clearSearch();
  } else {
    bar.style.display = "flex";
    btn.classList.add("active");
    populateSearchResourceFilter();
    document.getElementById("search-input").focus();
  }
}
function populateSearchResourceFilter(){
  const sel = document.getElementById("search-resource-filter");
  const current = sel.value;
  sel.innerHTML = "<option value=''>Tutte le risorse</option>";
  RESOURCES.forEach(r=>{
    const o = document.createElement("option");
    o.value = r; o.textContent = r;
    sel.appendChild(o);
  });
  sel.value = current;
}

function switchDayPanel(panel){
  const timelineCard = document.getElementById("mega-timeline-card");
  const listCard = document.getElementById("view-day-el");
  const btnTimeline = document.getElementById("dvt-timeline");
  const btnList = document.getElementById("dvt-list");
  if(!timelineCard || !listCard) return;

  if(panel === "timeline"){
    timelineCard.classList.remove("mobile-hidden");
    listCard.classList.add("mobile-hidden");
    btnTimeline.classList.add("active");
    btnList.classList.remove("active");
  } else {
    timelineCard.classList.add("mobile-hidden");
    listCard.classList.remove("mobile-hidden");
    btnTimeline.classList.remove("active");
    btnList.classList.add("active");
  }
}

function switchView(view){
  currentView = view;
  document.getElementById("tab-day").classList.toggle("active", view==="day");
  document.getElementById("tab-week").classList.toggle("active", view==="week");
  document.getElementById("tab-agenda").classList.toggle("active", view==="agenda");
  document.getElementById("day-view-wrapper").style.display = view==="day" ? "" : "none";
  document.body.classList.toggle("view-is-week", view==="week");

  const isDesktop = window.matchMedia("(min-width:1100px)").matches;
  const showMonthAlongsideWeek = isDesktop && view==="week";

  document.getElementById("view-week-el").style.display = view==="week" ? "" : "none";
  document.getElementById("view-month-el").style.display = showMonthAlongsideWeek ? "" : "none";
  document.getElementById("view-agenda-el").style.display = view==="agenda" ? "" : "none";
  document.querySelector(".date-nav").style.display = view==="agenda" ? "none" : "flex";
  renderAll();
  refreshSidePanel();
}

function refreshSidePanel(){
  const dateToShow = (currentView === "day") ? currentDate : todayDate();
  showMonthDayDetail(dateToShow);
}

function navPrev(){
  if(currentView==="day"){ currentDate.setDate(currentDate.getDate()-1); }
  else if(currentView==="week"){ currentDate.setDate(currentDate.getDate()-7); }
  else { currentDate.setMonth(currentDate.getMonth()-1); }
  renderAll();
  refreshSidePanel();
}
function navNext(){
  if(currentView==="day"){ currentDate.setDate(currentDate.getDate()+1); }
  else if(currentView==="week"){ currentDate.setDate(currentDate.getDate()+7); }
  else { currentDate.setMonth(currentDate.getMonth()+1); }
  renderAll();
  refreshSidePanel();
}
function goToday(){
  currentDate = todayDate();
  renderAll();
  refreshSidePanel();
}

function renderAll(){
  updateDateLabel();
  if(currentView==="day") renderDayView();
  else if(currentView==="week"){
    renderWeekView();
    if(window.matchMedia("(min-width:1100px)").matches) renderMonthView();
  }
  else if(currentView==="agenda") renderAgendaView();
}

function updateDateLabel(){
  const el = document.getElementById("date-label");
  if(currentView==="day"){
    el.textContent = currentDate.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"}).replace(/^\w/,c=>c.toUpperCase());
  } else if(currentView==="week"){
    const monday = getMonday(currentDate);
    const sunday = new Date(monday); sunday.setDate(sunday.getDate()+6);
    el.textContent = monday.toLocaleDateString("it-IT",{day:"numeric",month:"short"}) + " – " + sunday.toLocaleDateString("it-IT",{day:"numeric",month:"short",year:"numeric"});
  } else {
    el.textContent = currentDate.toLocaleDateString("it-IT",{month:"long",year:"numeric"}).replace(/^\w/,c=>c.toUpperCase());
  }
}

function getMonday(d){
  const nd = new Date(d);
  const day = nd.getDay() || 7;
  nd.setDate(nd.getDate() - day + 1);
  nd.setHours(0,0,0,0);
  return nd;
}

function renderMiniTimeline(dayBookings, containerId){
  const el = document.getElementById(containerId || "mini-timeline");
  if(!el) return;
  el.innerHTML = "";

  for(let h=3; h<24; h+=3){
    const tick = document.createElement("div");
    tick.className = "mt-tick";
    tick.style.left = (h/24*100)+"%";
    el.appendChild(tick);
  }

  dayBookings.forEach(b=>{
    const seg = document.createElement("div");
    seg.className = "mt-segment";
    const widthPct = (b.end-b.start)/24*100;
    seg.style.left = (b.start/24*100)+"%";
    seg.style.width = widthPct+"%";
    const colors = getResourceColor(b.res);
    seg.style.background = "linear-gradient(135deg,"+colors[0]+","+colors[1]+")";
    seg.title = b.res + " — " + b.label + " (" + fmtHourLabel(b.start)+"-"+fmtHourLabel(b.end)+")";
    if(widthPct > 6){
      const txt = document.createElement("span");
      txt.textContent = fmtHourLabel(b.start)+"-"+fmtHourLabel(b.end);
      seg.appendChild(txt);
    }
    seg.onclick = ()=>{
      const target = document.getElementById("slot-h"+Math.floor(b.start*2));
      if(target) target.scrollIntoView({behavior:"smooth", block:"center"});
    };
    el.appendChild(seg);
  });

  return el;
}

function addNowLineToTimeline(el, dateForCheck){
  if(sameDay(dateForCheck, todayDate())){
    const now = new Date();
    const pct = (now.getHours() + now.getMinutes()/60) / 24 * 100;
    const nowLine = document.createElement("div");
    nowLine.className = "mt-now";
    nowLine.style.left = pct+"%";
    el.appendChild(nowLine);
  }
}

function renderDayView(){
  const tabsEl = document.getElementById("resource-tabs");
  tabsEl.innerHTML = "";

  const allBtn = document.createElement("button");
  allBtn.textContent = "Tutti";
  allBtn.className = selectedResource === "__ALL__" ? "active" : "";
  allBtn.onclick = ()=>{ selectedResource = "__ALL__"; renderDayView(); };
  tabsEl.appendChild(allBtn);

  RESOURCES.forEach(r=>{
    const b = document.createElement("button");
    const colors = getResourceColor(r);
    const dot = document.createElement("span");
    dot.style.display = "inline-block";
    dot.style.width = "8px";
    dot.style.height = "8px";
    dot.style.borderRadius = "50%";
    dot.style.marginRight = "6px";
    dot.style.background = colors[0];
    dot.style.verticalAlign = "middle";
    b.appendChild(dot);
    b.appendChild(document.createTextNode(r));
    b.className = r===selectedResource ? "active" : "";
    b.onclick = ()=>{ selectedResource = r; renderDayView(); };
    tabsEl.appendChild(b);
  });

  const listEl = document.getElementById("slot-list");
  listEl.innerHTML = "";
  const key = fmtDate(currentDate);
  const allDayItemsAll = selectedResource === "__ALL__"
    ? (bookings[key]||[]).filter(b=>b.allDay)
    : (bookings[key]||[]).filter(b=>b.allDay && b.res===selectedResource);
  const dayBookings = (selectedResource === "__ALL__"
    ? (bookings[key]||[]).slice()
    : (bookings[key]||[]).filter(b=>b.res===selectedResource))
    .filter(b=>!b.allDay)
    .sort((a,b)=>a.start-b.start);

  const mtEl = renderMiniTimeline(dayBookings, "mini-timeline");
  addNowLineToTimeline(mtEl, currentDate);

  // Chip compatti per gli elementi "tutto il giorno" — non occupano slot orari
  const alldayWrap = document.getElementById("allday-chips");
  alldayWrap.innerHTML = "";
  if(allDayItemsAll.length === 0){
    alldayWrap.style.display = "none";
  } else {
    alldayWrap.style.display = "flex";
    allDayItemsAll.forEach(it=>{
      const colors = getResourceColor(it.res);
      const chip = document.createElement("div");
      chip.className = "allday-chip";
      chip.style.background = "linear-gradient(135deg,"+colors[0]+","+colors[1]+")";
      chip.innerHTML = "<span>🗓 "+(selectedResource==="__ALL__" ? escapeHtml(it.res)+": " : "")+escapeHtml(it.label)+"</span>";
      chip.onclick = ()=>{ showEventDetail(key, it.id); };
      alldayWrap.appendChild(chip);
    });
  }

  const isToday = sameDay(currentDate, todayDate());
  let nowHourDecimal = null;
  if(isToday){
    const now = new Date();
    nowHourDecimal = now.getHours() + now.getMinutes()/60;
  }

  // Countdown al prossimo elemento della risorsa selezionata
  const countdownEl = document.getElementById("day-countdown");
  if(isToday){
    const next = dayBookings.filter(b=>b.start > nowHourDecimal).sort((a,b)=>a.start-b.start)[0];
    const ongoing = dayBookings.find(b=> nowHourDecimal>=b.start && nowHourDecimal<b.end);
    if(ongoing){
      const remainMin = Math.round((ongoing.end - nowHourDecimal)*60);
      countdownEl.style.display = "block";
      countdownEl.className = "day-countdown ongoing";
      countdownEl.textContent = "In corso: " + ongoing.label + " — finisce tra " + remainMin + " minuti";
    } else if(next){
      const diffMin = Math.round((next.start - nowHourDecimal)*60);
      countdownEl.style.display = "block";
      countdownEl.className = "day-countdown upcoming";
      countdownEl.textContent = "Mancano " + diffMin + " minuti a " + next.label + " (" + fmtHourLabel(next.start) + ")";
    } else {
      countdownEl.style.display = "none";
    }
  } else {
    countdownEl.style.display = "none";
  }

  let nowLineInserted = false;
  for(let hh=0; hh<48; hh++){
    const h = hh * 0.5;

    if(isToday && !nowLineInserted && nowHourDecimal < h){
      const nowMarker = document.createElement("div");
      nowMarker.className = "slot-now-line";
      nowMarker.innerHTML = "<span>Ora — "+fmtHourLabel(nowHourDecimal)+"</span>";
      listEl.appendChild(nowMarker);
      nowLineInserted = true;
    }

    const coveringAll = dayBookings.filter(b=> h>=b.start && h<b.end);
    const covering = coveringAll[0];
    const slot = document.createElement("div");
    slot.className = "slot " + (covering ? "busy" : "free");
    slot.id = "slot-h"+hh;

    const timeSpan = document.createElement("span");
    timeSpan.className = "slot-time";
    timeSpan.textContent = fmtHourLabel(h) + " – " + fmtHourLabel(h+0.5);

    const labelSpan = document.createElement("span");
    labelSpan.className = "slot-label";

    const iconSpan = document.createElement("i");
    iconSpan.className = "slot-icon";
    iconSpan.textContent = covering ? "🔒" : "+";

    const left = document.createElement("div");
    left.style.display="flex"; left.style.flexDirection="column"; left.style.gap="2px";
    left.appendChild(timeSpan);

    if(covering){
      if(coveringAll.length > 1){
        labelSpan.textContent = coveringAll.map(b=>b.res+": "+b.label).join(" · ");
      } else if(selectedResource === "__ALL__"){
        labelSpan.textContent = covering.res + ": " + covering.label;
      } else {
        labelSpan.textContent = covering.label;
      }
      left.appendChild(labelSpan);
      slot.onclick = ()=>{ showEventDetail(key, covering.id); };
    } else {
      labelSpan.textContent = "Libero — tocca per aggiungere";
      left.appendChild(labelSpan);
      slot.onclick = ()=>{ openAddModal(key, selectedResource, h, h+0.5); };
    }

    slot.appendChild(left);
    slot.appendChild(iconSpan);
    listEl.appendChild(slot);
  }

  renderMegaTimeline(key);
}

function renderMegaTimeline(key){
  const grid = document.getElementById("mega-timeline-grid");
  if(!grid) return;
  grid.innerHTML = "";

  const corner = document.createElement("div");
  corner.className = "mtl-corner";
  grid.appendChild(corner);

  for(let h=0; h<24; h++){
    const label = document.createElement("div");
    label.className = "mtl-hour-label";
    label.textContent = String(h).padStart(2,"0");
    grid.appendChild(label);
  }

  if(RESOURCES.length === 0){
    const empty = document.createElement("div");
    empty.className = "mtl-empty";
    empty.textContent = "Nessuna risorsa. Aggiungine una dal pannello Risorse.";
    grid.appendChild(empty);
    return;
  }

  const allItems = bookings[key] || [];

  RESOURCES.forEach(res=>{
    const label = document.createElement("div");
    label.className = "mtl-res-label";
    const colors = getResourceColor(res);
    label.innerHTML = "<span class='mtl-dot' style='background:"+colors[0]+";'></span>"+escapeHtml(res);
    grid.appendChild(label);

    const track = document.createElement("div");
    track.className = "mtl-track";

    const items = allItems.filter(b=>b.res===res);
    items.forEach(it=>{
      const block = document.createElement("div");
      block.className = "mtl-block";
      const startPct = (it.allDay ? 0 : it.start) / 24 * 100;
      const endPct = (it.allDay ? 24 : it.end) / 24 * 100;
      block.style.left = startPct + "%";
      block.style.width = (endPct - startPct) + "%";
      block.style.background = "linear-gradient(135deg,"+colors[0]+","+colors[1]+")";
      block.onclick = ()=>{ showEventDetail(key, it.id); };

      const nameEl = document.createElement("div");
      nameEl.className = "mtl-block-name";
      nameEl.textContent = it.label;
      const timeEl = document.createElement("div");
      timeEl.className = "mtl-block-time";
      timeEl.textContent = it.allDay ? "Tutto il giorno" : (fmtHourLabel(it.start)+"–"+fmtHourLabel(it.end));

      block.appendChild(nameEl);
      block.appendChild(timeEl);
      block.title = res + " — " + it.label + " (" + timeEl.textContent + ")";
      track.appendChild(block);
    });

    grid.appendChild(track);
  });

  if(sameDay(currentDate, todayDate())){
    const now = new Date();
    const pct = (now.getHours() + now.getMinutes()/60) / 24 * 100;
    const nowLine = document.createElement("div");
    nowLine.className = "mtl-now-line";
    nowLine.style.left = "calc(140px + (100% - 140px) * " + (pct/100) + ")";
    nowLine.style.top = "0";
    nowLine.style.bottom = "0";
    grid.appendChild(nowLine);
  }
}

function renderWeekView(){
  const listEl = document.getElementById("week-list");
  listEl.innerHTML = "";
  const monday = getMonday(currentDate);

  for(let i=0;i<7;i++){
    const d = new Date(monday); d.setDate(d.getDate()+i);
    const key = fmtDate(d);
    const items = (bookings[key]||[]).sort((a,b)=>a.start-b.start);
    const isToday = sameDay(d, todayDate());

    const dayBox = document.createElement("div");
    dayBox.className = "week-day";

    const headerEl = document.createElement("div");
    headerEl.className = "week-day-header" + (isToday ? " today" : "");
    const nameSpan = document.createElement("span");
    nameSpan.className = "wd-name";
    nameSpan.textContent = d.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"short"}).replace(/^\w/,c=>c.toUpperCase());
    const countSpan = document.createElement("span");
    countSpan.className = "wd-count";
    countSpan.textContent = items.length + (items.length===1 ? " elemento" : " elementi");
    headerEl.appendChild(nameSpan);
    headerEl.appendChild(countSpan);

    const mtWrap = document.createElement("div");
    mtWrap.className = "week-mini-timeline-wrap";
    const mtDiv = document.createElement("div");
    mtDiv.className = "mini-timeline";
    mtDiv.id = "week-mt-"+i;
    mtWrap.appendChild(mtDiv);

    const bodyEl = document.createElement("div");
    bodyEl.className = "week-day-body" + (openWeekDayKey===key ? " open" : "");

    if(items.length===0){
      const empty = document.createElement("div");
      empty.className = "week-empty";
      empty.textContent = "Nessun elemento";
      bodyEl.appendChild(empty);
    } else {
      items.forEach(it=>{
        const row = document.createElement("div");
        row.className = "week-item";
        row.style.cursor = "pointer";
        const info = document.createElement("span");
        const timeLabel = it.allDay ? "Tutto il giorno" : (fmtHourLabel(it.start)+"-"+fmtHourLabel(it.end));
        info.innerHTML = "<span class='wi-res'>"+it.res+"</span> &nbsp; <span class='wi-time'>"+timeLabel+" · "+escapeHtml(it.label)+"</span>";
        const del = document.createElement("span");
        del.className = "wi-del";
        del.innerHTML = "🗑";
        del.onclick = (e)=>{ e.stopPropagation(); if(confirm("Eliminare questo elemento?")) removeBooking(key, it.id); };
        row.onclick = ()=>{ showEventDetail(key, it.id); };
        row.appendChild(info);
        row.appendChild(del);
        bodyEl.appendChild(row);
      });
    }

    headerEl.onclick = ()=>{
      openWeekDayKey = (openWeekDayKey===key) ? null : key;
      renderWeekView();
    };

    dayBox.appendChild(headerEl);
    dayBox.appendChild(mtWrap);
    dayBox.appendChild(bodyEl);
    listEl.appendChild(dayBox);

    const mtEl = renderMiniTimeline(items, "week-mt-"+i);
    addNowLineToTimeline(mtEl, d);
  }
}

function escapeHtml(s){
  const div = document.createElement("div");
  div.textContent = s;
  return div.innerHTML;
}

function saveAgendaNotes(){
  const val = document.getElementById("agenda-notes-input").value;
  try{ localStorage.setItem("gestionale_agenda_notes", val); }catch(e){}
}
function loadAgendaNotes(){
  let val = "";
  try{ val = localStorage.getItem("gestionale_agenda_notes") || ""; }catch(e){}
  const inp = document.getElementById("agenda-notes-input");
  if(inp) inp.value = val;
}

let todoIdCounter = 1;
let todos = loadTodos();

function loadTodos(){
  try{
    const raw = localStorage.getItem("gestionale_todos");
    if(raw){
      const parsed = JSON.parse(raw);
      todoIdCounter = (parsed.reduce((max,t)=>Math.max(max,t.id),0)) + 1;
      return parsed;
    }
  }catch(e){}
  return [];
}
function saveTodos(){
  try{ localStorage.setItem("gestionale_todos", JSON.stringify(todos)); }catch(e){}
}
function addTodo(){
  const inp = document.getElementById("todo-input");
  const text = inp.value.trim();
  if(!text) return;
  todos.push({id: todoIdCounter++, text, done:false});
  saveTodos();
  inp.value = "";
  renderTodos();
}
function toggleTodo(id){
  const t = todos.find(x=>x.id===id);
  if(t){ t.done = !t.done; saveTodos(); renderTodos(); }
}
function deleteTodo(id){
  todos = todos.filter(x=>x.id!==id);
  saveTodos();
  renderTodos();
}
function renderTodos(){
  const listEl = document.getElementById("todo-list");
  if(!listEl) return;
  listEl.innerHTML = "";
  if(todos.length === 0){
    listEl.innerHTML = "<div class='todo-empty'>Nessun elemento da fare.</div>";
    return;
  }
  todos.forEach(t=>{
    const row = document.createElement("div");
    row.className = "todo-item" + (t.done ? " done" : "");
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = t.done;
    cb.onchange = ()=>toggleTodo(t.id);
    const txt = document.createElement("span");
    txt.className = "todo-text";
    txt.textContent = t.text;
    const del = document.createElement("span");
    del.className = "todo-del";
    del.textContent = "🗑";
    del.onclick = ()=>{ if(confirm("Eliminare questo elemento?")) deleteTodo(t.id); };
    row.appendChild(cb);
    row.appendChild(txt);
    row.appendChild(del);
    listEl.appendChild(row);
  });
}

function renderAgendaView(){
  loadAgendaNotes();
  renderTodos();
  const listEl = document.getElementById("agenda-list");
  listEl.innerHTML = "";

  const today = todayDate();
  const allDates = Object.keys(bookings)
    .filter(k => (bookings[k]||[]).length > 0)
    .filter(k => {
      const d = new Date(k+"T00:00:00");
      return d >= today || sameDay(d, today);
    })
    .sort();

  if(allDates.length === 0){
    listEl.innerHTML = "<div class='week-empty' style='padding:24px 0;'>Nessun evento in programma. Usa il pulsante + per aggiungerne uno.</div>";
    return;
  }

  allDates.forEach(key=>{
    const d = new Date(key+"T00:00:00");
    const items = (bookings[key]||[]).sort((a,b)=>a.start-b.start);
    const isToday = sameDay(d, today);

    const groupTitle = document.createElement("div");
    groupTitle.className = "agenda-date-title" + (isToday ? " today" : "");
    groupTitle.textContent = (isToday ? "Oggi — " : "") + d.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"}).replace(/^\w/,c=>c.toUpperCase());
    listEl.appendChild(groupTitle);

    items.forEach(it=>{
      const colors = getResourceColor(it.res);
      const row = document.createElement("div");
      row.className = "agenda-item";
      row.onclick = ()=>{ showEventDetail(key, it.id); };
      row.innerHTML = `
        <span class="agenda-dot" style="background:${colors[0]};"></span>
        <span class="agenda-time">${fmtHourLabel(it.start)}–${fmtHourLabel(it.end)}</span>
        <span class="agenda-info"><b>${escapeHtml(it.res)}</b> · ${escapeHtml(it.label)}</span>
      `;
      listEl.appendChild(row);
    });
  });
}

function renderMonthView(){
  const grid = document.getElementById("month-grid");
  grid.innerHTML = "";

  ["Lun","Mar","Mer","Gio","Ven","Sab","Dom"].forEach(dn=>{
    const el = document.createElement("div");
    el.className = "month-dow";
    el.textContent = dn;
    grid.appendChild(el);
  });

  const year = currentDate.getFullYear(), month = currentDate.getMonth();
  const firstOfMonth = new Date(year, month, 1);
  const startOffset = (firstOfMonth.getDay() || 7) - 1;
  const gridStart = new Date(firstOfMonth);
  gridStart.setDate(gridStart.getDate() - startOffset);

  const today = todayDate();

  for(let i=0;i<42;i++){
    const d = new Date(gridStart);
    d.setDate(d.getDate()+i);
    const key = fmtDate(d);
    const isOtherMonth = d.getMonth() !== month;
    const isToday = sameDay(d, today);
    const count = (bookings[key]||[]).length;

    const cell = document.createElement("div");
    cell.className = "month-cell" + (isOtherMonth ? " other-month" : "") + (isToday ? " today" : "");

    const num = document.createElement("div");
    num.className = "mc-num";
    num.textContent = d.getDate();
    cell.appendChild(num);

    if(count>0){
      const dots = document.createElement("div");
      dots.className = "month-dots";
      const maxDots = Math.min(count, 4);
      for(let k=0;k<maxDots;k++){
        const dot = document.createElement("span");
        dots.appendChild(dot);
      }
      cell.appendChild(dots);
    }

    cell.onclick = ()=>{ showMonthDayDetail(d); };
    grid.appendChild(cell);
  }

  showMonthDayDetail(today);
}

function showMonthDayDetail(d){
  const key = fmtDate(d);
  const items = (bookings[key]||[]).sort((a,b)=>a.start-b.start);
  const detailEl = document.getElementById("month-detail");
  const isToday = sameDay(d, todayDate());

  let html = "<div class='day-detail" + (isToday ? " is-today" : "") + "' data-count='" + items.length + (items.length===1 ? " elemento" : " elementi") + "'><h4>" +
    (isToday ? "<span class='today-badge'>OGGI</span> " : "") +
    d.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"}).replace(/^\w/,c=>c.toUpperCase()) +
    "</h4><div class='month-mini-timeline-wrap'><div class='mini-timeline' id='month-mt'></div></div>";

  if(items.length===0){
    html += "<div class='dd-empty'>Nessun elemento. Usa il pulsante + per aggiungerne uno.</div>";
  } else {
    items.forEach(it=>{
      const timeLabel = it.allDay ? "Tutto il giorno" : (fmtHourLabel(it.start)+"-"+fmtHourLabel(it.end));
      html += "<div class='dd-item'><span style='cursor:pointer;' onclick='showEventDetail(\""+key+"\","+it.id+")'><b>"+it.res+"</b> &nbsp; "+timeLabel+" · "+escapeHtml(it.label)+"</span><span class='dd-del' onclick='if(confirm(\"Eliminare questo elemento?\")){removeBooking(\""+key+"\","+it.id+"); showMonthDayDetailByKey(\""+key+"\");}'>🗑</span></div>";
    });
  }
  html += "</div>";
  detailEl.innerHTML = html;

  const mtEl = renderMiniTimeline(items, "month-mt");
  addNowLineToTimeline(mtEl, d);
}
function showMonthDayDetailByKey(key){
  const parts = key.split("-").map(Number);
  showMonthDayDetail(new Date(parts[0], parts[1]-1, parts[2]));
}

function addBooking(dateKey, res, start, end, label, isAllDay){
  if(!bookings[dateKey]) bookings[dateKey] = [];
  bookings[dateKey].push({id: idCounter++, res, start:+start, end:+end, label: label || res, allDay: !!isAllDay});
  persist();
  renderAll();
  refreshSidePanel();
}
function removeBooking(dateKey, id){
  if(!bookings[dateKey]) return;
  bookings[dateKey] = bookings[dateKey].filter(b=>b.id!==id);
  persist();
  renderAll();
  refreshSidePanel();
}

function hourToTimeStr(h){
  const hh = Math.floor(h);
  const mm = Math.round((h-hh)*60);
  return String(hh).padStart(2,"0")+":"+String(mm).padStart(2,"0");
}
function timeStrToHour(s){
  const parts = (s||"00:00").split(":").map(Number);
  return parts[0] + (parts[1]||0)/60;
}
function fmtHourLabel(h){
  return hourToTimeStr(h);
}

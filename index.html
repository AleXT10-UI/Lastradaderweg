  renderAll();
  refreshSidePanel();
}

/* Apre il calendario nativo del sistema (input type="date") sincronizzato
   con il giorno attualmente mostrato, per permettere di saltare a
   qualsiasi giorno/mese/anno con pochi tap invece di usare solo le frecce
   avanti/indietro una alla volta. */
function openDatePicker(){
  const picker = document.getElementById("date-picker-input");
  if(!picker) return;
  picker.value = fmtDate(currentDate);
  if(picker.showPicker){
    try{ picker.showPicker(); return; }catch(e){}
  }
  picker.focus();
  picker.click();
}
function onDatePickerChange(value){
  if(!value) return;
  const parts = value.split("-").map(Number);
  currentDate = new Date(parts[0], parts[1]-1, parts[2]);
  renderAll();
  refreshSidePanel();
}

function renderAll(){
  updateDateLabel();
  if(currentView==="day") renderDayView();
  else if(currentView==="week"){
    renderWeekView();
    if(window.matchMedia("(min-width:1100px)").matches) renderMonthView();
  }
  else if(currentView==="agenda") renderAgendaView();
  updateRightColOffset();
  syncDayColumnsHeight();
  syncWeekColumnsHeight();
}

/* Misura l'altezza reale di "Oggi + data" e della card dettaglio/mese, e la
   usa come margine negativo per far risalire la colonna destra (Risorse in
   vista Giorno, calendario mese in vista Settimana) fino alla stessa Y della
   barra Giorno/Settimana/Agenda. Ricalcolato ad ogni render perché il
   contenuto di quelle card cambia dimensione in base al numero di eventi. */
function updateRightColOffset(){
  if(!window.matchMedia("(min-width:1100px)").matches){
    document.documentElement.style.setProperty("--right-col-offset", "0px");
    return;
  }
  const dateNav = document.querySelector(".date-nav");
  const sideCard = document.getElementById("side-detail-card");
  if(!dateNav || !sideCard) return;

  const dateNavStyle = getComputedStyle(dateNav);
  const sideCardStyle = getComputedStyle(sideCard);
  const dateNavHeight = dateNav.offsetHeight + parseFloat(dateNavStyle.marginTop) + parseFloat(dateNavStyle.marginBottom);
  const sideCardHeight = sideCard.offsetHeight + parseFloat(sideCardStyle.marginTop) + parseFloat(sideCardStyle.marginBottom);
  const total = dateNavHeight + sideCardHeight;

  document.documentElement.style.setProperty("--right-col-offset", (-total) + "px");
}
window.addEventListener("resize", ()=>{
  if(typeof currentUser !== "undefined" && currentUser) updateRightColOffset();
});

/* Fa sì che la card "Risorse/Duplica giorno" abbia la STESSA altezza totale
   della mega-timeline a fianco, senza stirare la cornice: si misura
   l'altezza reale della timeline (che varia col numero di risorse) e si
   sottrae lo spazio già occupato da toolbar/mini-timeline/countdown dentro
   la card Risorse, ottenendo l'altezza esatta da dare allo slot-list. */
function syncDayColumnsHeight(){
  requestAnimationFrame(()=>{
    if(!window.matchMedia("(min-width:1100px)").matches){
      document.documentElement.style.setProperty("--day-col-height", "560px");
      return;
    }
    const timelineCard = document.getElementById("mega-timeline-card");
    const viewDayEl = document.getElementById("view-day-el");
    if(!timelineCard || !viewDayEl) return;

    const timelineHeight = timelineCard.offsetHeight;
    if(!timelineHeight) return;

    const toolbar = viewDayEl.querySelector(".day-toolbar");
    const miniWrap = viewDayEl.querySelector(".mini-timeline-wrap");
    const chips = viewDayEl.querySelector(".allday-chips");
    const countdown = viewDayEl.querySelector(".day-countdown");

    let usedHeight = 0;
    [toolbar, miniWrap, chips, countdown].forEach(el=>{
      if(el && el.offsetParent !== null){ usedHeight += el.offsetHeight; }
    });

    const available = Math.max(160, timelineHeight - usedHeight);
    document.documentElement.style.setProperty("--day-col-height", available + "px");
  });
}
window.addEventListener("resize", ()=>{
  if(typeof currentUser !== "undefined" && currentUser) syncDayColumnsHeight();
});

/* Sincronizza l'altezza massima della lista "Lunedì...Domenica" (colonna
   destra in vista Settimana) con l'altezza reale del calendario mensile
   a fianco (colonna sinistra), così la card destra resta compatta e
   allineata in Y invece di espandersi oltre il calendario. */
function syncWeekColumnsHeight(){
  requestAnimationFrame(()=>{
    if(!window.matchMedia("(min-width:1100px)").matches){
      document.documentElement.style.setProperty("--week-col-height", "640px");
      return;
    }
    const monthCard = document.getElementById("view-month-el");
    if(!monthCard) return;
    const monthHeight = monthCard.offsetHeight;
    if(!monthHeight) return;
    document.documentElement.style.setProperty("--week-col-height", monthHeight + "px");
  });
}
window.addEventListener("resize", ()=>{
  if(typeof currentUser !== "undefined" && currentUser) syncWeekColumnsHeight();
});

function updateDateLabel(){
  const el = document.getElementById("date-label");
  if(currentView==="day"){
    el.textContent = currentDate.toLocaleDateString(currentLocale(),{weekday:"long",day:"numeric",month:"long"}).replace(/^\w/,c=>c.toUpperCase());
  } else if(currentView==="week"){
    const monday = getMonday(currentDate);
    const sunday = new Date(monday); sunday.setDate(sunday.getDate()+6);
    el.textContent = monday.toLocaleDateString(currentLocale(),{day:"numeric",month:"short"}) + " – " + sunday.toLocaleDateString(currentLocale(),{day:"numeric",month:"short",year:"numeric"});
  } else {
    el.textContent = currentDate.toLocaleDateString(currentLocale(),{month:"long",year:"numeric"}).replace(/^\w/,c=>c.toUpperCase());
  }
  const picker = document.getElementById("date-picker-input");
  if(picker) picker.value = fmtDate(currentDate);
}

function getMonday(d){
  const nd = new Date(d);
  const day = nd.getDay() || 7;
  nd.setDate(nd.getDate() - day + 1);
  nd.setHours(0,0,0,0);
  return nd;
}

function renderMiniTimeline(dayBookings, containerId){
  const el = document.getElementById(containerId || "mini-timeline");
  if(!el) return;
  el.innerHTML = "";

  for(let h=TL_START_HOUR+3; h<TL_END_HOUR; h+=3){
    const tick = document.createElement("div");
    tick.className = "mt-tick";
    tick.style.left = hourToPct(h)+"%";
    el.appendChild(tick);
  }

  dayBookings.forEach(b=>{
    // Salta gli eventi fuori dall'intervallo orario visibile.
    if(b.end <= TL_START_HOUR || b.start >= TL_END_HOUR) return;
    const seg = document.createElement("div");
    seg.className = "mt-segment";
    const leftPct = hourToPct(b.start);
    const widthPct = hourToPct(b.end) - leftPct;
    seg.style.left = leftPct+"%";
    seg.style.width = widthPct+"%";
    const colors = getResourceColor(b.res);
    seg.style.background = "linear-gradient(135deg,"+colors[0]+","+colors[1]+")";
    seg.title = b.res + " — " + b.label + " (" + fmtHourLabel(b.start)+"-"+fmtHourLabel(b.end)+")";
    if(widthPct > 6){
      const txt = document.createElement("span");
      txt.textContent = fmtHourLabel(b.start)+"-"+fmtHourLabel(b.end);
      seg.appendChild(txt);
    }
    seg.onclick = ()=>{
      const target = document.getElementById("slot-h"+Math.floor(b.start*2));
      if(target) target.scrollIntoView({behavior:"smooth", block:"center"});
    };
    el.appendChild(seg);
  });

  return el;
}

function addNowLineToTimeline(el, dateForCheck){
  if(sameDay(dateForCheck, todayDate())){
    const now = new Date();
    const nowHour = now.getHours() + now.getMinutes()/60;
    if(nowHour < TL_START_HOUR || nowHour > TL_END_HOUR) return;
    const nowLine = document.createElement("div");
    nowLine.className = "mt-now";
    nowLine.style.left = hourToPct(nowHour)+"%";
    el.appendChild(nowLine);
  }
}

function renderDayView(){
  const tabsEl = document.getElementById("resource-tabs");
  tabsEl.innerHTML = "";

  const allBtn = document.createElement("button");
  allBtn.textContent = t("day.all");
  allBtn.className = selectedResource === "__ALL__" ? "active" : "";
  allBtn.onclick = ()=>{ selectedResource = "__ALL__"; renderDayView(); };
  tabsEl.appendChild(allBtn);

  RESOURCES.forEach(r=>{
    const b = document.createElement("button");
    const colors = getResourceColor(r);
    const dot = document.createElement("span");
    dot.style.display = "inline-block";
    dot.style.width = "8px";
    dot.style.height = "8px";
    dot.style.borderRadius = "50%";
    dot.style.marginRight = "6px";
    dot.style.background = colors[0];
    dot.style.verticalAlign = "middle";
    b.appendChild(dot);
    b.appendChild(document.createTextNode(r));
    b.className = r===selectedResource ? "active" : "";
    b.onclick = ()=>{ selectedResource = r; renderDayView(); };
    tabsEl.appendChild(b);
  });

  const listEl = document.getElementById("slot-list");
  listEl.innerHTML = "";
  const key = fmtDate(currentDate);
  const allDayItemsAll = selectedResource === "__ALL__"
    ? (bookings[key]||[]).filter(b=>b.allDay)
    : (bookings[key]||[]).filter(b=>b.allDay && b.res===selectedResource);
  const dayBookings = (selectedResource === "__ALL__"
    ? (bookings[key]||[]).slice()
    : (bookings[key]||[]).filter(b=>b.res===selectedResource))
    .filter(b=>!b.allDay)
    .sort((a,b)=>a.start-b.start);

  const mtEl = renderMiniTimeline(dayBookings, "mini-timeline");
  addNowLineToTimeline(mtEl, currentDate);

  // Chip compatti per gli elementi "tutto il giorno" — non occupano slot orari
  const alldayWrap = document.getElementById("allday-chips");
  alldayWrap.innerHTML = "";
  if(allDayItemsAll.length === 0){
    alldayWrap.style.display = "none";
  } else {
    alldayWrap.style.display = "flex";
    allDayItemsAll.forEach(it=>{
      const colors = getResourceColor(it.res);
      const chip = document.createElement("div");
      chip.className = "allday-chip";
      chip.style.background = "linear-gradient(135deg,"+colors[0]+","+colors[1]+")";
      chip.innerHTML = "<span>"+icon("calendar",12)+" "+(selectedResource==="__ALL__" ? escapeHtml(it.res)+": " : "")+escapeHtml(it.label)+"</span>";
      chip.onclick = ()=>{ showEventDetail(key, it.id); };
      alldayWrap.appendChild(chip);
    });
  }

  const isToday = sameDay(currentDate, todayDate());
  let nowHourDecimal = null;
  if(isToday){
    const now = new Date();
    nowHourDecimal = now.getHours() + now.getMinutes()/60;
  }

  // Countdown al prossimo elemento della risorsa selezionata
  const countdownEl = document.getElementById("day-countdown");
  if(isToday){
    const next = dayBookings.filter(b=>b.start > nowHourDecimal).sort((a,b)=>a.start-b.start)[0];
    const ongoing = dayBookings.find(b=> nowHourDecimal>=b.start && nowHourDecimal<b.end);
    if(ongoing){
      const remainMin = Math.round((ongoing.end - nowHourDecimal)*60);
      countdownEl.style.display = "block";
      countdownEl.className = "day-countdown ongoing";
      countdownEl.textContent = t("day.ongoing") + ongoing.label + t("day.ongoingEnds") + remainMin + t("day.minutes");
    } else if(next){
      const diffMin = Math.round((next.start - nowHourDecimal)*60);
      countdownEl.style.display = "block";
      countdownEl.className = "day-countdown upcoming";
      countdownEl.textContent = t("day.upcomingIn") + diffMin + t("day.upcomingTo") + next.label + " (" + fmtHourLabel(next.start) + ")";
    } else {
      countdownEl.style.display = "none";
    }
  } else {
    countdownEl.style.display = "none";
  }

  let nowLineInserted = false;
  for(let hh=TL_START_HOUR*2; hh<TL_END_HOUR*2; hh++){
    const h = hh * 0.5;

    if(isToday && !nowLineInserted && nowHourDecimal < h){
      const nowMarker = document.createElement("div");
      nowMarker.className = "slot-now-line";
      nowMarker.innerHTML = "<span>"+t("day.now")+fmtHourLabel(nowHourDecimal)+"</span>";
      listEl.appendChild(nowMarker);
      nowLineInserted = true;
    }

    const coveringAll = dayBookings.filter(b=> h>=b.start && h<b.end);
    const covering = coveringAll[0];
    const slot = document.createElement("div");
    slot.className = "slot " + (covering ? "busy" : "free");
    slot.id = "slot-h"+hh;

    const timeSpan = document.createElement("span");
    timeSpan.className = "slot-time";
    timeSpan.textContent = fmtHourLabel(h) + " – " + fmtHourLabel(h+0.5);

    const labelSpan = document.createElement("span");
    labelSpan.className = "slot-label";

    const iconSpan = document.createElement("i");
    iconSpan.className = "slot-icon";
    iconSpan.innerHTML = covering ? icon("lock",15) : icon("plus",15);

    const left = document.createElement("div");
    left.style.display="flex"; left.style.flexDirection="column"; left.style.gap="2px";
    left.appendChild(timeSpan);

    if(covering){
      if(coveringAll.length > 1){
        labelSpan.textContent = coveringAll.map(b=>b.res+": "+b.label).join(" · ");
      } else if(selectedResource === "__ALL__"){
        labelSpan.textContent = covering.res + ": " + covering.label;
      } else {
        labelSpan.textContent = covering.label;
      }
      left.appendChild(labelSpan);
      slot.onclick = ()=>{ showEventDetail(key, covering.id); };
    } else {
      labelSpan.textContent = t("day.free");
      left.appendChild(labelSpan);
      slot.onclick = ()=>{ openAddModal(key, selectedResource, h, h+0.5); };
    }

    slot.appendChild(left);
    slot.appendChild(iconSpan);
    listEl.appendChild(slot);
  }

  renderMegaTimeline(key);
}

/* Tooltip custom che segue la posizione del mouse mentre è sopra
   l'elemento, invece del title nativo del browser (statico, lento a
   comparire, non personalizzabile). Usato per i nomi degli eventi nella
   mega-timeline giornaliera. */
let followingTooltipEl = null;
function getFollowingTooltip(){
  if(!followingTooltipEl){
    followingTooltipEl = document.createElement("div");
    followingTooltipEl.className = "following-tooltip";
    document.body.appendChild(followingTooltipEl);
  }
  return followingTooltipEl;
}
function attachFollowingTooltip(el, text){
  el.addEventListener("mouseenter", ()=>{
    const tip = getFollowingTooltip();
    tip.textContent = text;
    tip.classList.add("visible");
  });
  el.addEventListener("mousemove", (e)=>{
    const tip = getFollowingTooltip();
    tip.style.left = (e.clientX + 14) + "px";
    tip.style.top = (e.clientY + 18) + "px";
  });
  el.addEventListener("mouseleave", ()=>{
    const tip = getFollowingTooltip();
    tip.classList.remove("visible");
  });
}

function renderMegaTimeline(key){
  const grid = document.getElementById("mega-timeline-grid");
  if(!grid) return;
  grid.innerHTML = "";

  const corner = document.createElement("div");
  corner.className = "mtl-corner";
  grid.appendChild(corner);

  for(let h=TL_START_HOUR; h<TL_END_HOUR; h++){
    const label = document.createElement("div");
    label.className = "mtl-hour-label";
    label.textContent = String(h).padStart(2,"0");
    grid.appendChild(label);
  }

  if(RESOURCES.length === 0){
    const empty = document.createElement("div");
    empty.className = "mtl-empty";
    empty.textContent = t("day.noResources");
    grid.appendChild(empty);
    return;
  }

  const allItems = bookings[key] || [];

  RESOURCES.forEach(res=>{
    const label = document.createElement("div");
    label.className = "mtl-res-label";
    const colors = getResourceColor(res);
    label.innerHTML = "<span class='mtl-dot' style='background:"+colors[0]+";'></span>"+escapeHtml(res);
    grid.appendChild(label);

    const track = document.createElement("div");
    track.className = "mtl-track";

    const items = allItems.filter(b=>b.res===res);
    items.forEach(it=>{
      const rawStart = it.allDay ? TL_START_HOUR : it.start;
      const rawEnd = it.allDay ? TL_END_HOUR : it.end;
      // Salta gli eventi che cadono interamente fuori dall'intervallo
      // orario visibile: altrimenti verrebbero schiacciati sul bordo.
      if(rawEnd <= TL_START_HOUR || rawStart >= TL_END_HOUR) return;

      const block = document.createElement("div");
      block.className = "mtl-block";
      const startPct = hourToPct(rawStart);
      const endPct = hourToPct(rawEnd);
      block.style.left = startPct + "%";
      block.style.width = (endPct - startPct) + "%";
      block.style.background = "linear-gradient(135deg,"+colors[0]+","+colors[1]+")";
      block.onclick = ()=>{ showEventDetail(key, it.id); };

      const nameEl = document.createElement("div");
      nameEl.className = "mtl-block-name";
      nameEl.textContent = it.label;
      const timeEl = document.createElement("div");
      timeEl.className = "mtl-block-time";
      timeEl.textContent = it.allDay ? "Tutto il giorno" : (fmtHourLabel(it.start)+"–"+fmtHourLabel(it.end));

      block.appendChild(nameEl);
      block.appendChild(timeEl);
      const tooltipText = res + " — " + it.label + " (" + timeEl.textContent + ")";
      attachFollowingTooltip(block, tooltipText);
      track.appendChild(block);
    });

    grid.appendChild(track);
  });

  if(sameDay(currentDate, todayDate())){
    const now = new Date();
    const nowHour = now.getHours() + now.getMinutes()/60;
    // Mostra la linea "ora" solo se l'orario attuale ricade nell'intervallo
    // visibile della timeline.
    if(nowHour >= TL_START_HOUR && nowHour <= TL_END_HOUR){
    const pct = hourToPct(nowHour);
    const nowLine = document.createElement("div");
    nowLine.className = "mtl-now-line";
    // La larghezza della colonna etichetta risorsa cambia per breakpoint:
    // 90px su mobile, 130px da 1100px in su (vedi .mega-timeline-grid).
    const labelColWidth = window.matchMedia("(min-width:1100px)").matches ? 130 : 90;
    nowLine.style.left = "calc(" + labelColWidth + "px + (100% - " + labelColWidth + "px) * " + (pct/100) + ")";
    nowLine.style.top = "0";
    nowLine.style.bottom = "0";
    grid.appendChild(nowLine);
    }
  }
}

let todoIdCounter = 1;
let todos = loadTodos();

function loadTodos(){
  try{
    const raw = localStorage.getItem(userKey("gestionale_todos"));
    if(raw){
      const parsed = JSON.parse(raw);
      todoIdCounter = (parsed.reduce((max,t)=>Math.max(max,t.id),0)) + 1;
      return parsed;
    }
  }catch(e){}
  return [];
}
function saveTodos(){
  try{ localStorage.setItem(userKey("gestionale_todos"), JSON.stringify(todos)); }catch(e){}
}
function addTodo(){
  const inp = document.getElementById("todo-input");
  const text = inp.value.trim();
  if(!text) return;
  todos.push({id: todoIdCounter++, text, done:false});
  saveTodos();
  inp.value = "";
  renderTodos();
}
function toggleTodo(id){
  const t = todos.find(x=>x.id===id);
  if(t){ t.done = !t.done; saveTodos(); renderTodos(); }
}
function deleteTodo(id){
  todos = todos.filter(x=>x.id!==id);
  saveTodos();
  renderTodos();
}
function renderTodos(){
  const listEl = document.getElementById("todo-list");
  if(!listEl) return;
  listEl.innerHTML = "";
  if(todos.length === 0){
    listEl.innerHTML = "<div class='todo-empty'>Nessun elemento da fare.</div>";
    return;
  }
  todos.forEach(todo=>{
    const row = document.createElement("div");
    row.className = "todo-item" + (todo.done ? " done" : "");
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = todo.done;
    cb.onchange = ()=>toggleTodo(todo.id);
    const txt = document.createElement("span");
    txt.className = "todo-text";
    txt.textContent = todo.text;
    const del = document.createElement("span");
    del.className = "todo-del";
    del.innerHTML = icon("trash",14);
    del.onclick = ()=>{ deleteTodo(todo.id); };
    row.appendChild(cb);
    row.appendChild(txt);
    row.appendChild(del);
    listEl.appendChild(row);
  });
}

    .filter(k => (bookings[k]||[]).length > 0)

        <span class="agenda-info"><b>${escapeHtml(it.res)}</b> · ${escapeHtml(it.label)}</span>
      `;
      listEl.appendChild(row);
    });
  });
}

function renderMonthView(){
  const grid = document.getElementById("month-grid");
  grid.innerHTML = "";

  [t("month.dow.mon"),t("month.dow.tue"),t("month.dow.wed"),t("month.dow.thu"),t("month.dow.fri"),t("month.dow.sat"),t("month.dow.sun")].forEach(dn=>{
    const el = document.createElement("div");
    el.className = "month-dow";
    el.textContent = dn;
    grid.appendChild(el);
  });

  const year = currentDate.getFullYear(), month = currentDate.getMonth();
  const firstOfMonth = new Date(year, month, 1);
  const startOffset = (firstOfMonth.getDay() || 7) - 1;
  const gridStart = new Date(firstOfMonth);
  gridStart.setDate(gridStart.getDate() - startOffset);

  const today = todayDate();

  for(let i=0;i<42;i++){
    const d = new Date(gridStart);
    d.setDate(d.getDate()+i);
    const key = fmtDate(d);
    const isOtherMonth = d.getMonth() !== month;
    const isToday = sameDay(d, today);
    const count = (bookings[key]||[]).length;

    const cell = document.createElement("div");
    cell.className = "month-cell" + (isOtherMonth ? " other-month" : "") + (isToday ? " today" : "");

    const num = document.createElement("div");
    num.className = "mc-num";
    num.textContent = d.getDate();
    cell.appendChild(num);

    if(count>0){
      const dots = document.createElement("div");
      dots.className = "month-dots";
      const maxDots = Math.min(count, 4);
      for(let k=0;k<maxDots;k++){
        const dot = document.createElement("span");
        dots.appendChild(dot);
      }
      cell.appendChild(dots);
    }

    cell.onclick = ()=>{ showMonthDayDetail(d); };
    grid.appendChild(cell);
  }

  showMonthDayDetail(today);
}

function showMonthDayDetail(d){
  const key = fmtDate(d);
  const items = (bookings[key]||[]).sort((a,b)=>a.start-b.start);
  const detailEl = document.getElementById("month-detail");
  const isToday = sameDay(d, todayDate());

  let html = "<div class='day-detail" + (isToday ? " is-today" : "") + "' data-count='" + items.length + (items.length===1 ? t("week.item") : t("week.items")) + "'><h4>" +
    (isToday ? "<span class='today-badge'>"+t("detail.today")+"</span> " : "") +
    d.toLocaleDateString(currentLocale(),{weekday:"long",day:"numeric",month:"long"}).replace(/^\w/,c=>c.toUpperCase()) +
    "</h4><div class='month-mini-timeline-wrap'><div class='mini-timeline' id='month-mt'></div></div>";

  if(items.length===0){
    html += "<div class='dd-empty'>"+t("detail.empty")+"</div>";
  } else {
    items.forEach(it=>{
      const timeLabel = it.allDay ? t("detail.allDay") : (fmtHourLabel(it.start)+"-"+fmtHourLabel(it.end));
      html += "<div class='dd-item'><span style='cursor:pointer;' onclick='showEventDetail(\""+key+"\","+it.id+")'><b>"+it.res+"</b> &nbsp; "+timeLabel+" · "+escapeHtml(it.label)+"</span><span class='dd-del' onclick='removeBooking(\""+key+"\","+it.id+"); showMonthDayDetailByKey(\""+key+"\");'>"+icon("trash",13)+"</span></div>";
    });

  html += "</div>";

}
function showMonthDayDetailByKey(key){
  const parts = key.split("-").map(Number);
  showMonthDayDetail(new Date(parts[0], parts[1]-1, parts[2]));
}

function addBooking(dateKey, res, start, end, label, isAllDay){
  if(!bookings[dateKey]) bookings[dateKey] = [];
  bookings[dateKey].push({id: idCounter++, res, start:+start, end:+end, label: label || res, allDay: !!isAllDay});

  renderAll();

function removeBooking(dateKey, id){
  if(!bookings[dateKey]) return;
  bookings[dateKey] = bookings[dateKey].filter(b=>b.id!==id);
  persist();
  renderAll();
  refreshSidePanel();
}

function hourToTimeStr(h){
  const hh = Math.floor(h);
  const mm = Math.round((h-hh)*60);
  return String(hh).padStart(2,"0")+":"+String(mm).padStart(2,"0");
}
function timeStrToHour(s){
  const parts = (s||"00:00").split(":").map(Number);
  return parts[0] + (parts[1]||0)/60;
}
function fmtHourLabel(h){
  return hourToTimeStr(h);
}

let dragSrcIndex = null;

function renderManageResourcesList(){
  const listEl = document.getElementById("res-manage-list");
  listEl.innerHTML = "";

  RESOURCES.forEach((res, idx)=>{
    const colors = getResourceColor(res);
    const item = document.createElement("div");
    item.className = "res-manage-item";
    item.draggable = true;
    item.dataset.index = idx;

    item.innerHTML = `
      <span class="rm-handle" aria-hidden="true">${icon("gripVertical",14)}</span>
      <input type="color" class="rm-color-picker" value="${colors[0]}" title="${t('resources.title')}">
      <span class="rm-name">${escapeHtml(res)}</span>
      <span class="rm-arrows">
        <button class="rm-arrow-up" title="↑" ${idx===0 ? "disabled" : ""}>&#9650;</button>
        <button class="rm-arrow-down" title="↓" ${idx===RESOURCES.length-1 ? "disabled" : ""}>&#9660;</button>
      </span>
      <span class="rm-delete" title="${t('detail.delete')}">${icon("trash",15)}</span>
    `;

    item.querySelector(".rm-color-picker").addEventListener("input",(e)=>{
      setResourceColor(res, e.target.value);
      renderDayView();
    });

    item.querySelector(".rm-arrow-up").onclick = ()=>{
      if(idx===0) return;
      [RESOURCES[idx-1], RESOURCES[idx]] = [RESOURCES[idx], RESOURCES[idx-1]];
      saveResources();
      renderManageResourcesList();
    };
    item.querySelector(".rm-arrow-down").onclick = ()=>{
      if(idx===RESOURCES.length-1) return;
      [RESOURCES[idx+1], RESOURCES[idx]] = [RESOURCES[idx], RESOURCES[idx+1]];
      saveResources();
      renderManageResourcesList();
    };

    item.querySelector(".rm-delete").onclick = ()=>{
      if(RESOURCES.length <= 1){
        alert(t("resources.onlyOne"));
        return;
      }
      RESOURCES = RESOURCES.filter(r=>r!==res);
      saveResources();
      if(selectedResource === res) selectedResource = RESOURCES[0];
      renderManageResourcesList();
    };

    item.addEventListener("dragstart",(e)=>{
      dragSrcIndex = idx;
      item.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });
    item.addEventListener("dragend",()=>{
      item.classList.remove("dragging");
    });
    item.addEventListener("dragover",(e)=>{ e.preventDefault(); });
    item.addEventListener("drop",(e)=>{
      e.preventDefault();
      const targetIndex = idx;
      if(dragSrcIndex === null || dragSrcIndex === targetIndex) return;
      const moved = RESOURCES.splice(dragSrcIndex, 1)[0];
      RESOURCES.splice(targetIndex, 0, moved);
      saveResources();
      renderManageResourcesList();
    });

    listEl.appendChild(item);
  });
}

      <span style="width:12px;height:12px;border-radius:50%;background:${colors[0]};display:inline-block;"></span>

function openAddModal(prefDate, prefRes, prefStart, prefEnd){
  const dateInp = document.getElementById("modal-date");
  const resSel = document.getElementById("modal-resource");
  resSel.innerHTML = "";
  RESOURCES.forEach(r=>{
    const o = document.createElement("option"); o.value=r; o.textContent=r;
    resSel.appendChild(o);
  });

  dateInp.value = prefDate || fmtDate(currentDate);
  resSel.value = prefRes || selectedResource;
  document.getElementById("modal-start").value = hourToTimeStr(prefStart!==undefined ? prefStart : 9);
  document.getElementById("modal-end").value = hourToTimeStr(prefEnd!==undefined ? prefEnd : 11);
  document.getElementById("modal-label").value = "";

  document.getElementById("modal-overlay").classList.add("open");
}

  document.getElementById("modal-overlay").classList.remove("open");
}
function onAllDayToggle(){
  const isAllDay = document.getElementById("modal-allday").checked;
  document.getElementById("modal-time-row").style.display = isAllDay ? "none" : "flex";
}

function confirmAddModal(){
  const date = document.getElementById("modal-date").value;
  const res = document.getElementById("modal-resource").value;
  const isAllDay = document.getElementById("modal-allday").checked;
  const start = isAllDay ? 0 : timeStrToHour(document.getElementById("modal-start").value);
  const end = isAllDay ? 24 : timeStrToHour(document.getElementById("modal-end").value);
  const label = document.getElementById("modal-label").value.trim();

  if(!date){ alert(t("modal.selectDate")); return; }
  if(!isAllDay && end<=start){ alert(t("modal.endAfterStart")); return; }

  closeAddModal();
  addBooking(date, res, start, end, label, isAllDay);
}

function applyTheme(isDark){
  document.body.classList.toggle("dark-mode", isDark);
  document.documentElement.classList.toggle("dark-mode", isDark);
  document.getElementById("theme-toggle").innerHTML = isDark ? icon("sun",16) : icon("moon",16);
  const loginToggle = document.getElementById("login-theme-toggle");
  if(loginToggle) loginToggle.innerHTML = isDark ? icon("sun",16) : icon("moon",16);
  const metaTheme = document.getElementById("meta-theme-color");
  if(metaTheme) metaTheme.setAttribute("content", isDark ? "#151412" : "#f4f3f1");
  try{ localStorage.setItem("gestionale_theme", isDark ? "dark" : "light"); }catch(e){}
}
function toggleTheme(){
  applyTheme(!document.body.classList.contains("dark-mode"));
}
function initTheme(){
  let saved = null;
  try{ saved = localStorage.getItem("gestionale_theme"); }catch(e){}
  applyTheme(saved === "dark");
}
initTheme();


document.addEventListener("keydown", (e)=>{
  const tag = (document.activeElement && document.activeElement.tagName) || "";
  const isTyping = tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA";

  if(e.key === "/" && !isTyping){
    e.preventDefault();
    const bar = document.getElementById("search-bar");
    if(bar.style.display === "none") toggleSearchBar();
    else document.getElementById("search-input").focus();
    return;
  }
  if(isTyping) return;

  if(e.key === "t" || e.key === "T"){ goToday(); }
  else if(e.key === "ArrowLeft"){ navPrev(); }
  else if(e.key === "ArrowRight"){ navNext(); }
  else if(e.key === "Escape"){
    closeAddModal();
    closeEventDetail();
    const bar = document.getElementById("search-bar");
    if(bar.style.display !== "none") toggleSearchBar();
    document.activeElement && document.activeElement.blur();
  }
});

/* =========================================================================
   SISTEMA ANNUNCI
   Solo Admin (o Dario) può scrivere un annuncio. Tutti gli utenti loggati lo
   vedono e possono mettere un segno di spunta "letto". Solo Admin e Dario
   vedono quante persone hanno messo il segno di spunta.
   ========================================================================= */

function loadAnnouncement(){
  try{
    const raw = localStorage.getItem("gestionale_announcement");
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return null;
}
function saveAnnouncement(ann){
  try{ localStorage.setItem("gestionale_announcement", JSON.stringify(ann)); }catch(e){}
}

function canWriteAnnouncement(){
  if(isAdmin() || isSpecialViewer()) return true;
  if(!currentUser) return false;
  const users = loadUsers();
  return !!(users[currentUser] && users[currentUser].canAnnounce);
}

function refreshAnnouncementBadge(){
  const badge = document.getElementById("announce-badge");
  const banner = document.getElementById("announce-banner");
  const bannerText = document.getElementById("announce-banner-text");
  const bannerCheck = document.getElementById("announce-banner-check");
  const ann = loadAnnouncement();

  if(!badge) return;

  if(!ann || !currentUser){
    badge.style.display = "none";
    if(banner) banner.classList.remove("visible");
    return;
  }

  const alreadyChecked = (ann.checkedBy || []).includes(currentUser);
  badge.style.display = alreadyChecked ? "none" : "flex";
  badge.textContent = "!";

  if(banner && bannerText){
    banner.classList.add("visible");
    bannerText.textContent = ann.text;
    bannerText.onclick = openAnnouncementsPanel;
    if(bannerCheck){
      bannerCheck.style.background = alreadyChecked ? "var(--btn-secondary-bg)" : "var(--accent)";
      bannerCheck.innerHTML = icon("check",13);
      bannerCheck.title = alreadyChecked ? "Già letto" : "Segna come letto";
    }
  }
}

function openAnnouncementsPanel(){
  renderAnnouncementPanel();
  document.getElementById("announce-overlay").classList.add("open");
}
function closeAnnouncementsPanel(){
  document.getElementById("announce-overlay").classList.remove("open");
}

function renderAnnouncementPanel(){
  const content = document.getElementById("announce-modal-content");
  const ann = loadAnnouncement();
  const canWrite = canWriteAnnouncement();
  const canSeeCounts = canSeeCheckmarkCounts();
  const canManageThis = ann && (isAdmin() || ann.author === currentUser);

  let html = "<h3 style='display:flex;align-items:center;gap:8px;'>"+icon("megaphone",18)+t("announce.title")+"</h3>";

  if(!ann){
    html += "<div class='todo-empty' style='margin-bottom:14px;'>"+t("announce.none")+"</div>";
  } else {
    const alreadyChecked = (ann.checkedBy || []).includes(currentUser);
    html += `
      <div class="day-detail" style="margin-top:0;margin-bottom:16px;border:1px solid var(--border);">
        <h4 style="display:block;">${escapeHtml(ann.date)}</h4>
        <p style="font-size:14px;color:var(--text-main);white-space:pre-wrap;margin:0 0 14px;">${escapeHtml(ann.text)}</p>
        <label style="display:flex;align-items:center;gap:8px;font-weight:600;cursor:pointer;">
          <input type="checkbox" ${alreadyChecked ? "checked" : ""} onchange="toggleAnnouncementCheck()" style="width:18px;height:18px;accent-color:var(--accent);">
          ${t("announce.markRead")}
        </label>
    `;
    if(canSeeCounts){
      const count = (ann.checkedBy || []).length;
      html += `<p style="font-size:12.5px;color:var(--text-muted);margin-top:10px;display:flex;align-items:center;gap:5px;">${icon("checkCircle",13)} ${count}${count===1 ? t("announce.count1") : t("announce.countMany")}</p>`;
    }
    if(canManageThis){
      html += `
        <div style="display:flex;gap:8px;margin-top:12px;">
          <button class="btn-cancel" style="flex:1;padding:8px;font-size:12.5px;" onclick="startEditAnnouncement()">${t("announce.edit")}</button>
          <button class="btn-cancel" style="flex:1;padding:8px;font-size:12.5px;color:var(--danger);" onclick="deleteAnnouncement()">${t("announce.delete")}</button>
        </div>
      `;
    }
    html += "</div>";
  }

  if(canWrite){
    html += `
      <div id="announce-write-section" style="display:none;">
        <label>${t("announce.writeLabel")}</label>
        <textarea id="announce-input" placeholder="${t('announce.placeholder')}" style="width:100%;min-height:90px;border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-size:14.5px;font-family:inherit;background:var(--bg-soft);color:var(--text-main);box-sizing:border-box;"></textarea>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="cancelEditAnnouncement()">${t("modal.cancel")}</button>
          <button class="btn-confirm" onclick="publishAnnouncement()">${t("announce.publish")}</button>
        </div>
      </div>
    `;
    if(!ann){
      html += `<div class="modal-actions"><button class="btn-cancel" onclick="closeAnnouncementsPanel()">${t("announce.close")}</button><button class="btn-confirm" onclick="startEditAnnouncement()">${t("announce.writeNew")}</button></div>`;
    } else if(!canManageThis){
      html += `<div class="modal-actions"><button class="btn-cancel" onclick="closeAnnouncementsPanel()">${t("announce.close")}</button></div>`;
    }
  } else {
    html += `<div class="modal-actions"><button class="btn-cancel" onclick="closeAnnouncementsPanel()">${t("announce.close")}</button></div>`;
  }

  content.innerHTML = html;
}

function startEditAnnouncement(){
  const ann = loadAnnouncement();
  const section = document.getElementById("announce-write-section");
  const input = document.getElementById("announce-input");
  if(section) section.style.display = "block";
  if(input) input.value = ann ? ann.text : "";
}
function cancelEditAnnouncement(){
  const section = document.getElementById("announce-write-section");
  if(section) section.style.display = "none";
}
function deleteAnnouncement(){
  try{ localStorage.removeItem("gestionale_announcement"); }catch(e){}
  renderAnnouncementPanel();
  refreshAnnouncementBadge();
}

function publishAnnouncement(){
  const text = document.getElementById("announce-input").value.trim();
  if(!text){ alert(t("announce.needText")); return; }
  const existing = loadAnnouncement();
  const ann = {
    text,
    author: currentUser,
    date: new Date().toLocaleDateString(currentLocale(),{day:"numeric",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"}),
    checkedBy: (existing && existing.text === text) ? (existing.checkedBy || []) : []
  };
  saveAnnouncement(ann);
  renderAnnouncementPanel();
  refreshAnnouncementBadge();
}

function toggleAnnouncementCheck(){
  const ann = loadAnnouncement();
  if(!ann || !currentUser) return;
  ann.checkedBy = ann.checkedBy || [];
  const idx = ann.checkedBy.indexOf(currentUser);
  if(idx === -1) ann.checkedBy.push(currentUser);
  else ann.checkedBy.splice(idx,1);
  saveAnnouncement(ann);
  renderAnnouncementPanel();
  refreshAnnouncementBadge();
}

document.getElementById("announce-overlay").addEventListener("click",(e)=>{
  if(e.target.id==="announce-overlay") closeAnnouncementsPanel();
});

/* Permette di scrollare la timeline giornaliera orizzontalmente usando la
   normale rotellina verticale del mouse, non solo il trackpad/drag. */
(function(){
  const scrollArea = document.querySelector(".mega-timeline-scroll");
  if(!scrollArea) return;
  scrollArea.addEventListener("wheel",(e)=>{
    // Se lo scroll è già prevalentemente orizzontale (trackpad), lascialo fare al browser.
    if(Math.abs(e.deltaX) > Math.abs(e.deltaY)) return;
    if(e.deltaY === 0) return;
    e.preventDefault();
    scrollArea.scrollLeft += e.deltaY;
  }, {passive:false});
})();

/* Feedback aptico globale: vibra brevemente ad ogni click su elementi
   interattivi comuni (bottoni, slot orari, celle calendario, righe

/* Swipe orizzontale su mobile per cambiare giorno/settimana/mese */
(function(){
  let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
  let swipeEligible = false;
  const SWIPE_MIN_DIST = 60;
  const SWIPE_MAX_OFF_AXIS = 60;
  const SWIPE_MAX_TIME = 600;

  function anyModalOpen(){
    return !!document.querySelector(".modal-overlay.open");
  }

  document.addEventListener("touchstart", (e)=>{
    swipeEligible = false;
    if(anyModalOpen()) return;
    if(e.touches.length !== 1) return;
    // Non intercettare il gesto se parte da un'area con scroll verticale
    // interno (liste, timeline): lasciamo che lo scroll nativo funzioni
    // sempre senza alcuna interferenza da parte di questo listener.
    if(e.target.closest(".slot-list, .week-list, .search-results, .res-manage-list, .mega-timeline-scroll, .day-detail, .week-day-body, .month-grid")) return;
    swipeEligible = true;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
  }, {passive:true});

  document.addEventListener("touchend", (e)=>{
    if(!swipeEligible) return;
    if(anyModalOpen()) return;
    if(!e.changedTouches || e.changedTouches.length !== 1) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const dt = Date.now() - touchStartTime;

    if(dt > SWIPE_MAX_TIME) return;
    if(Math.abs(dy) > SWIPE_MAX_OFF_AXIS) return;
    if(Math.abs(dx) < SWIPE_MIN_DIST) return;

    if(dx > 0) navPrev();
    else navNext();
  }, {passive:true});
})();

/* Impedisce che un tap che chiude un modal "passi attraverso" e attivi un
   elemento sottostante (problema noto su mobile con overlay + touch events) */
document.querySelectorAll(".modal-overlay").forEach(overlay=>{
  overlay.addEventListener("touchstart", (e)=>{ e.stopPropagation(); }, {passive:true});
  overlay.addEventListener("touchend", (e)=>{ e.stopPropagation(); }, {passive:false});
});

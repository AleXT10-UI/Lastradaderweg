<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestionale</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
  :root{
    --border:#e8d0d0;
    --head:#7a1f1f;
    --accent:rgb(200,55,55);
    --accent-dark:rgb(160,35,35);
    --bg-soft:#fff6f6;
    --free:#e8f5ec;
    --free-border:#a9d9b8;
    --free-text:#1e6b3a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Segoe UI',Arial,Helvetica,sans-serif;margin:0;
    background:linear-gradient(160deg, rgb(200,55,55) 0%, rgb(255,255,255) 45%);
    min-height:100vh;color:#2a2a2a;
  }
  .app{max-width:900px;margin:0 auto;padding:10px;padding-bottom:80px;}

  header{display:flex;align-items:center;gap:10px;background:#fff;padding:8px 12px;border-radius:11px;box-shadow:0 3px 14px rgba(90,10,10,.18);margin-bottom:10px;}
  header img{height:40px;width:auto;border-radius:6px;}
  header h1{font-size:18px;color:var(--head);margin:0;}

  .view-switch{display:flex;background:#fff;border-radius:11px;padding:4px;gap:3px;box-shadow:0 3px 14px rgba(90,10,10,.15);margin-bottom:10px;}
  .view-switch button{
    flex:1;border:none;background:transparent;color:var(--head);padding:10px 8px;border-radius:9px;
    font-size:14px;font-weight:600;cursor:pointer;transition:background .15s,color .15s;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .view-switch button i{font-size:17px;}
  .view-switch button.active{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;box-shadow:0 2px 8px rgba(160,35,35,.4);}

  .date-nav{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:11px;padding:6px 9px;margin-bottom:10px;box-shadow:0 2px 10px rgba(90,10,10,.1);}
  .date-nav button{
    border:none;background:var(--bg-soft);color:var(--accent-dark);width:42px;height:42px;border-radius:10px;
    font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;
  }
  .date-nav button:hover{background:#f7dede;}
  .date-nav .date-label{font-weight:700;font-size:15px;color:var(--head);text-align:center;flex:1;}
  .today-btn{
    border:none;background:var(--accent);color:#fff;padding:9px 14px;border-radius:10px;font-size:12.5px;font-weight:600;
    cursor:pointer;box-shadow:0 2px 6px rgba(160,35,35,.35);white-space:nowrap;
  }

  .card{background:#fff;border-radius:14px;box-shadow:0 4px 18px rgba(90,10,10,.14);overflow:hidden;margin-bottom:12px;}

  .resource-tabs{display:flex;gap:6px;padding:10px;overflow-x:auto;border-bottom:1px solid var(--border);}
  .resource-tabs button{
    flex-shrink:0;border:1px solid var(--border);background:#fff;color:var(--head);padding:9px 14px;border-radius:20px;
    font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;
  }
  .resource-tabs button.active{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;border-color:transparent;box-shadow:0 2px 6px rgba(160,35,35,.35);}

  .mini-timeline-wrap{padding:10px 12px 8px;border-bottom:1px solid var(--border);}
  .mini-timeline{
    position:relative;height:34px;background:var(--free);border:1px solid var(--free-border);
    border-radius:9px;overflow:hidden;
  }
  .mini-timeline .mt-tick{
    position:absolute;top:0;bottom:0;width:1px;background:rgba(0,0,0,.08);
  }
  .mini-timeline .mt-segment{
    position:absolute;top:0;bottom:0;background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;
  }
  .mini-timeline .mt-segment span{color:#fff;font-size:9.5px;font-weight:700;white-space:nowrap;padding:0 3px;}
  .mini-timeline .mt-now{
    position:absolute;top:-4px;bottom:-4px;width:2.5px;background:#222;z-index:2;border-radius:2px;
  }
  .mini-timeline-labels{display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:#9a6a6a;margin-top:5px;padding:0 1px;}

  .slot-list{padding:10px;display:flex;flex-direction:column;gap:8px;max-height:520px;overflow-y:auto;}
  .slot{
    display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-radius:11px;
    border:1.5px solid var(--free-border);background:var(--free);cursor:pointer;transition:transform .1s,box-shadow .1s;
  }
  .slot:active{transform:scale(0.98);}
  .slot .slot-time{font-weight:700;font-size:14px;color:var(--free-text);}
  .slot .slot-label{font-size:12.5px;color:#4a7a5a;}
  .slot.busy{background:#fdeaea;border-color:#f0b8b8;}
  .slot.busy .slot-time{color:var(--head);}
  .slot.busy .slot-label{color:#a44646;font-weight:600;}
  .slot .slot-icon{font-size:18px;color:inherit;opacity:.75;}
  .slot.busy .slot-icon{color:#c83737;}
  .slot.free .slot-icon{color:#3a9a5c;}

  .week-list{padding:10px;display:flex;flex-direction:column;gap:10px;}
  .week-day{border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .week-day-header{
    display:flex;align-items:center;justify-content:space-between;padding:11px 14px;
    background:linear-gradient(90deg,var(--bg-soft),#fff);cursor:pointer;
  }
  .week-mini-timeline-wrap{padding:0 14px 10px;}
  .week-mini-timeline-wrap .mini-timeline{height:20px;}
  .week-mini-timeline-wrap .mt-segment span{display:none;}
  .week-day-header.today{background:linear-gradient(90deg,#ffe3e3,#fff5f5);}
  .week-day-header .wd-name{font-weight:700;color:var(--head);font-size:14px;}
  .week-day-header .wd-count{font-size:12px;color:#8a5a5a;background:#fff;padding:3px 9px;border-radius:12px;border:1px solid var(--border);}
  .week-day-body{padding:0 14px 12px;display:none;flex-direction:column;gap:6px;}
  .week-day-body.open{display:flex;}
  .week-item{
    display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-radius:9px;
    background:var(--bg-soft);font-size:12.5px;
  }
  .week-item .wi-res{font-weight:700;color:var(--head);}
  .week-item .wi-time{color:#7a4a4a;}
  .week-item .wi-del{color:#c83737;cursor:pointer;font-size:16px;padding:2px 6px;}
  .week-empty{padding:10px 0;text-align:center;color:#b08a8a;font-size:12.5px;}

  .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:12px;}
  .month-dow{text-align:center;font-size:11px;font-weight:700;color:var(--head);padding:6px 0;}
  .month-cell{
    aspect-ratio:1;border-radius:10px;border:1px solid var(--border);background:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:5px 2px;
    cursor:pointer;transition:background .15s;position:relative;
  }
  .month-cell:hover{background:var(--bg-soft);}
  .month-cell.other-month{opacity:.35;}
  .month-cell.today{border-color:var(--accent);border-width:2px;}
  .month-cell .mc-num{font-size:13px;font-weight:600;color:#333;}
  .month-cell.today .mc-num{color:var(--accent-dark);font-weight:800;}
  .month-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:4px;max-width:100%;}
  .month-dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);}

  .fab{
    position:fixed;right:20px;bottom:20px;width:58px;height:58px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;border:none;
    font-size:26px;box-shadow:0 6px 18px rgba(160,35,35,.45);cursor:pointer;z-index:60;
    display:flex;align-items:center;justify-content:center;transition:transform .12s;
  }
  .fab:active{transform:scale(0.92);}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(40,10,10,.45);display:none;align-items:center;justify-content:center;
    z-index:100;padding:16px;backdrop-filter:blur(2px);
  }
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:380px;box-shadow:0 20px 50px rgba(0,0,0,.3);}
  .modal h3{margin:0 0 16px;color:var(--head);font-size:17px;}
  .modal label{display:block;font-size:12.5px;font-weight:600;color:var(--head);margin:12px 0 5px;}
  .modal select, .modal input{
    width:100%;padding:11px;border:1px solid var(--border);border-radius:9px;font-size:14px;background:#fff;
  }
  .modal select:focus, .modal input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,55,55,.12);}
  .modal-row{display:flex;gap:10px;}
  .modal-row > div{flex:1;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .modal-actions button{
    flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;
  }
  .modal-actions .btn-cancel{background:#f1f1f1;color:#555;}
  .modal-actions .btn-confirm{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;box-shadow:0 3px 10px rgba(160,35,35,.35);}

  .day-detail{background:#fff;border-radius:14px;padding:16px;margin-top:6px;box-shadow:0 3px 14px rgba(90,10,10,.15);}
  .day-detail h4{margin:0 0 10px;color:var(--head);font-size:14px;}
  .month-mini-timeline-wrap{margin-bottom:12px;}
  .day-detail .dd-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg-soft);border-radius:8px;margin-bottom:6px;font-size:12.5px;}
  .day-detail .dd-item .dd-del{color:#c83737;cursor:pointer;}
  .day-detail .dd-empty{color:#b08a8a;font-size:12.5px;text-align:center;padding:8px 0;}

  @media (max-width:600px){
    .app{padding:10px;padding-bottom:90px;}
    header{padding:8px 12px;}
    header h1{font-size:16px;}
    header img{height:32px;}
    .date-nav .date-label{font-size:13.5px;}
    .month-cell .mc-num{font-size:12px;}
    .fab{right:16px;bottom:16px;width:54px;height:54px;font-size:24px;}
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <img src="L.jpg" alt="Logo">
    <h1>Gestionale</h1>
  </header>

  <div class="view-switch">
    <button id="tab-day" onclick="switchView('day')"><i class="ti ti-sun"></i>Giorno</button>
    <button id="tab-week" onclick="switchView('week')"><i class="ti ti-calendar-week"></i>Settimana</button>
    <button id="tab-month" onclick="switchView('month')"><i class="ti ti-calendar"></i>Mese</button>
  </div>

  <div class="date-nav">
    <button onclick="navPrev()"><i class="ti ti-chevron-left"></i></button>
    <div class="date-label" id="date-label"></div>
    <button onclick="navNext()"><i class="ti ti-chevron-right"></i></button>
  </div>
  <div style="text-align:center;margin:-4px 0 10px;">
    <button class="today-btn" onclick="goToday()">Oggi</button>
  </div>

  <div class="card" id="view-day-el">
    <div class="resource-tabs" id="resource-tabs"></div>
    <div class="mini-timeline-wrap">
      <div class="mini-timeline" id="mini-timeline"></div>
      <div class="mini-timeline-labels"><span>00</span><span>03</span><span>06</span><span>09</span><span>12</span><span>15</span><span>18</span><span>21</span><span>24</span></div>
    </div>
    <div class="slot-list" id="slot-list"></div>
  </div>

  <div class="card" id="view-week-el" style="display:none;">
    <div class="week-list" id="week-list"></div>
  </div>

  <div class="card" id="view-month-el" style="display:none;">
    <div class="month-grid" id="month-grid"></div>
  </div>
  <div id="month-detail"></div>
</div>

<button class="fab" onclick="openAddModal()" title="Aggiungi"><i class="ti ti-plus"></i></button>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Nuovo elemento</h3>
    <label>Giorno</label>
    <input type="date" id="modal-date">
    <label>Risorsa</label>
    <select id="modal-resource"></select>
    <div class="modal-row">
      <div>
        <label>Dalle</label>
        <input type="number" id="modal-start" min="0" max="23" value="9">
      </div>
      <div>
        <label>Alle</label>
        <input type="number" id="modal-end" min="1" max="24" value="11">
      </div>
    </div>
    <label>Descrizione</label>
    <input type="text" id="modal-label" placeholder="Es. Evento, cliente...">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">Annulla</button>
      <button class="btn-confirm" onclick="confirmAddModal()">Salva</button>
    </div>
  </div>
</div>

<script>
const RESOURCES = ["Sala C","Furgone","Gazebo","Impianto audio","Tavoli"];

function safeGetInit(){
  try{
    const raw = localStorage.getItem("gestionale_data_v2");
    return raw || "{}";
  }catch(e){ return "{}"; }
}
function computeMaxId(b){
  let max = 0;
  Object.values(b).forEach(arr=>arr.forEach(x=>{ if(x.id>max) max=x.id; }));
  return max;
}
function persist(){
  try{
    localStorage.setItem("gestionale_data_v2", JSON.stringify(bookings));
  }catch(e){ /* storage non disponibile, i dati restano solo in memoria per la sessione */ }
}

let bookings = JSON.parse(safeGetInit());
let idCounter = computeMaxId(bookings) + 1;

function fmtDate(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+day;
}
function todayDate(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function sameDay(a,b){ return fmtDate(a)===fmtDate(b); }

let currentView = "day";
let currentDate = todayDate();
let selectedResource = RESOURCES[0];
let openWeekDayKey = null;

function switchView(view){
  currentView = view;
  document.getElementById("tab-day").classList.toggle("active", view==="day");
  document.getElementById("tab-week").classList.toggle("active", view==="week");
  document.getElementById("tab-month").classList.toggle("active", view==="month");
  document.getElementById("view-day-el").style.display = view==="day" ? "" : "none";
  document.getElementById("view-week-el").style.display = view==="week" ? "" : "none";
  document.getElementById("view-month-el").style.display = view==="month" ? "" : "none";
  document.getElementById("month-detail").innerHTML = "";
  renderAll();
}

function navPrev(){
  if(currentView==="day"){ currentDate.setDate(currentDate.getDate()-1); }
  else if(currentView==="week"){ currentDate.setDate(currentDate.getDate()-7); }
  else { currentDate.setMonth(currentDate.getMonth()-1); }
  renderAll();
}
function navNext(){
  if(currentView==="day"){ currentDate.setDate(currentDate.getDate()+1); }
  else if(currentView==="week"){ currentDate.setDate(currentDate.getDate()+7); }
  else { currentDate.setMonth(currentDate.getMonth()+1); }
  renderAll();
}
function goToday(){
  currentDate = todayDate();
  renderAll();
}

function renderAll(){
  updateDateLabel();
  if(currentView==="day") renderDayView();
  else if(currentView==="week") renderWeekView();
  else renderMonthView();
}

function updateDateLabel(){
  const el = document.getElementById("date-label");
  if(currentView==="day"){
    el.textContent = currentDate.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"}).replace(/^\w/,c=>c.toUpperCase());
  } else if(currentView==="week"){
    const monday = getMonday(currentDate);
    const sunday = new Date(monday); sunday.setDate(sunday.getDate()+6);
    el.textContent = monday.toLocaleDateString("it-IT",{day:"numeric",month:"short"}) + " – " + sunday.toLocaleDateString("it-IT",{day:"numeric",month:"short",year:"numeric"});
  } else {
    el.textContent = currentDate.toLocaleDateString("it-IT",{month:"long",year:"numeric"}).replace(/^\w/,c=>c.toUpperCase());
  }
}

function getMonday(d){
  const nd = new Date(d);
  const day = nd.getDay() || 7;
  nd.setDate(nd.getDate() - day + 1);
  nd.setHours(0,0,0,0);
  return nd;
}

function renderMiniTimeline(dayBookings, containerId){
  const el = document.getElementById(containerId || "mini-timeline");
  if(!el) return;
  el.innerHTML = "";

  for(let h=3; h<24; h+=3){
    const tick = document.createElement("div");
    tick.className = "mt-tick";
    tick.style.left = (h/24*100)+"%";
    el.appendChild(tick);
  }

  dayBookings.forEach(b=>{
    const seg = document.createElement("div");
    seg.className = "mt-segment";
    const widthPct = (b.end-b.start)/24*100;
    seg.style.left = (b.start/24*100)+"%";
    seg.style.width = widthPct+"%";
    seg.title = b.label + " (" + String(b.start).padStart(2,"0")+":00-"+String(b.end).padStart(2,"0")+":00)";
    if(widthPct > 6){
      const txt = document.createElement("span");
      txt.textContent = String(b.start).padStart(2,"0")+"-"+String(b.end).padStart(2,"0");
      seg.appendChild(txt);
    }
    seg.onclick = ()=>{
      const target = document.getElementById("slot-h"+b.start);
      if(target) target.scrollIntoView({behavior:"smooth", block:"center"});
    };
    el.appendChild(seg);
  });

  return el;
}

function addNowLineToTimeline(el, dateForCheck){
  if(sameDay(dateForCheck, todayDate())){
    const now = new Date();
    const pct = (now.getHours() + now.getMinutes()/60) / 24 * 100;
    const nowLine = document.createElement("div");
    nowLine.className = "mt-now";
    nowLine.style.left = pct+"%";
    el.appendChild(nowLine);
  }
}

function renderDayView(){
  const tabsEl = document.getElementById("resource-tabs");
  tabsEl.innerHTML = "";
  RESOURCES.forEach(r=>{
    const b = document.createElement("button");
    b.textContent = r;
    b.className = r===selectedResource ? "active" : "";
    b.onclick = ()=>{ selectedResource = r; renderDayView(); };
    tabsEl.appendChild(b);
  });

  const listEl = document.getElementById("slot-list");
  listEl.innerHTML = "";
  const key = fmtDate(currentDate);
  const dayBookings = (bookings[key]||[]).filter(b=>b.res===selectedResource).sort((a,b)=>a.start-b.start);

  const mtEl = renderMiniTimeline(dayBookings, "mini-timeline");
  addNowLineToTimeline(mtEl, currentDate);

  for(let h=0; h<24; h++){
    const covering = dayBookings.find(b=> h>=b.start && h<b.end);
    const slot = document.createElement("div");
    slot.className = "slot " + (covering ? "busy" : "free");
    slot.id = "slot-h"+h;

    const timeSpan = document.createElement("span");
    timeSpan.className = "slot-time";
    timeSpan.textContent = String(h).padStart(2,"0")+":00 – "+String(h+1).padStart(2,"0")+":00";

    const labelSpan = document.createElement("span");
    labelSpan.className = "slot-label";

    const iconSpan = document.createElement("i");
    iconSpan.className = "slot-icon ti " + (covering ? "ti-lock" : "ti-plus");

    const left = document.createElement("div");
    left.style.display="flex"; left.style.flexDirection="column"; left.style.gap="2px";
    left.appendChild(timeSpan);

    if(covering){
      labelSpan.textContent = covering.label;
      left.appendChild(labelSpan);
      slot.onclick = ()=>{
        if(confirm(covering.label + " (" + String(covering.start).padStart(2,"0")+":00-"+String(covering.end).padStart(2,"0")+":00)\n\nEliminare?")){
          removeBooking(key, covering.id);
        }
      };
    } else {
      labelSpan.textContent = "Libero — tocca per aggiungere";
      left.appendChild(labelSpan);
      slot.onclick = ()=>{ openAddModal(key, selectedResource, h, h+1); };
    }

    slot.appendChild(left);
    slot.appendChild(iconSpan);
    listEl.appendChild(slot);
  }
}

function renderWeekView(){
  const listEl = document.getElementById("week-list");
  listEl.innerHTML = "";
  const monday = getMonday(currentDate);

  for(let i=0;i<7;i++){
    const d = new Date(monday); d.setDate(d.getDate()+i);
    const key = fmtDate(d);
    const items = (bookings[key]||[]).sort((a,b)=>a.start-b.start);
    const isToday = sameDay(d, todayDate());

    const dayBox = document.createElement("div");
    dayBox.className = "week-day";

    const headerEl = document.createElement("div");
    headerEl.className = "week-day-header" + (isToday ? " today" : "");
    const nameSpan = document.createElement("span");
    nameSpan.className = "wd-name";
    nameSpan.textContent = d.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"short"}).replace(/^\w/,c=>c.toUpperCase());
    const countSpan = document.createElement("span");
    countSpan.className = "wd-count";
    countSpan.textContent = items.length + (items.length===1 ? " elemento" : " elementi");
    headerEl.appendChild(nameSpan);
    headerEl.appendChild(countSpan);

    const mtWrap = document.createElement("div");
    mtWrap.className = "week-mini-timeline-wrap";
    const mtDiv = document.createElement("div");
    mtDiv.className = "mini-timeline";
    mtDiv.id = "week-mt-"+i;
    mtWrap.appendChild(mtDiv);

    const bodyEl = document.createElement("div");
    bodyEl.className = "week-day-body" + (openWeekDayKey===key ? " open" : "");

    if(items.length===0){
      const empty = document.createElement("div");
      empty.className = "week-empty";
      empty.textContent = "Nessun elemento";
      bodyEl.appendChild(empty);
    } else {
      items.forEach(it=>{
        const row = document.createElement("div");
        row.className = "week-item";
        const info = document.createElement("span");
        info.innerHTML = "<span class='wi-res'>"+it.res+"</span> &nbsp; <span class='wi-time'>"+String(it.start).padStart(2,"0")+":00-"+String(it.end).padStart(2,"0")+":00 · "+escapeHtml(it.label)+"</span>";
        const del = document.createElement("span");
        del.className = "wi-del";
        del.innerHTML = "<i class='ti ti-trash'></i>";
        del.onclick = (e)=>{ e.stopPropagation(); removeBooking(key, it.id); };
        row.appendChild(info);
        row.appendChild(del);
        bodyEl.appendChild(row);
      });
    }

    headerEl.onclick = ()=>{
      openWeekDayKey = (openWeekDayKey===key) ? null : key;
      renderWeekView();
    };

    dayBox.appendChild(headerEl);
    dayBox.appendChild(mtWrap);
    dayBox.appendChild(bodyEl);
    listEl.appendChild(dayBox);

    const mtEl = renderMiniTimeline(items, "week-mt-"+i);
    addNowLineToTimeline(mtEl, d);
  }
}

function escapeHtml(s){
  const div = document.createElement("div");
  div.textContent = s;
  return div.innerHTML;
}

function renderMonthView(){
  const grid = document.getElementById("month-grid");
  grid.innerHTML = "";
  document.getElementById("month-detail").innerHTML = "";

  ["Lun","Mar","Mer","Gio","Ven","Sab","Dom"].forEach(dn=>{
    const el = document.createElement("div");
    el.className = "month-dow";
    el.textContent = dn;
    grid.appendChild(el);
  });

  const year = currentDate.getFullYear(), month = currentDate.getMonth();
  const firstOfMonth = new Date(year, month, 1);
  const startOffset = (firstOfMonth.getDay() || 7) - 1;
  const gridStart = new Date(firstOfMonth);
  gridStart.setDate(gridStart.getDate() - startOffset);

  const today = todayDate();

  for(let i=0;i<42;i++){
    const d = new Date(gridStart);
    d.setDate(d.getDate()+i);
    const key = fmtDate(d);
    const isOtherMonth = d.getMonth() !== month;
    const isToday = sameDay(d, today);
    const count = (bookings[key]||[]).length;

    const cell = document.createElement("div");
    cell.className = "month-cell" + (isOtherMonth ? " other-month" : "") + (isToday ? " today" : "");

    const num = document.createElement("div");
    num.className = "mc-num";
    num.textContent = d.getDate();
    cell.appendChild(num);

    if(count>0){
      const dots = document.createElement("div");
      dots.className = "month-dots";
      const maxDots = Math.min(count, 4);
      for(let k=0;k<maxDots;k++){
        const dot = document.createElement("span");
        dots.appendChild(dot);
      }
      cell.appendChild(dots);
    }

    cell.onclick = ()=>{ showMonthDayDetail(d); };
    grid.appendChild(cell);
  }
}

function showMonthDayDetail(d){
  const key = fmtDate(d);
  const items = (bookings[key]||[]).sort((a,b)=>a.start-b.start);
  const detailEl = document.getElementById("month-detail");

  let html = "<div class='day-detail'><h4>" +
    d.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"}).replace(/^\w/,c=>c.toUpperCase()) +
    "</h4><div class='month-mini-timeline-wrap'><div class='mini-timeline' id='month-mt'></div></div>";

  if(items.length===0){
    html += "<div class='dd-empty'>Nessun elemento. Usa il pulsante + per aggiungerne uno.</div>";
  } else {
    items.forEach(it=>{
      html += "<div class='dd-item'><span><b>"+it.res+"</b> &nbsp; "+String(it.start).padStart(2,"0")+":00-"+String(it.end).padStart(2,"0")+":00 · "+escapeHtml(it.label)+"</span><span class='dd-del' onclick='removeBooking(\""+key+"\","+it.id+"); showMonthDayDetailByKey(\""+key+"\")'><i class=\"ti ti-trash\"></i></span></div>";
    });
  }
  html += "</div>";
  detailEl.innerHTML = html;

  const mtEl = renderMiniTimeline(items, "month-mt");
  addNowLineToTimeline(mtEl, d);
}
function showMonthDayDetailByKey(key){
  const parts = key.split("-").map(Number);
  showMonthDayDetail(new Date(parts[0], parts[1]-1, parts[2]));
}

function addBooking(dateKey, res, start, end, label){
  if(!bookings[dateKey]) bookings[dateKey] = [];
  bookings[dateKey].push({id: idCounter++, res, start:+start, end:+end, label: label || res});
  persist();
  renderAll();
}
function removeBooking(dateKey, id){
  if(!bookings[dateKey]) return;
  bookings[dateKey] = bookings[dateKey].filter(b=>b.id!==id);
  persist();
  renderAll();
}

function openAddModal(prefDate, prefRes, prefStart, prefEnd){
  const dateInp = document.getElementById("modal-date");
  const resSel = document.getElementById("modal-resource");
  resSel.innerHTML = "";
  RESOURCES.forEach(r=>{
    const o = document.createElement("option"); o.value=r; o.textContent=r;
    resSel.appendChild(o);
  });

  dateInp.value = prefDate || fmtDate(currentDate);
  resSel.value = prefRes || selectedResource;
  document.getElementById("modal-start").value = prefStart!==undefined ? prefStart : 9;
  document.getElementById("modal-end").value = prefEnd!==undefined ? prefEnd : 11;
  document.getElementById("modal-label").value = "";

  document.getElementById("modal-overlay").classList.add("open");
}
function closeAddModal(){
  document.getElementById("modal-overlay").classList.remove("open");
}
function confirmAddModal(){
  const date = document.getElementById("modal-date").value;
  const res = document.getElementById("modal-resource").value;
  const start = +document.getElementById("modal-start").value;
  const end = +document.getElementById("modal-end").value;
  const label = document.getElementById("modal-label").value.trim();

  if(!date){ alert("Seleziona una data."); return; }
  if(end<=start){ alert("L'ora fine deve essere maggiore dell'ora inizio."); return; }

  addBooking(date, res, start, end, label);
  closeAddModal();
}

document.getElementById("modal-overlay").addEventListener("click",(e)=>{
  if(e.target.id==="modal-overlay") closeAddModal();
});

switchView("day");
</script>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="rgb(200,55,55)" id="meta-theme-color">
<title>Gestionale</title>
<style>
  :root{
    --border:#e8d0d0;
    --head:#7a1f1f;
    --accent:rgb(200,55,55);
    --accent-dark:rgb(160,35,35);
    --bg-soft:#fff6f6;
    --free:#e8f5ec;
    --free-border:#a9d9b8;
    --free-text:#1e6b3a;
    --surface:#ffffff;
    --surface-2:#fbfbfb;
    --text-main:#2a2a2a;
    --text-muted:#8a5a5a;
    --page-grad-start: rgb(200,55,55);
    --page-grad-end: rgb(255,255,255);
    --shadow-soft: rgba(90,10,10,.14);
    --shadow-strong: rgba(90,10,10,.2);
    --num-color:#333;
    --btn-secondary-bg:#f1f1f1;
    --btn-secondary-text:#555;
    --busy-bg:#fdeaea;
    --busy-border:#f0b8b8;
    --busy-text:#a44646;
    --danger:#c83737;
    --now-line:#e11d48;
    --accent-shadow: rgba(160,35,35,.4);
    --focus-shadow: rgba(200,55,55,.12);
    --muted-timeline:#9a6a6a;
    --muted-free-label:#4a7a5a;
    --muted-week-time:#7a4a4a;
    --muted-empty:#b08a8a;
    --warn-bg:#fff4e0;
    --warn-text:#a15c00;
    --warn-border:#f0d08a;
  }

  body.dark-mode{
    --border:#22304a;
    --head:#7fb4ff;
    --accent:rgb(40,90,190);
    --accent-dark:rgb(25,65,150);
    --bg-soft:#141c2a;
    --free:#0f2a1e;
    --free-border:#2b5a45;
    --free-text:#6ad9a0;
    --surface:#131a26;
    --surface-2:#1a2333;
    --text-main:#e2e8f2;
    --text-muted:#8fa3c9;
    --page-grad-start: #0d1a30;
    --page-grad-end: #060a14;
    --shadow-soft: rgba(0,0,0,.45);
    --shadow-strong: rgba(0,0,0,.6);
    --num-color:#e2e8f2;
    --btn-secondary-bg:#1e2a3c;
    --btn-secondary-text:#cdd8ea;
    --busy-bg:#2a1414;
    --busy-border:#5a2b2b;
    --busy-text:#ff8a8a;
    --danger:#ff6b6b;
    --now-line:#ff5577;
    --accent-shadow: rgba(25,65,150,.45);
    --focus-shadow: rgba(40,90,190,.18);
    --muted-timeline:#8fa3c9;
    --muted-free-label:#6ad9a0;
    --muted-week-time:#9fb3d9;
    --muted-empty:#7a8db0;
    --warn-bg:#2a2210;
    --warn-text:#e0b055;
    --warn-border:#5a4a20;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Segoe UI',Arial,Helvetica,sans-serif;margin:0;
    background:linear-gradient(160deg, var(--page-grad-start) 0%, var(--page-grad-end) 45%);
    background-attachment:fixed;
    min-height:100vh;color:var(--text-main);
    overscroll-behavior-y:contain;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .app{max-width:900px;margin:0 auto;padding:10px;padding-bottom:80px;}
  .main-layout{display:block;}
  .main-col{width:100%;}
  .side-col{width:100%;margin-top:14px;display:flex;flex-direction:column;gap:14px;}

  .side-card{padding:14px;}
  .side-card-title{font-size:13px;font-weight:700;color:var(--head);margin-bottom:10px;}
  .mini-cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .mini-cal-nav button{border:none;background:var(--bg-soft);color:var(--accent-dark);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:12px;}
  .mini-cal-nav button:hover{background:var(--border);}
  .mini-cal-nav span{font-size:12.5px;font-weight:700;color:var(--head);}
  .mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .mini-cal-dow{text-align:center;font-size:9.5px;font-weight:700;color:var(--text-muted);padding:2px 0;}
  .mini-cal-cell{
    aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;
    font-size:11px;cursor:pointer;transition:background .12s;position:relative;color:var(--text-main);
  }
  .mini-cal-cell:hover{background:var(--bg-soft);}
  .mini-cal-cell.other-month{opacity:.3;}
  .mini-cal-cell.today{background:var(--accent);color:#fff;font-weight:700;}
  .mini-cal-cell.selected:not(.today){background:var(--bg-soft);border:1.5px solid var(--accent);}
  .mini-cal-cell.has-events::after{
    content:"";position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
    width:4px;height:4px;border-radius:50%;background:var(--accent);
  }
  .mini-cal-cell.today.has-events::after{background:#fff;}

  @media (min-width:900px){
    .app{max-width:1180px;}
    .main-layout{display:grid;grid-template-columns:1fr 300px;gap:18px;align-items:start;}
    .main-col{min-width:0;}
    .side-col{position:sticky;top:14px;margin-top:0;}
  }

  header{display:flex;align-items:center;gap:10px;background:var(--surface);padding:8px 12px;border-radius:11px;box-shadow:0 3px 14px var(--shadow-strong);margin-bottom:10px;}
  header h1{flex:1;}
  #theme-toggle{
    border:none;background:var(--bg-soft);color:var(--head);width:38px;height:38px;border-radius:9px;
    font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
    transition:background .15s;
  }
  #theme-toggle:hover{background:var(--border);}
  #logo-img{ transition:filter .2s, mix-blend-mode .2s; }
  body.dark-mode #logo-img{
    filter:invert(1) hue-rotate(210deg) saturate(3);
    mix-blend-mode:screen;
  }
  header img{height:40px;width:auto;border-radius:6px;}
  header h1{font-size:18px;color:var(--head);margin:0;}

  .search-bar{
    display:flex;align-items:center;gap:8px;background:var(--surface);border-radius:11px;padding:9px 12px;
    margin-bottom:10px;box-shadow:0 2px 10px var(--shadow-soft);
  }
  .search-icon{font-size:14px;flex-shrink:0;}
  .search-bar input{
    flex:1;border:none;background:transparent;font-size:14px;color:var(--text-main);outline:none;min-width:0;
  }
  .search-bar input::placeholder{color:var(--text-muted);}
  #search-clear{border:none;background:var(--bg-soft);color:var(--head);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:12px;flex-shrink:0;}
  .search-results{
    background:var(--surface);border-radius:12px;box-shadow:0 4px 18px var(--shadow-soft);margin-bottom:10px;
    max-height:320px;overflow-y:auto;
  }
  .search-result-item{
    padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;flex-direction:column;gap:3px;
  }
  .search-result-item:last-child{border-bottom:none;}
  .search-result-item:hover{background:var(--bg-soft);}
  .search-result-item .sr-label{font-weight:700;color:var(--head);font-size:13.5px;}
  .search-result-item .sr-meta{font-size:11.5px;color:var(--text-muted);}
  .search-no-results{padding:16px;text-align:center;color:var(--text-muted);font-size:12.5px;}

  .agenda-list{padding:8px 4px;}
  .agenda-date-title{
    font-size:12.5px;font-weight:700;color:var(--head);padding:10px 14px 6px;
    text-transform:capitalize;
  }
  .agenda-date-title.today{color:var(--accent);}
  .agenda-item{
    display:flex;align-items:center;gap:10px;padding:10px 14px;margin:0 8px 4px;border-radius:9px;
    cursor:pointer;transition:background .12s;
  }
  .agenda-item:hover{background:var(--bg-soft);}
  .agenda-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .agenda-time{font-size:12px;font-weight:700;color:var(--text-muted);flex-shrink:0;width:88px;}
  .agenda-info{font-size:13px;color:var(--text-main);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  .view-switch{display:flex;background:var(--surface);border-radius:11px;padding:4px;gap:3px;box-shadow:0 3px 14px var(--shadow-soft);margin-bottom:10px;border:1px solid var(--border);}
  .view-switch button{
    flex:1;border:none;background:transparent;color:var(--head);padding:10px 8px;border-radius:9px;
    font-size:14px;font-weight:600;cursor:pointer;transition:background .15s,color .15s;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .view-switch button i{font-size:17px;}
  .view-switch button.active{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;box-shadow:0 2px 8px var(--accent-shadow);}

  .date-nav{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--surface);border-radius:11px;padding:6px 9px;margin-bottom:10px;box-shadow:0 2px 10px var(--shadow-soft);}
  .date-nav-arrows{display:flex;gap:6px;flex-shrink:0;}
  .date-nav-arrows button{
    border:none;background:var(--bg-soft);color:var(--accent-dark);width:38px;height:38px;border-radius:10px;
    font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;
  }
  .date-nav-arrows button:hover{background:var(--border);}
  .date-nav .date-label{font-weight:700;font-size:14.5px;color:var(--head);text-align:center;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .today-text-btn{
    border:none;background:var(--bg-soft);color:var(--head);padding:0 14px;height:38px;border-radius:10px;
    font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;transition:background .15s;
  }
  .today-text-btn:hover{background:var(--border);}

  .card{background:var(--surface);border-radius:14px;box-shadow:0 4px 18px var(--shadow-soft);overflow:hidden;margin-bottom:12px;}

  .resource-tabs{display:flex;flex-wrap:wrap;gap:5px;padding:8px 10px;border-bottom:1px solid var(--border);}
  .resource-tabs button{
    border:1px solid var(--border);background:var(--surface);color:var(--head);padding:7px 11px;border-radius:18px;
    font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;
  }
  .resource-tabs button.active{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;border-color:transparent;box-shadow:0 2px 6px var(--accent-shadow);}

  .mini-timeline-wrap{padding:10px 12px 8px;border-bottom:1px solid var(--border);}
  .mini-timeline{
    position:relative;height:34px;background:var(--free);border:1px solid var(--free-border);
    border-radius:9px;overflow:hidden;
  }
  .mini-timeline .mt-tick{
    position:absolute;top:0;bottom:0;width:1px;background:rgba(0,0,0,.08);
  }
  .mini-timeline .mt-segment{
    position:absolute;top:0;bottom:0;background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;
  }
  .mini-timeline .mt-segment span{color:#fff;font-size:9.5px;font-weight:700;white-space:nowrap;padding:0 3px;}
  .mini-timeline .mt-now{
    position:absolute;top:-4px;bottom:-4px;width:2.5px;background:var(--text-main);z-index:2;border-radius:2px;
  }
  .mini-timeline-labels{display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:var(--muted-timeline);margin-top:5px;padding:0 1px;}

  .slot-list{padding:10px;display:flex;flex-direction:column;gap:8px;max-height:65vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;touch-action:pan-y;}
  .slot{
    display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-radius:11px;
    border:1.5px solid var(--free-border);background:var(--free);cursor:pointer;transition:transform .1s,box-shadow .1s;
  }
  .slot:active{transform:scale(0.98);}
  .slot .slot-time{font-weight:700;font-size:14px;color:var(--free-text);}
  .slot .slot-label{font-size:12.5px;color:var(--muted-free-label);}
  .slot.busy{background:var(--busy-bg);border-color:var(--busy-border);}
  .slot.busy .slot-time{color:var(--head);}
  .slot.busy .slot-label{color:var(--busy-text);font-weight:600;}
  .slot .slot-icon{font-size:18px;color:inherit;opacity:.75;}
  .slot.busy .slot-icon{color:var(--danger);}
  .slot.free .slot-icon{color:var(--muted-free-label);}

  .day-countdown{
    margin:0 10px 8px;padding:10px 13px;border-radius:10px;font-size:12.5px;font-weight:700;text-align:center;
  }
  .day-countdown.upcoming{background:var(--warn-bg);color:var(--warn-text);border:1px solid var(--warn-border);}
  .day-countdown.ongoing{background:var(--busy-bg);color:var(--busy-text);border:1px solid var(--busy-border);}

  .slot-now-line{
    position:relative;display:flex;align-items:center;gap:8px;margin:2px 0;
  }
  .slot-now-line::before, .slot-now-line::after{content:"";flex:1;height:2px;background:var(--now-line);}
  .slot-now-line span{
    font-size:10.5px;font-weight:700;color:#fff;background:var(--now-line);padding:3px 9px;border-radius:20px;white-space:nowrap;
    box-shadow:0 2px 5px rgba(225,29,72,.4);
  }

  .week-list{padding:10px;display:flex;flex-direction:column;gap:10px;}
  .week-day{border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .week-day-header{
    display:flex;align-items:center;justify-content:space-between;padding:11px 14px;
    background:linear-gradient(90deg,var(--bg-soft),var(--surface));cursor:pointer;
  }
  .week-mini-timeline-wrap{padding:0 14px 10px;}
  .week-mini-timeline-wrap .mini-timeline{height:20px;}
  .week-mini-timeline-wrap .mt-segment span{display:none;}
  .week-day-header.today{background:linear-gradient(90deg,var(--busy-bg),var(--surface));}
  .week-day-header .wd-name{font-weight:700;color:var(--head);font-size:14px;}
  .week-day-header .wd-count{font-size:12px;color:var(--text-muted);background:var(--surface);padding:3px 9px;border-radius:12px;border:1px solid var(--border);}
  .week-day-body{padding:0 14px 12px;display:none;flex-direction:column;gap:6px;}
  .week-day-body.open{display:flex;}
  .week-item{
    display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-radius:9px;
    background:var(--bg-soft);font-size:12.5px;
  }
  .week-item .wi-res{font-weight:700;color:var(--head);}
  .week-item .wi-time{color:var(--muted-week-time);}
  .week-item .wi-del{color:var(--danger);cursor:pointer;font-size:16px;padding:2px 6px;}
  .week-empty{padding:10px 0;text-align:center;color:var(--muted-empty);font-size:12.5px;}

  .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:12px;}
  .month-dow{text-align:center;font-size:11px;font-weight:700;color:var(--head);padding:6px 0;}
  .month-cell{
    aspect-ratio:1;border-radius:10px;border:1px solid var(--border);background:var(--surface);
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:5px 2px;
    cursor:pointer;transition:background .15s;position:relative;
  }
  .month-cell:hover{background:var(--bg-soft);}
  .month-cell.other-month{opacity:.35;}
  .month-cell.today{border-color:var(--accent);border-width:2px;}
  .month-cell .mc-num{font-size:13px;font-weight:600;color:var(--num-color);}
  .month-cell.today .mc-num{color:var(--accent-dark);font-weight:800;}
  .month-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:4px;max-width:100%;}
  .month-dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);}

  .fab{
    position:fixed;right:20px;bottom:20px;width:58px;height:58px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;border:none;
    font-size:26px;box-shadow:0 6px 18px var(--accent-shadow);cursor:pointer;z-index:60;
    display:flex;align-items:center;justify-content:center;transition:transform .12s;
  }
  .fab:active{transform:scale(0.92);}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(40,10,10,.45);display:none;align-items:center;justify-content:center;
    z-index:100;padding:16px;backdrop-filter:blur(2px);
  }
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:16px;padding:22px;width:100%;max-width:380px;box-shadow:0 20px 50px rgba(0,0,0,.3);}
  .modal h3{margin:0 0 16px;color:var(--head);font-size:17px;}
  .modal label{display:block;font-size:12.5px;font-weight:600;color:var(--head);margin:12px 0 5px;}
  .modal select, .modal input{
    width:100%;padding:11px;border:1px solid var(--border);border-radius:9px;font-size:14px;background:var(--surface);color:var(--text-main);
  }
  .modal select:focus, .modal input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--focus-shadow);}
  .modal-row{display:flex;gap:10px;}
  .modal-row > div{flex:1;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .modal-actions button{
    flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;
  }
  .modal-actions .btn-cancel{background:var(--btn-secondary-bg);color:var(--btn-secondary-text);}
  .modal-actions .btn-confirm{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;box-shadow:0 3px 10px var(--accent-shadow);}

  .day-detail{background:var(--surface);border-radius:14px;padding:16px;margin-top:6px;box-shadow:0 3px 14px var(--shadow-soft);}
  .day-detail h4{margin:0 0 10px;color:var(--head);font-size:14px;}
  .month-mini-timeline-wrap{margin-bottom:12px;}
  .day-detail .dd-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg-soft);border-radius:8px;margin-bottom:6px;font-size:12.5px;}
  .day-detail .dd-item .dd-del{color:var(--danger);cursor:pointer;}
  .day-detail .dd-empty{color:var(--muted-empty);font-size:12.5px;text-align:center;padding:8px 0;}

  @media (max-width:600px){
    .app{padding:10px;padding-bottom:90px;}
    header{padding:8px 12px;}
    header h1{font-size:16px;}
    header img{height:32px;}
    .date-nav .date-label{font-size:13.5px;}
    .month-cell .mc-num{font-size:12px;}
    .fab{right:16px;bottom:16px;width:54px;height:54px;font-size:24px;}

    .resource-tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:8px;}
    .resource-tabs button{padding:8px 6px;font-size:11.5px;text-align:center;justify-content:center;display:flex;align-items:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    .modal{width:92vw;padding:18px;}
    .modal-row{flex-direction:column;gap:12px;}
    .modal-row > div{width:100%;}
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <img src="L.jpg" alt="Logo" id="logo-img">
    <h1>Gestionale</h1>
    <button id="theme-toggle" onclick="toggleTheme()" title="Cambia tema" aria-label="Cambia tema">🌙</button>
  </header>

  <div class="search-bar">
    <span class="search-icon" aria-hidden="true">🔍</span>
    <input type="text" id="search-input" placeholder="Cerca per descrizione o risorsa..." oninput="onSearchInput()">
    <button id="search-clear" onclick="clearSearch()" style="display:none;" aria-label="Cancella ricerca">✕</button>
  </div>
  <div class="search-results" id="search-results" style="display:none;"></div>

  <div class="main-layout">
    <div class="main-col">
      <div class="view-switch">
        <button id="tab-day" onclick="switchView('day')"><span aria-hidden="true">☀️</span>Giorno</button>
        <button id="tab-week" onclick="switchView('week')"><span aria-hidden="true">📅</span>Settimana</button>
        <button id="tab-agenda" onclick="switchView('agenda')"><span aria-hidden="true">📋</span>Agenda</button>
        <button id="tab-month" onclick="switchView('month')"><span aria-hidden="true">🗓️</span>Mese</button>
      </div>

      <div class="date-nav">
        <button onclick="goToday()" class="today-text-btn" aria-label="Vai a oggi">Oggi</button>
        <div class="date-label" id="date-label"></div>
        <div class="date-nav-arrows">
          <button onclick="navPrev()" aria-label="Precedente"><span aria-hidden="true">&#10094;</span></button>
          <button onclick="navNext()" aria-label="Successivo"><span aria-hidden="true">&#10095;</span></button>
        </div>
      </div>

      <div class="card" id="view-day-el">
        <div class="resource-tabs" id="resource-tabs"></div>
        <div class="mini-timeline-wrap">
          <div class="mini-timeline" id="mini-timeline"></div>
          <div class="mini-timeline-labels"><span>00</span><span>03</span><span>06</span><span>09</span><span>12</span><span>15</span><span>18</span><span>21</span><span>24</span></div>
        </div>
        <div class="day-countdown" id="day-countdown" style="display:none;"></div>
        <div class="slot-list" id="slot-list"></div>
      </div>

      <div class="card" id="view-week-el" style="display:none;">
        <div class="week-list" id="week-list"></div>
      </div>

      <div class="card" id="view-month-el" style="display:none;">
        <div class="month-grid" id="month-grid"></div>
      </div>

      <div class="card" id="view-agenda-el" style="display:none;">
        <div class="agenda-list" id="agenda-list"></div>
      </div>
    </div>

    <div class="side-col">
      <div class="card side-card">
        <div class="side-card-title">Panoramica mese</div>
        <div class="mini-cal-nav">
          <button onclick="miniCalNav(-1)" aria-label="Mese precedente"><span aria-hidden="true">&#10094;</span></button>
          <span id="mini-cal-label"></span>
          <button onclick="miniCalNav(1)" aria-label="Mese successivo"><span aria-hidden="true">&#10095;</span></button>
        </div>
        <div class="mini-cal-grid" id="mini-cal-grid"></div>
      </div>
      <div class="card side-card" id="side-detail-card" style="display:none;">
        <div id="month-detail"></div>
      </div>
    </div>
  </div>
</div>

<button class="fab" onclick="openAddModal()" title="Aggiungi"><span aria-hidden="true">+</span></button>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Nuovo elemento</h3>
    <label>Giorno</label>
    <input type="date" id="modal-date">
    <label>Risorsa</label>
    <select id="modal-resource"></select>
    <div class="modal-row">
      <div>
        <label>Dalle</label>
        <input type="time" id="modal-start" value="09:00" step="900">
      </div>
      <div>
        <label>Alle</label>
        <input type="time" id="modal-end" value="11:00" step="900">
      </div>
    </div>
    <label>Descrizione</label>
    <input type="text" id="modal-label" placeholder="Es. Evento, cliente...">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">Annulla</button>
      <button class="btn-confirm" onclick="confirmAddModal()">Salva</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="detail-overlay">
  <div class="modal" id="detail-modal-content">
  </div>
</div>

<script>
const RESOURCES = ["Sala C","Furgone","Gazebo","Impianto audio","Tavoli"];
const RESOURCE_COLORS = {
  "Sala C": ["#e0a800","#b88700"],
  "Furgone": ["#6c757d","#495157"],
  "Gazebo": ["#2b7fd6","#1c5aa0"],
  "Impianto audio": ["#8a4fd6","#6a35ab"],
  "Tavoli": ["#2ca86b","#1f8253"]
};
function getResourceColor(res){
  return RESOURCE_COLORS[res] || ["rgb(200,55,55)","rgb(160,35,35)"];
}

function safeGetInit(){
  try{
    const raw = localStorage.getItem("gestionale_data_v2");
    return raw || "{}";
  }catch(e){ return "{}"; }
}
function computeMaxId(b){
  let max = 0;
  Object.values(b).forEach(arr=>arr.forEach(x=>{ if(x.id>max) max=x.id; }));
  return max;
}
function persist(){
  try{
    localStorage.setItem("gestionale_data_v2", JSON.stringify(bookings));
  }catch(e){ /* storage non disponibile, i dati restano solo in memoria per la sessione */ }
}

let bookings = JSON.parse(safeGetInit());
let idCounter = computeMaxId(bookings) + 1;

function fmtDate(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+day;
}
function todayDate(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function sameDay(a,b){ return fmtDate(a)===fmtDate(b); }

let currentView = "day";
let currentDate = todayDate();
let selectedResource = RESOURCES[0];
let openWeekDayKey = null;

function onSearchInput(){
  const q = document.getElementById("search-input").value.trim().toLowerCase();
  const clearBtn = document.getElementById("search-clear");
  const resultsEl = document.getElementById("search-results");

  clearBtn.style.display = q ? "flex" : "none";

  if(!q){
    resultsEl.style.display = "none";
    return;
  }

  const matches = [];
  Object.keys(bookings).forEach(key=>{
    (bookings[key]||[]).forEach(it=>{
      if(it.label.toLowerCase().includes(q) || it.res.toLowerCase().includes(q)){
        matches.push({key, item:it});
      }
    });
  });
  matches.sort((a,b)=> a.key.localeCompare(b.key) || a.item.start-b.item.start);

  resultsEl.innerHTML = "";
  resultsEl.style.display = "block";

  if(matches.length === 0){
    resultsEl.innerHTML = "<div class='search-no-results'>Nessun risultato per \""+escapeHtml(document.getElementById("search-input").value)+"\"</div>";
    return;
  }

  matches.slice(0,30).forEach(m=>{
    const d = new Date(m.key+"T00:00:00");
    const dateStr = d.toLocaleDateString("it-IT",{day:"numeric",month:"short",year:"numeric"});
    const row = document.createElement("div");
    row.className = "search-result-item";
    row.innerHTML = "<span class='sr-label'>"+escapeHtml(m.item.label)+"</span><span class='sr-meta'>"+escapeHtml(m.item.res)+" · "+dateStr+" · "+fmtHourLabel(m.item.start)+"–"+fmtHourLabel(m.item.end)+"</span>";
    row.onclick = ()=>{ showEventDetail(m.key, m.item.id); };
    resultsEl.appendChild(row);
  });
}

function clearSearch(){
  document.getElementById("search-input").value = "";
  document.getElementById("search-clear").style.display = "none";
  document.getElementById("search-results").style.display = "none";
}

function switchView(view){
  currentView = view;
  document.getElementById("tab-day").classList.toggle("active", view==="day");
  document.getElementById("tab-week").classList.toggle("active", view==="week");
  document.getElementById("tab-month").classList.toggle("active", view==="month");
  document.getElementById("tab-agenda").classList.toggle("active", view==="agenda");
  document.getElementById("view-day-el").style.display = view==="day" ? "" : "none";
  document.getElementById("view-week-el").style.display = view==="week" ? "" : "none";
  document.getElementById("view-month-el").style.display = view==="month" ? "" : "none";
  document.getElementById("view-agenda-el").style.display = view==="agenda" ? "" : "none";
  document.querySelector(".date-nav").style.display = view==="agenda" ? "none" : "flex";
  document.getElementById("month-detail").innerHTML = "";
  const sideCard = document.getElementById("side-detail-card");
  if(sideCard) sideCard.style.display = "none";
  renderAll();
}

function navPrev(){
  if(currentView==="day"){ currentDate.setDate(currentDate.getDate()-1); }
  else if(currentView==="week"){ currentDate.setDate(currentDate.getDate()-7); }
  else { currentDate.setMonth(currentDate.getMonth()-1); }
  renderAll();
}
function navNext(){
  if(currentView==="day"){ currentDate.setDate(currentDate.getDate()+1); }
  else if(currentView==="week"){ currentDate.setDate(currentDate.getDate()+7); }
  else { currentDate.setMonth(currentDate.getMonth()+1); }
  renderAll();
}
function goToday(){
  currentDate = todayDate();
  renderAll();
}

function renderAll(){
  updateDateLabel();
  if(currentView==="day") renderDayView();
  else if(currentView==="week") renderWeekView();
  else if(currentView==="agenda") renderAgendaView();
  else renderMonthView();
  renderMiniCal();
}

function updateDateLabel(){
  const el = document.getElementById("date-label");
  if(currentView==="day"){
    el.textContent = currentDate.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"}).replace(/^\w/,c=>c.toUpperCase());
  } else if(currentView==="week"){
    const monday = getMonday(currentDate);
    const sunday = new Date(monday); sunday.setDate(sunday.getDate()+6);
    el.textContent = monday.toLocaleDateString("it-IT",{day:"numeric",month:"short"}) + " – " + sunday.toLocaleDateString("it-IT",{day:"numeric",month:"short",year:"numeric"});
  } else {
    el.textContent = currentDate.toLocaleDateString("it-IT",{month:"long",year:"numeric"}).replace(/^\w/,c=>c.toUpperCase());
  }
}

function getMonday(d){
  const nd = new Date(d);
  const day = nd.getDay() || 7;
  nd.setDate(nd.getDate() - day + 1);
  nd.setHours(0,0,0,0);
  return nd;
}

function renderMiniTimeline(dayBookings, containerId){
  const el = document.getElementById(containerId || "mini-timeline");
  if(!el) return;
  el.innerHTML = "";

  for(let h=3; h<24; h+=3){
    const tick = document.createElement("div");
    tick.className = "mt-tick";
    tick.style.left = (h/24*100)+"%";
    el.appendChild(tick);
  }

  dayBookings.forEach(b=>{
    const seg = document.createElement("div");
    seg.className = "mt-segment";
    const widthPct = (b.end-b.start)/24*100;
    seg.style.left = (b.start/24*100)+"%";
    seg.style.width = widthPct+"%";
    const colors = getResourceColor(b.res);
    seg.style.background = "linear-gradient(135deg,"+colors[0]+","+colors[1]+")";
    seg.title = b.res + " — " + b.label + " (" + fmtHourLabel(b.start)+"-"+fmtHourLabel(b.end)+")";
    if(widthPct > 6){
      const txt = document.createElement("span");
      txt.textContent = fmtHourLabel(b.start)+"-"+fmtHourLabel(b.end);
      seg.appendChild(txt);
    }
    seg.onclick = ()=>{
      const target = document.getElementById("slot-h"+Math.floor(b.start*2));
      if(target) target.scrollIntoView({behavior:"smooth", block:"center"});
    };
    el.appendChild(seg);
  });

  return el;
}

function addNowLineToTimeline(el, dateForCheck){
  if(sameDay(dateForCheck, todayDate())){
    const now = new Date();
    const pct = (now.getHours() + now.getMinutes()/60) / 24 * 100;
    const nowLine = document.createElement("div");
    nowLine.className = "mt-now";
    nowLine.style.left = pct+"%";
    el.appendChild(nowLine);
  }
}

function renderDayView(){
  const tabsEl = document.getElementById("resource-tabs");
  tabsEl.innerHTML = "";

  const allBtn = document.createElement("button");
  allBtn.textContent = "Tutti";
  allBtn.className = selectedResource === "__ALL__" ? "active" : "";
  allBtn.onclick = ()=>{ selectedResource = "__ALL__"; renderDayView(); };
  tabsEl.appendChild(allBtn);

  RESOURCES.forEach(r=>{
    const b = document.createElement("button");
    const colors = getResourceColor(r);
    const dot = document.createElement("span");
    dot.style.display = "inline-block";
    dot.style.width = "8px";
    dot.style.height = "8px";
    dot.style.borderRadius = "50%";
    dot.style.marginRight = "6px";
    dot.style.background = colors[0];
    dot.style.verticalAlign = "middle";
    b.appendChild(dot);
    b.appendChild(document.createTextNode(r));
    b.className = r===selectedResource ? "active" : "";
    b.onclick = ()=>{ selectedResource = r; renderDayView(); };
    tabsEl.appendChild(b);
  });

  const listEl = document.getElementById("slot-list");
  listEl.innerHTML = "";
  const key = fmtDate(currentDate);
  const dayBookings = selectedResource === "__ALL__"
    ? (bookings[key]||[]).slice().sort((a,b)=>a.start-b.start)
    : (bookings[key]||[]).filter(b=>b.res===selectedResource).sort((a,b)=>a.start-b.start);

  const mtEl = renderMiniTimeline(dayBookings, "mini-timeline");
  addNowLineToTimeline(mtEl, currentDate);

  const isToday = sameDay(currentDate, todayDate());
  let nowHourDecimal = null;
  if(isToday){
    const now = new Date();
    nowHourDecimal = now.getHours() + now.getMinutes()/60;
  }

  // Countdown al prossimo elemento della risorsa selezionata
  const countdownEl = document.getElementById("day-countdown");
  if(isToday){
    const next = dayBookings.filter(b=>b.start > nowHourDecimal).sort((a,b)=>a.start-b.start)[0];
    const ongoing = dayBookings.find(b=> nowHourDecimal>=b.start && nowHourDecimal<b.end);
    if(ongoing){
      const remainMin = Math.round((ongoing.end - nowHourDecimal)*60);
      countdownEl.style.display = "block";
      countdownEl.className = "day-countdown ongoing";
      countdownEl.textContent = "In corso: " + ongoing.label + " — finisce tra " + remainMin + " minuti";
    } else if(next){
      const diffMin = Math.round((next.start - nowHourDecimal)*60);
      countdownEl.style.display = "block";
      countdownEl.className = "day-countdown upcoming";
      countdownEl.textContent = "Mancano " + diffMin + " minuti a " + next.label + " (" + fmtHourLabel(next.start) + ")";
    } else {
      countdownEl.style.display = "none";
    }
  } else {
    countdownEl.style.display = "none";
  }

  let nowLineInserted = false;
  for(let hh=0; hh<48; hh++){
    const h = hh * 0.5;

    if(isToday && !nowLineInserted && nowHourDecimal < h){
      const nowMarker = document.createElement("div");
      nowMarker.className = "slot-now-line";
      nowMarker.innerHTML = "<span>Ora — "+fmtHourLabel(nowHourDecimal)+"</span>";
      listEl.appendChild(nowMarker);
      nowLineInserted = true;
    }

    const coveringAll = dayBookings.filter(b=> h>=b.start && h<b.end);
    const covering = coveringAll[0];
    const slot = document.createElement("div");
    slot.className = "slot " + (covering ? "busy" : "free");
    slot.id = "slot-h"+hh;

    const timeSpan = document.createElement("span");
    timeSpan.className = "slot-time";
    timeSpan.textContent = fmtHourLabel(h) + " – " + fmtHourLabel(h+0.5);

    const labelSpan = document.createElement("span");
    labelSpan.className = "slot-label";

    const iconSpan = document.createElement("i");
    iconSpan.textContent = covering ? "🔒" : "+";

    const left = document.createElement("div");
    left.style.display="flex"; left.style.flexDirection="column"; left.style.gap="2px";
    left.appendChild(timeSpan);

    if(covering){
      if(coveringAll.length > 1){
        labelSpan.textContent = coveringAll.map(b=>b.res+": "+b.label).join(" · ");
      } else if(selectedResource === "__ALL__"){
        labelSpan.textContent = covering.res + ": " + covering.label;
      } else {
        labelSpan.textContent = covering.label;
      }
      left.appendChild(labelSpan);
      slot.onclick = ()=>{ showEventDetail(key, covering.id); };
    } else {
      labelSpan.textContent = "Libero — tocca per aggiungere";
      left.appendChild(labelSpan);
      slot.onclick = ()=>{ openAddModal(key, selectedResource, h, h+0.5); };
    }

    slot.appendChild(left);
    slot.appendChild(iconSpan);
    listEl.appendChild(slot);
  }
}

function renderWeekView(){
  const listEl = document.getElementById("week-list");
  listEl.innerHTML = "";
  const monday = getMonday(currentDate);

  for(let i=0;i<7;i++){
    const d = new Date(monday); d.setDate(d.getDate()+i);
    const key = fmtDate(d);
    const items = (bookings[key]||[]).sort((a,b)=>a.start-b.start);
    const isToday = sameDay(d, todayDate());

    const dayBox = document.createElement("div");
    dayBox.className = "week-day";

    const headerEl = document.createElement("div");
    headerEl.className = "week-day-header" + (isToday ? " today" : "");
    const nameSpan = document.createElement("span");
    nameSpan.className = "wd-name";
    nameSpan.textContent = d.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"short"}).replace(/^\w/,c=>c.toUpperCase());
    const countSpan = document.createElement("span");
    countSpan.className = "wd-count";
    countSpan.textContent = items.length + (items.length===1 ? " elemento" : " elementi");
    headerEl.appendChild(nameSpan);
    headerEl.appendChild(countSpan);

    const mtWrap = document.createElement("div");
    mtWrap.className = "week-mini-timeline-wrap";
    const mtDiv = document.createElement("div");
    mtDiv.className = "mini-timeline";
    mtDiv.id = "week-mt-"+i;
    mtWrap.appendChild(mtDiv);

    const bodyEl = document.createElement("div");
    bodyEl.className = "week-day-body" + (openWeekDayKey===key ? " open" : "");

    if(items.length===0){
      const empty = document.createElement("div");
      empty.className = "week-empty";
      empty.textContent = "Nessun elemento";
      bodyEl.appendChild(empty);
    } else {
      items.forEach(it=>{
        const row = document.createElement("div");
        row.className = "week-item";
        row.style.cursor = "pointer";
        const info = document.createElement("span");
        info.innerHTML = "<span class='wi-res'>"+it.res+"</span> &nbsp; <span class='wi-time'>"+fmtHourLabel(it.start)+"-"+fmtHourLabel(it.end)+" · "+escapeHtml(it.label)+"</span>";
        const del = document.createElement("span");
        del.className = "wi-del";
        del.innerHTML = "🗑";
        del.onclick = (e)=>{ e.stopPropagation(); if(confirm("Eliminare questo elemento?")) removeBooking(key, it.id); };
        row.onclick = ()=>{ showEventDetail(key, it.id); };
        row.appendChild(info);
        row.appendChild(del);
        bodyEl.appendChild(row);
      });
    }

    headerEl.onclick = ()=>{
      openWeekDayKey = (openWeekDayKey===key) ? null : key;
      renderWeekView();
    };

    dayBox.appendChild(headerEl);
    dayBox.appendChild(mtWrap);
    dayBox.appendChild(bodyEl);
    listEl.appendChild(dayBox);

    const mtEl = renderMiniTimeline(items, "week-mt-"+i);
    addNowLineToTimeline(mtEl, d);
  }
}

function escapeHtml(s){
  const div = document.createElement("div");
  div.textContent = s;
  return div.innerHTML;
}

let miniCalDate = todayDate();

function miniCalNav(delta){
  miniCalDate.setMonth(miniCalDate.getMonth()+delta);
  renderMiniCal();
}

function renderMiniCal(){
  const label = document.getElementById("mini-cal-label");
  if(!label) return;
  label.textContent = miniCalDate.toLocaleDateString("it-IT",{month:"long",year:"numeric"}).replace(/^\w/,c=>c.toUpperCase());

  const grid = document.getElementById("mini-cal-grid");
  grid.innerHTML = "";
  ["L","M","M","G","V","S","D"].forEach(dn=>{
    const el = document.createElement("div");
    el.className = "mini-cal-dow";
    el.textContent = dn;
    grid.appendChild(el);
  });

  const year = miniCalDate.getFullYear(), month = miniCalDate.getMonth();
  const firstOfMonth = new Date(year, month, 1);
  const startOffset = (firstOfMonth.getDay() || 7) - 1;
  const gridStart = new Date(firstOfMonth);
  gridStart.setDate(gridStart.getDate() - startOffset);

  const today = todayDate();

  for(let i=0;i<42;i++){
    const d = new Date(gridStart);
    d.setDate(d.getDate()+i);
    const key = fmtDate(d);
    const isOtherMonth = d.getMonth() !== month;
    const isToday = sameDay(d, today);
    const isSelected = sameDay(d, currentDate);
    const hasEvents = (bookings[key]||[]).length > 0;

    const cell = document.createElement("div");
    cell.className = "mini-cal-cell"
      + (isOtherMonth ? " other-month" : "")
      + (isToday ? " today" : "")
      + (isSelected && !isToday ? " selected" : "")
      + (hasEvents ? " has-events" : "");
    cell.textContent = d.getDate();
    cell.onclick = ()=>{
      currentDate = new Date(d);
      switchView("day");
    };
    grid.appendChild(cell);
  }
}

function renderAgendaView(){
  const listEl = document.getElementById("agenda-list");
  listEl.innerHTML = "";

  const today = todayDate();
  const allDates = Object.keys(bookings)
    .filter(k => (bookings[k]||[]).length > 0)
    .filter(k => {
      const d = new Date(k+"T00:00:00");
      return d >= today || sameDay(d, today);
    })
    .sort();

  if(allDates.length === 0){
    listEl.innerHTML = "<div class='week-empty' style='padding:24px 0;'>Nessun evento in programma. Usa il pulsante + per aggiungerne uno.</div>";
    return;
  }

  allDates.forEach(key=>{
    const d = new Date(key+"T00:00:00");
    const items = (bookings[key]||[]).sort((a,b)=>a.start-b.start);
    const isToday = sameDay(d, today);

    const groupTitle = document.createElement("div");
    groupTitle.className = "agenda-date-title" + (isToday ? " today" : "");
    groupTitle.textContent = (isToday ? "Oggi — " : "") + d.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"}).replace(/^\w/,c=>c.toUpperCase());
    listEl.appendChild(groupTitle);

    items.forEach(it=>{
      const colors = getResourceColor(it.res);
      const row = document.createElement("div");
      row.className = "agenda-item";
      row.onclick = ()=>{ showEventDetail(key, it.id); };
      row.innerHTML = `
        <span class="agenda-dot" style="background:${colors[0]};"></span>
        <span class="agenda-time">${fmtHourLabel(it.start)}–${fmtHourLabel(it.end)}</span>
        <span class="agenda-info"><b>${escapeHtml(it.res)}</b> · ${escapeHtml(it.label)}</span>
      `;
      listEl.appendChild(row);
    });
  });
}

function renderMonthView(){
  const grid = document.getElementById("month-grid");
  grid.innerHTML = "";
  document.getElementById("month-detail").innerHTML = "";

  ["Lun","Mar","Mer","Gio","Ven","Sab","Dom"].forEach(dn=>{
    const el = document.createElement("div");
    el.className = "month-dow";
    el.textContent = dn;
    grid.appendChild(el);
  });

  const year = currentDate.getFullYear(), month = currentDate.getMonth();
  const firstOfMonth = new Date(year, month, 1);
  const startOffset = (firstOfMonth.getDay() || 7) - 1;
  const gridStart = new Date(firstOfMonth);
  gridStart.setDate(gridStart.getDate() - startOffset);

  const today = todayDate();

  for(let i=0;i<42;i++){
    const d = new Date(gridStart);
    d.setDate(d.getDate()+i);
    const key = fmtDate(d);
    const isOtherMonth = d.getMonth() !== month;
    const isToday = sameDay(d, today);
    const count = (bookings[key]||[]).length;

    const cell = document.createElement("div");
    cell.className = "month-cell" + (isOtherMonth ? " other-month" : "") + (isToday ? " today" : "");

    const num = document.createElement("div");
    num.className = "mc-num";
    num.textContent = d.getDate();
    cell.appendChild(num);

    if(count>0){
      const dots = document.createElement("div");
      dots.className = "month-dots";
      const maxDots = Math.min(count, 4);
      for(let k=0;k<maxDots;k++){
        const dot = document.createElement("span");
        dots.appendChild(dot);
      }
      cell.appendChild(dots);
    }

    cell.onclick = ()=>{ showMonthDayDetail(d); };
    grid.appendChild(cell);
  }
}

function showMonthDayDetail(d){
  const key = fmtDate(d);
  const items = (bookings[key]||[]).sort((a,b)=>a.start-b.start);
  const detailEl = document.getElementById("month-detail");

  let html = "<div class='day-detail'><h4>" +
    d.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"}).replace(/^\w/,c=>c.toUpperCase()) +
    "</h4><div class='month-mini-timeline-wrap'><div class='mini-timeline' id='month-mt'></div></div>";

  if(items.length===0){
    html += "<div class='dd-empty'>Nessun elemento. Usa il pulsante + per aggiungerne uno.</div>";
  } else {
    items.forEach(it=>{
      html += "<div class='dd-item'><span style='cursor:pointer;' onclick='showEventDetail(\""+key+"\","+it.id+")'><b>"+it.res+"</b> &nbsp; "+fmtHourLabel(it.start)+"-"+fmtHourLabel(it.end)+" · "+escapeHtml(it.label)+"</span><span class='dd-del' onclick='if(confirm(\"Eliminare questo elemento?\")){removeBooking(\""+key+"\","+it.id+"); showMonthDayDetailByKey(\""+key+"\");}'>🗑</span></div>";
    });
  }
  html += "</div>";
  detailEl.innerHTML = html;
  const sideCard = document.getElementById("side-detail-card");
  if(sideCard) sideCard.style.display = "block";

  const mtEl = renderMiniTimeline(items, "month-mt");
  addNowLineToTimeline(mtEl, d);
}
function showMonthDayDetailByKey(key){
  const parts = key.split("-").map(Number);
  showMonthDayDetail(new Date(parts[0], parts[1]-1, parts[2]));
}

function addBooking(dateKey, res, start, end, label){
  if(!bookings[dateKey]) bookings[dateKey] = [];
  bookings[dateKey].push({id: idCounter++, res, start:+start, end:+end, label: label || res});
  persist();
  renderAll();
}
function removeBooking(dateKey, id){
  if(!bookings[dateKey]) return;
  bookings[dateKey] = bookings[dateKey].filter(b=>b.id!==id);
  persist();
  renderAll();
}

function hourToTimeStr(h){
  const hh = Math.floor(h);
  const mm = Math.round((h-hh)*60);
  return String(hh).padStart(2,"0")+":"+String(mm).padStart(2,"0");
}
function timeStrToHour(s){
  const parts = (s||"00:00").split(":").map(Number);
  return parts[0] + (parts[1]||0)/60;
}
function fmtHourLabel(h){
  return hourToTimeStr(h);
}

function showEventDetail(dateKey, id){
  const item = (bookings[dateKey]||[]).find(b=>b.id===id);
  if(!item) return;
  const colors = getResourceColor(item.res);
  const dateObj = new Date(dateKey+"T00:00:00");
  const dateLabel = dateObj.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long",year:"numeric"}).replace(/^\w/,c=>c.toUpperCase());

  const content = document.getElementById("detail-modal-content");
  content.innerHTML = `
    <h3 style="display:flex;align-items:center;gap:8px;">
      <span style="width:12px;height:12px;border-radius:50%;background:${colors[0]};display:inline-block;"></span>
      ${escapeHtml(item.res)}
    </h3>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:6px;">
      <div><b>Descrizione</b><br>${escapeHtml(item.label)}</div>
      <div><b>Giorno</b><br>${dateLabel}</div>
      <div><b>Orario</b><br>${fmtHourLabel(item.start)} – ${fmtHourLabel(item.end)}</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEventDetail()">Chiudi</button>
      <button class="btn-confirm" style="background:linear-gradient(135deg,var(--danger),var(--danger));" onclick="deleteFromDetail('${dateKey}', ${id})">Elimina</button>
    </div>
  `;
  document.getElementById("detail-overlay").classList.add("open");
}
function closeEventDetail(){
  document.getElementById("detail-overlay").classList.remove("open");
}
function deleteFromDetail(dateKey, id){
  if(confirm("Eliminare questo elemento?")){
    closeEventDetail();
    removeBooking(dateKey, id);
  }
}
document.getElementById("detail-overlay").addEventListener("click",(e)=>{
  if(e.target.id==="detail-overlay") closeEventDetail();
});

function openAddModal(prefDate, prefRes, prefStart, prefEnd){
  const dateInp = document.getElementById("modal-date");
  const resSel = document.getElementById("modal-resource");
  resSel.innerHTML = "";
  RESOURCES.forEach(r=>{
    const o = document.createElement("option"); o.value=r; o.textContent=r;
    resSel.appendChild(o);
  });

  dateInp.value = prefDate || fmtDate(currentDate);
  resSel.value = prefRes || selectedResource;
  document.getElementById("modal-start").value = hourToTimeStr(prefStart!==undefined ? prefStart : 9);
  document.getElementById("modal-end").value = hourToTimeStr(prefEnd!==undefined ? prefEnd : 11);
  document.getElementById("modal-label").value = "";

  document.getElementById("modal-overlay").classList.add("open");
}
function closeAddModal(){
  document.getElementById("modal-overlay").classList.remove("open");
}
function confirmAddModal(){
  const date = document.getElementById("modal-date").value;
  const res = document.getElementById("modal-resource").value;
  const start = timeStrToHour(document.getElementById("modal-start").value);
  const end = timeStrToHour(document.getElementById("modal-end").value);
  const label = document.getElementById("modal-label").value.trim();

  if(!date){ alert("Seleziona una data."); return; }
  if(end<=start){ alert("L'ora fine deve essere maggiore dell'ora inizio."); return; }

  closeAddModal();
  addBooking(date, res, start, end, label);
}

document.getElementById("modal-overlay").addEventListener("click",(e)=>{
  if(e.target.id==="modal-overlay") closeAddModal();
});

function applyTheme(isDark){
  document.body.classList.toggle("dark-mode", isDark);
  document.getElementById("theme-toggle").textContent = isDark ? "☀️" : "🌙";
  const metaTheme = document.getElementById("meta-theme-color");
  if(metaTheme) metaTheme.setAttribute("content", isDark ? "#0d1a30" : "rgb(200,55,55)");
  try{ localStorage.setItem("gestionale_theme", isDark ? "dark" : "light"); }catch(e){}
}
function toggleTheme(){
  applyTheme(!document.body.classList.contains("dark-mode"));
}
function initTheme(){
  let saved = null;
  try{ saved = localStorage.getItem("gestionale_theme"); }catch(e){}
  applyTheme(saved === "dark");
}
initTheme();

document.addEventListener("keydown", (e)=>{
  const tag = (document.activeElement && document.activeElement.tagName) || "";
  const isTyping = tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA";

  if(e.key === "/" && !isTyping){
    e.preventDefault();
    document.getElementById("search-input").focus();
    return;
  }
  if(isTyping) return;

  if(e.key === "t" || e.key === "T"){ goToday(); }
  else if(e.key === "ArrowLeft"){ navPrev(); }
  else if(e.key === "ArrowRight"){ navNext(); }
  else if(e.key === "Escape"){
    closeAddModal();
    closeEventDetail();
    clearSearch();
    document.activeElement && document.activeElement.blur();
  }
});

switchView("day");
</script>

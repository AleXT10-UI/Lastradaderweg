<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f3f1" id="meta-theme-color">
<title>Gestionale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* =====================================================================
     DESIGN SYSTEM — "Gestionale La Strada der Weg"
     Palette neutra e calda, rosso mattone come unico accento.
     Scala di spaziatura 4px, tipografia Inter, ombre morbide a due livelli.
     ===================================================================== */
  :root{
    /* Superfici e struttura */
    --bg:#f4f3f1;
    --surface:#ffffff;
    --surface-2:#faf9f8;
    --bg-soft:#f6f4f2;
    --border:#e7e4df;
    --border-strong:#d9d5cf;

    /* Colori di marca */
    --accent:#c0392f;
    --accent-dark:#96271f;
    --accent-soft:#fbeeec;
    --accent-shadow:rgba(150,39,31,.28);
    --focus-shadow:rgba(192,57,47,.14);

    /* Testo */
    --head:#211f1c;
    --text-main:#33302b;
    --text-muted:#84806f;
    --num-color:#33302b;

    /* Stati */
    --free:#eef6ef;
    --free-border:#d2e6d5;
    --free-text:#2b7a45;
    --busy-bg:#fbefee;
    --busy-border:#f0d2ce;
    --busy-text:#a13d36;
    --danger:#c0392f;
    --now-line:#e11d48;
    --warn-bg:#fdf6e7;
    --warn-text:#96690a;
    --warn-border:#f0dda8;

    /* Elementi secondari */
    --btn-secondary-bg:#f0eeeb;
    --btn-secondary-text:#5b574f;
    --muted-timeline:#84806f;
    --muted-free-label:#4a7a5a;
    --muted-week-time:#84806f;
    --muted-empty:#a8a396;

    /* Compat (usati dal vecchio markup) */
    --page-grad-start:#f4f3f1;
    --page-grad-end:#f4f3f1;
    --shadow-soft:rgba(30,25,20,.06);
    --shadow-strong:rgba(30,25,20,.10);

    /* Scala spaziatura e tipografia */
    --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-8:32px; --sp-10:40px;
    --fs-xs:12px; --fs-sm:13px; --fs-base:14px; --fs-md:15px; --fs-lg:17px; --fs-xl:20px; --fs-2xl:26px;
    --radius-sm:11px; --radius-md:16px; --radius-lg:22px;
    --shadow-card:0 1px 2px rgba(30,25,20,.08), 0 4px 12px -4px rgba(30,25,20,.18);
    --shadow-card-hover:0 2px 4px rgba(30,25,20,.10), 0 8px 18px -6px rgba(30,25,20,.24);
    --shadow-pop:0 30px 70px -12px rgba(30,25,20,.38);
    --shadow-inset-top:inset 0 1px 0 rgba(255,255,255,.6);
    --shadow-btn:0 1px 2px rgba(30,25,20,.06), 0 4px 10px -4px rgba(30,25,20,.14);
    --neon-glow:none;
  }

  body.dark-mode{
    --bg:#151412;
    --surface:#1e1c19;
    --surface-2:#242220;
    --bg-soft:#262421;
    --border:#33302b;
    --border-strong:#44403a;

    --accent:#ff0084;
    --accent-dark:#c8006a;
    --accent-soft:#3a1029;
    --accent-shadow:rgba(255,0,132,.55);
    --focus-shadow:rgba(255,0,132,.35);
    --neon-glow:0 0 8px rgba(255,0,132,.7), 0 0 20px rgba(255,0,132,.45), 0 0 40px rgba(255,0,132,.25);

    --head:#f2efe9;
    --text-main:#dcd8d0;
    --text-muted:#9a958a;
    --num-color:#dcd8d0;

    --free:#1b2b20;
    --free-border:#2f4d38;
    --free-text:#7fd6a0;
    --busy-bg:#2e1c1a;
    --busy-border:#583029;
    --busy-text:#f0a099;
    --danger:#f07168;
    --now-line:#ff5577;
    --warn-bg:#2c2413;
    --warn-text:#e0b055;
    --warn-border:#57481f;

    --btn-secondary-bg:#2b2925;
    --btn-secondary-text:#cfcac1;
    --muted-timeline:#9a958a;
    --muted-free-label:#7fd6a0;
    --muted-week-time:#9a958a;
    --muted-empty:#767065;

    --page-grad-start:#151412;
    --page-grad-end:#151412;
    --shadow-soft:rgba(0,0,0,.35);
    --shadow-strong:rgba(0,0,0,.5);
    --shadow-card:0 1px 2px rgba(0,0,0,.5), 0 5px 14px -4px rgba(0,0,0,.65);
    --shadow-card-hover:0 2px 4px rgba(0,0,0,.55), 0 10px 22px -6px rgba(0,0,0,.75);
    --shadow-pop:0 30px 70px -12px rgba(0,0,0,.8);
    --shadow-inset-top:inset 0 1px 0 rgba(255,255,255,.06);
    --shadow-btn:0 1px 2px rgba(0,0,0,.4), 0 4px 12px -4px rgba(0,0,0,.5);
  }
  body.dark-mode, html.dark-mode{
    color-scheme:dark;
    background:
      radial-gradient(1100px 700px at 12% -8%, rgba(255,0,132,.06), transparent 55%),
      radial-gradient(900px 700px at 105% 15%, rgba(255,0,132,.045), transparent 55%),
      radial-gradient(1200px 800px at 50% 100%, rgba(255,0,132,.22), transparent 60%),
      var(--bg);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

  /* Le icone SVG (sostituiscono le emoji) ereditano il colore del testo
     circostante tramite currentColor: sono monocromatiche per costruzione,
     senza bisogno di filtri CSS per adattarle al tema chiaro/scuro. */
  .icon-svg{
    display:inline-block;vertical-align:-3px;flex-shrink:0;
  }

  html{
    overflow-x:hidden;min-height:100%;
    background:
      radial-gradient(1100px 700px at 12% -8%, rgba(192,57,47,.07), transparent 55%),
      radial-gradient(900px 700px at 105% 15%, rgba(192,57,47,.05), transparent 55%),
      radial-gradient(1200px 800px at 50% 100%, rgba(192,57,47,.35), transparent 60%),
      var(--bg);
  }
  body{
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-feature-settings:"tnum" 1, "cv11" 1;
    font-variant-numeric:tabular-nums;
    font-synthesis:none;
    text-rendering:optimizeLegibility;
    margin:0;
    background:transparent;
    min-height:100vh;min-height:100dvh;color:var(--text-main);
    overflow-x:hidden;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  button, input, select, textarea{font-family:inherit;}
  button{
    cursor:pointer;
    transition:transform .12s cubic-bezier(.2,.8,.3,1), background-color .15s ease, border-color .15s ease,
      box-shadow .15s ease, color .15s ease, opacity .15s ease;
  }
  button:active{transform:scale(0.96);}
  button:disabled{cursor:default;}
  button:disabled:active{transform:none;}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  /* ---------- Scrollbar personalizzate ---------- */
  * {
    scrollbar-width: thin;
    scrollbar-color: var(--border-strong) transparent;
  }
  *::-webkit-scrollbar{
    width:8px;
    height:8px;
  }
  *::-webkit-scrollbar-track{
    background:transparent;
  }
  *::-webkit-scrollbar-thumb{
    background-color:var(--border-strong);
    border-radius:99px;
    border:2px solid transparent;
    background-clip:padding-box;
    transition:background-color .15s;
  }
  *::-webkit-scrollbar-thumb:hover{
    background-color:var(--text-muted);
    background-clip:padding-box;
  }
  *::-webkit-scrollbar-corner{background:transparent;}
  *::-webkit-scrollbar-button{display:none;width:0;height:0;}

  /* Scroll fluido e naturale su tutte le aree con overflow interno */
  .slot-list, .week-list, .search-results, .res-manage-list,
  .mega-timeline-scroll, .day-detail, .week-day-body{
    scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
  }
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important;}
  }

  .app{max-width:900px;width:100%;margin:0 auto;padding:12px;padding-bottom:90px;}
  .main-layout{display:flex;flex-direction:column;}
  .main-col{width:100%;}
  #side-detail-card{margin-bottom:var(--sp-2);}
  .side-card{padding:var(--sp-4);}

  /* ---------- Header ---------- */
  header{
    display:flex;align-items:center;gap:var(--sp-3);
    background:var(--surface);padding:var(--sp-2) var(--sp-4);
    border:1px solid var(--border);border-radius:var(--radius-md);
    box-shadow:var(--shadow-card), var(--shadow-inset-top);margin-bottom:var(--sp-3);
  }
  header img{height:36px;width:auto;border-radius:var(--radius-sm);}
  header h1{
    flex:1;font-size:var(--fs-lg);color:var(--head);margin:0;
    font-weight:700;letter-spacing:-.02em;
  }
  #theme-toggle, #search-toggle, #users-toggle, #announce-toggle, #lang-toggle{
    border:1px solid var(--border);background:var(--surface);color:var(--head);
    width:38px;height:38px;border-radius:var(--radius-sm);font-size:15px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    transition:background .15s,border-color .15s,box-shadow .15s;position:relative;
    box-shadow:var(--shadow-btn);
  }
  #lang-toggle{font-size:11px;font-weight:800;letter-spacing:.02em;}
  #logout-toggle{
    border:1px solid var(--border);background:var(--surface);color:var(--head);
    height:38px;padding:0 var(--sp-3);border-radius:var(--radius-sm);
    font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:background .15s,border-color .15s,box-shadow .15s;white-space:nowrap;
    box-shadow:var(--shadow-btn);
  }
  #theme-toggle:hover, #search-toggle:hover, #logout-toggle:hover, #users-toggle:hover, #announce-toggle:hover, #lang-toggle:hover{
    background:var(--bg-soft);border-color:var(--border-strong);box-shadow:var(--shadow-card-hover);
  }
  #search-toggle.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* ---------- Selettore lingua nell'header (dropdown compatto) ---------- */
  .lang-dropdown-wrap{position:relative;flex-shrink:0;}
  .lang-dropdown-menu{
    display:none;position:absolute;top:calc(100% + 6px);right:0;z-index:70;
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
    box-shadow:var(--shadow-pop);overflow:hidden;min-width:130px;
  }
  .lang-dropdown-menu.open{display:block;}
  .lang-dropdown-menu button{
    display:block;width:100%;text-align:left;border:none;background:transparent;color:var(--text-main);
    padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;
  }
  .lang-dropdown-menu button:hover{background:var(--bg-soft);}
  .lang-dropdown-menu button.active{color:var(--accent);background:var(--accent-soft);}
  .announce-badge{
    position:absolute;top:-5px;right:-5px;background:var(--danger);color:#fff;font-size:9px;font-weight:800;
    min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;
    border:2px solid var(--surface);
  }
  .profile-badge{
    display:flex;align-items:center;gap:var(--sp-2);background:var(--bg-soft);
    border:1px solid var(--border);border-radius:999px;padding:4px 12px 4px 4px;flex-shrink:0;
  }
  .profile-pic{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--accent);}
  .profile-name{
    font-size:12.5px;font-weight:600;color:var(--head);white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;max-width:110px;
  }
  #logo-img{transition:filter .2s;}
  body.dark-mode #logo-img{filter:invert(1) hue-rotate(160deg) saturate(2.4);mix-blend-mode:screen;}

  .announce-banner{display:none;}

  /* ---------- Ricerca ---------- */
  .search-bar{
    display:flex;align-items:center;gap:var(--sp-2);background:var(--surface);
    border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-2) var(--sp-3);
    margin-bottom:var(--sp-3);box-shadow:var(--shadow-card);
  }
  .search-icon{font-size:14px;flex-shrink:0;opacity:.7;}
  .search-bar input{
    flex:1;border:none;background:transparent;font-size:16px;color:var(--text-main);outline:none;min-width:0;
  }
  .search-bar input::placeholder{color:var(--text-muted);}
  #search-clear{
    border:none;background:var(--bg-soft);color:var(--head);width:26px;height:26px;border-radius:50%;
    cursor:pointer;font-size:12px;flex-shrink:0;
  }
  #search-resource-filter{
    border:1px solid var(--border);background:var(--bg-soft);color:var(--text-main);
    border-radius:var(--radius-sm);padding:6px 8px;font-size:12px;flex-shrink:0;max-width:120px;
  }
  .search-results{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
    box-shadow:var(--shadow-card);margin-bottom:var(--sp-3);max-height:320px;overflow-y:auto;
  }
  .search-result-item{
    padding:var(--sp-3) var(--sp-4);border-bottom:1px solid var(--border);cursor:pointer;
    display:flex;flex-direction:column;gap:2px;
    transition:background .15s ease, transform .1s cubic-bezier(.2,.8,.3,1);
  }
  .search-result-item:last-child{border-bottom:none;}
  .search-result-item:hover{background:var(--bg-soft);}
  .search-result-item:active{transform:scale(0.99);}
  .search-result-item .sr-label{font-weight:600;color:var(--head);font-size:var(--fs-base);}
  .search-result-item .sr-meta{font-size:var(--fs-xs);color:var(--text-muted);}
  .search-no-results{padding:var(--sp-4);text-align:center;color:var(--text-muted);font-size:var(--fs-sm);}

  /* ---------- Selettore vista ---------- */
  .view-switch{
    display:flex;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-md);padding:4px;gap:4px;
    box-shadow:var(--shadow-card), var(--shadow-inset-top);margin-bottom:var(--sp-3);
    position:sticky;top:8px;z-index:40;
  }
  .view-switch button{
    flex:1;min-width:0;border:none;background:transparent;color:var(--text-muted);
    padding:10px 6px;border-radius:var(--radius-sm);font-size:var(--fs-sm);font-weight:600;cursor:pointer;
    transition:background .15s,color .15s;display:flex;align-items:center;justify-content:center;gap:6px;
    overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  }
  .view-switch button i{font-size:16px;flex-shrink:0;}
  .view-switch button.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px var(--accent-shadow), var(--neon-glow), var(--shadow-inset-top);}

  /* ---------- Navigazione data ---------- */
  .date-nav{
    display:flex;align-items:center;justify-content:space-between;gap:var(--sp-2);
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
    padding:6px 8px;margin-bottom:var(--sp-3);box-shadow:var(--shadow-card), var(--shadow-inset-top);
  }
  .date-nav-arrows{display:flex;gap:6px;flex-shrink:0;}
  .date-nav-arrows button{
    border:1px solid var(--border);background:var(--surface);color:var(--head);
    width:36px;height:36px;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;
    box-shadow:var(--shadow-btn);
    display:flex;align-items:center;justify-content:center;transition:background .15s;
  }
  .date-nav-arrows button:hover{background:var(--bg-soft);}
  .date-nav .date-label{
    font-weight:700;font-size:var(--fs-md);color:var(--head);text-align:center;flex:1;min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.01em;
    cursor:pointer;border-radius:var(--radius-sm);padding:4px 8px;transition:background .15s;
  }
  .date-nav .date-label:hover{background:var(--bg-soft);}
  /* Il testo della data e l'input date nativo stanno sovrapposti nello
     stesso contenitore: l'input è invisibile ma realmente cliccabile
     (posizionato sopra, pointer-events attivi), così un tap diretto
     dell'utente apre il calendario nativo in modo affidabile su tutti i
     browser, senza dipendere da showPicker()/click() via JS che non sono
     supportati o affidabili ovunque (specialmente Safari/iOS). */
  .date-label-wrap{position:relative;flex:1;min-width:0;}
  .date-nav .date-label{
    position:relative;z-index:1;pointer-events:none;
  }
  .date-picker-input{
    position:absolute;inset:0;width:100%;height:100%;
    opacity:0;border:0;padding:0;margin:0;cursor:pointer;z-index:2;
    -webkit-appearance:none;appearance:none;
  }
  .today-text-btn{
    border:1px solid var(--border);background:var(--surface);color:var(--head);
    padding:0 var(--sp-4);height:36px;border-radius:var(--radius-sm);
    font-size:var(--fs-sm);font-weight:600;cursor:pointer;flex-shrink:0;transition:background .15s,box-shadow .15s;
    box-shadow:var(--shadow-btn);
  }
  .today-text-btn:hover{background:var(--bg-soft);box-shadow:var(--shadow-card-hover);}

  /* ---------- Card ---------- */
  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
    box-shadow:var(--shadow-card), var(--shadow-inset-top);overflow:hidden;margin-bottom:var(--sp-3);
    transition:border-color .3s ease, box-shadow .3s ease;
  }
  /* In dark mode, le card della vista attualmente attiva riflettono un
     sottile bagliore neon sul bordo, coerente con l'accento del tema. */
  body.dark-mode .mega-timeline-card,
  body.dark-mode #view-day-el{
    border-color:rgba(255,0,132,.25);
    box-shadow:var(--shadow-card), var(--shadow-inset-top), 0 0 24px rgba(255,0,132,.08);
  }

  /* ---------- Timeline giornaliera (mega) ---------- */
  .mega-timeline-header{
    padding:var(--sp-3) var(--sp-4);border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;background:var(--surface-2);
  }
  .mega-timeline-title{font-size:var(--fs-sm);font-weight:700;color:var(--head);letter-spacing:-.01em;}
  .mega-timeline-scroll{overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch;}
  .mega-timeline-grid{
    display:grid;grid-template-columns:90px repeat(48, minmax(16px, 1fr));min-width:max-content;position:relative;
  }
  .mtl-corner{
    position:sticky;left:0;z-index:3;background:var(--surface);
    border-right:1px solid var(--border-strong);border-bottom:1px solid var(--border);
  }
  .mtl-hour-label{
    text-align:center;font-size:9px;font-weight:600;color:var(--text-muted);padding:6px 0;
    border-bottom:1px solid var(--border);border-right:1px solid var(--border);background:var(--surface-2);
    grid-column:span 2;
  }
  .mtl-res-label{
    position:sticky;left:0;z-index:2;background:var(--surface);
    border-right:1px solid var(--border-strong);border-top:1px solid var(--border);
    padding:var(--sp-2) var(--sp-3);font-size:11px;font-weight:600;color:var(--head);
    display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .mtl-res-label .mtl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .mtl-track{
    position:relative;grid-column:span 48;border-top:1px solid var(--border);height:50px;
    background-image:repeating-linear-gradient(to right, var(--bg-soft) 0, var(--bg-soft) calc(2 * (100% / 48)), var(--surface) calc(2 * (100% / 48)), var(--surface) calc(4 * (100% / 48)));
  }
  .mtl-block{
    position:absolute;top:7px;height:36px;border-radius:6px;color:#fff;font-size:9.5px;font-weight:600;
    padding:3px 7px;overflow:hidden;white-space:nowrap;cursor:pointer;
    box-shadow:0 1px 4px rgba(0,0,0,.22);display:flex;flex-direction:column;justify-content:center;gap:0;
    transition:transform .12s, box-shadow .12s;
  }
  .mtl-block:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,.3);z-index:5;}
  .mtl-block:active{transform:scale(0.97);}
  .mtl-block .mtl-block-name{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mtl-block .mtl-block-time{font-size:8px;opacity:.9;}
  .mtl-now-line{position:absolute;top:0;bottom:0;width:2px;background:var(--now-line);z-index:4;pointer-events:none;}
  .mtl-empty{padding:var(--sp-6);text-align:center;color:var(--text-muted);font-size:var(--fs-sm);}

  .following-tooltip{
    position:fixed;top:0;left:0;z-index:200;pointer-events:none;
    background:var(--head);color:var(--surface);font-size:12px;font-weight:600;
    padding:6px 10px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,.25);
    opacity:0;transform:translateY(4px);
    transition:opacity .12s ease, transform .12s ease;
    max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .following-tooltip.visible{opacity:1;transform:translateY(0);}

  /* ---------- Toggle pannello giorno (mobile) ---------- */
  .day-view-toggle-mobile{
    display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-md);padding:4px;margin-bottom:var(--sp-3);box-shadow:var(--shadow-card), var(--shadow-inset-top);
  }
  .day-view-toggle-mobile button{
    flex:1;border:none;background:transparent;color:var(--text-muted);padding:9px 8px;
    border-radius:var(--radius-sm);font-size:12.5px;font-weight:600;cursor:pointer;
    transition:background .15s,color .15s,box-shadow .15s;
  }
  .day-view-toggle-mobile button.active{background:var(--accent);color:#fff;box-shadow:0 2px 6px var(--accent-shadow), var(--shadow-inset-top);}
  .day-view-split{display:block;}
  .day-view-split .mega-timeline-card.mobile-hidden,
  .day-view-split #view-day-el.mobile-hidden{display:none;}

  /* ---------- Layout desktop ---------- */
  @media (min-width:1100px){
    .day-view-toggle-mobile{display:none;}
    .day-view-split{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-5);align-items:start;}
    .day-view-split .mega-timeline-card.mobile-hidden,
    .day-view-split #view-day-el.mobile-hidden{display:block;}
    /* Colonna destra (Risorse/lista slot in vista Giorno, Mese in vista
       Settimana) risale con un margine negativo fino a toccare quasi la
       barra di navigazione, alla stessa Y della colonna sinistra
       ("Oggi + data" comprime tutto sopra la timeline, non sopra le risorse). */
    #side-detail-card{margin-bottom:var(--sp-2);}
    .date-nav{margin-bottom:var(--sp-2);}
  }

  @media (min-width:1100px){
    .app{max-width:1280px;padding:var(--sp-6) var(--sp-8);}

    header{padding:var(--sp-3) var(--sp-5);margin-bottom:var(--sp-3);}
    header h1{font-size:var(--fs-xl);}
    header img{height:38px;}

    .topbar-row{
      display:flex;align-items:center;gap:var(--sp-5);margin-bottom:var(--sp-3);
    }
    .topbar-row .date-nav,
    .topbar-row .view-switch{
      margin-bottom:0;
      width:calc((100% - var(--sp-5)) / 2);
      max-width:none;
      flex:none;
      padding:6px 8px;
    }
    .view-switch button{font-size:var(--fs-sm);height:36px;padding:0 var(--sp-4);}

    .date-nav .date-label{font-size:var(--fs-md);}

    /* "Oggi" + selettore data e card dettaglio giorno: stessa larghezza della
       colonna sinistra della vista Settimana, allineati a sinistra */
    /* larghezza gestita da .topbar-row .date-nav sopra */
    #side-detail-card{width:calc((100% - var(--sp-5)) / 2);max-width:none;margin-left:0;margin-right:auto;}

    .main-layout{display:block;}
    .main-col{min-width:0;}

    .week-month-split{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-5);align-items:start;}
    .week-month-split .card{margin-bottom:0;}
    #view-week-el .week-list{max-height:var(--week-col-height, 640px);overflow-y:auto;}

    .agenda-top-split{display:grid;grid-template-columns:1fr 1fr;gap:0;}
    .agenda-top-split .agenda-notes{border-bottom:none;border-right:1px solid var(--border);}
    .agenda-top-split .todo-section{border-right:none;}

    .resource-tabs{padding:var(--sp-4) var(--sp-5);gap:var(--sp-2);}
    .resource-tabs button{padding:var(--sp-2) var(--sp-4);font-size:var(--fs-sm);}
    .duplicate-day-btn, .manage-res-btn{padding:var(--sp-2) var(--sp-4);font-size:var(--fs-sm);}
    .toolbar-actions{margin-right:var(--sp-5);}

    .mini-timeline-wrap{padding:var(--sp-4) var(--sp-5) var(--sp-2);}
    .mini-timeline{height:36px;}
    .day-countdown{margin:0 var(--sp-5) var(--sp-3);padding:var(--sp-3) var(--sp-4);font-size:var(--fs-sm);}

    .mega-timeline-card{display:block;}
    .mega-timeline-header{padding:var(--sp-4) var(--sp-5);}
    .mega-timeline-title{font-size:var(--fs-base);}
    .mega-timeline-grid{grid-template-columns:130px repeat(48, minmax(22px, 1fr));}
    .mtl-hour-label{font-size:var(--fs-xs);padding:var(--sp-2) 0;}
    .mtl-res-label{padding:var(--sp-3) var(--sp-4);font-size:var(--fs-sm);}
    .mtl-track{height:56px;}
    .mtl-block{top:8px;height:40px;font-size:var(--fs-xs);padding:4px 8px;border-radius:7px;}
    .mtl-block .mtl-block-time{font-size:10px;}

    #view-day-el .slot-list{padding:var(--sp-3) var(--sp-5);overflow-y:auto;max-height:var(--day-col-height, 560px);}
    .slot{padding:18px 16px;}
    .slot-time{font-size:var(--fs-md);}

    .week-list{padding:var(--sp-3);gap:var(--sp-2);}
    .week-day-header{padding:8px 12px;}
    .week-mini-timeline-wrap{padding:0 12px 8px;overflow:hidden;}
    .week-mini-timeline-wrap .mini-timeline{height:8px;}
    .week-mini-timeline-wrap .mini-timeline .mt-now{top:0;bottom:0;}
    .month-grid{padding:var(--sp-5);gap:var(--sp-1);}

    .fab{
      width:56px;height:56px;font-size:24px;bottom:var(--sp-6);right:var(--sp-6);
      box-shadow:0 4px 14px var(--accent-shadow), 0 1px 3px rgba(0,0,0,.1);
    }
    .fab:hover{transform:translateY(-2px);box-shadow:0 8px 22px var(--accent-shadow), 0 2px 5px rgba(0,0,0,.12);}
  }

  /* ---------- Appunti agenda / To-do ---------- */
  .agenda-notes{padding:var(--sp-4);border-bottom:1px solid var(--border);}
  .agenda-notes-title{font-size:var(--fs-sm);font-weight:700;color:var(--head);margin-bottom:var(--sp-2);}
  .agenda-notes textarea{
    width:100%;min-height:80px;border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:10px 12px;font-size:var(--fs-base);background:var(--bg-soft);color:var(--text-main);resize:vertical;
  }
  .agenda-notes textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--focus-shadow);}
  .agenda-notes textarea::placeholder{color:var(--text-muted);}

  .todo-section{padding:var(--sp-4);border-bottom:1px solid var(--border);}
  .todo-add-row{display:flex;gap:var(--sp-2);margin-bottom:var(--sp-3);}
  .todo-add-row input{
    flex:1;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:16px;
    background:var(--bg-soft);color:var(--text-main);
  }
  .todo-add-row input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--focus-shadow);}
  .todo-add-row input::placeholder{color:var(--text-muted);}
  .todo-add-row button{
    background:var(--accent);color:#fff;border:none;padding:0 var(--sp-4);
    border-radius:var(--radius-sm);font-size:var(--fs-sm);font-weight:700;cursor:pointer;white-space:nowrap;
    transition:background .15s;
  }
  .todo-add-row button:hover{background:var(--accent-dark);}
  .todo-list{display:flex;flex-direction:column;gap:6px;}
  .todo-item{
    display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--radius-sm);
    background:var(--bg-soft);border:1px solid var(--border);font-size:var(--fs-base);
  }
  .todo-item input[type="checkbox"]{width:17px;height:17px;flex-shrink:0;cursor:pointer;accent-color:var(--accent);}
  .todo-item .todo-text{flex:1;color:var(--text-main);word-break:break-word;}
  .todo-item.done .todo-text{text-decoration:line-through;color:var(--text-muted);}
  .todo-item .todo-del{color:var(--danger);cursor:pointer;flex-shrink:0;font-size:14px;padding:6px 9px;}
  .todo-empty{color:var(--text-muted);font-size:var(--fs-sm);text-align:center;padding:var(--sp-2) 0;}

  /* ---------- Agenda ---------- */
  .agenda-list{padding:var(--sp-2) var(--sp-1);}
  .agenda-date-title{
    font-size:var(--fs-xs);font-weight:700;color:var(--text-muted);padding:var(--sp-3) var(--sp-4) var(--sp-1);
    text-transform:uppercase;letter-spacing:.06em;
  }
  .agenda-date-title.today{color:var(--accent);}
  .agenda-item{
    display:flex;align-items:center;gap:10px;padding:10px var(--sp-4);margin:0 var(--sp-2) 4px;
    border-radius:var(--radius-sm);cursor:pointer;
    transition:background .15s ease, transform .1s cubic-bezier(.2,.8,.3,1);
  }
  .agenda-item:hover{background:var(--bg-soft);}
  .agenda-item:active{transform:scale(0.98);}
  .agenda-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .agenda-time{font-size:var(--fs-xs);font-weight:700;color:var(--text-muted);flex-shrink:0;width:88px;}
  .agenda-info{font-size:var(--fs-sm);color:var(--text-main);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  /* ---------- Toolbar giorno ---------- */
  .day-toolbar{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-2);border-bottom:1px solid var(--border);background:var(--surface-2);}
  .resource-tabs{display:flex;flex-wrap:wrap;gap:6px;padding:var(--sp-2) var(--sp-3);flex:1;}
  .toolbar-actions{display:flex;gap:var(--sp-2);flex-shrink:0;margin-right:var(--sp-3);}
  .duplicate-day-btn, .manage-res-btn{
    flex-shrink:0;border:1px solid var(--border);background:var(--surface);color:var(--head);
    padding:7px 12px;border-radius:var(--radius-sm);font-size:var(--fs-xs);font-weight:600;cursor:pointer;
    display:flex;align-items:center;gap:6px;transition:background .15s;white-space:nowrap;
  }
  .duplicate-day-btn:hover, .manage-res-btn:hover{background:var(--bg-soft);}
  .resource-tabs button{
    border:1px solid var(--border);background:var(--surface);color:var(--text-main);
    padding:7px 12px;border-radius:999px;font-size:var(--fs-xs);font-weight:600;cursor:pointer;
    transition:all .15s;white-space:nowrap;box-shadow:var(--shadow-btn);
  }
  .resource-tabs button:hover{border-color:var(--border-strong);box-shadow:var(--shadow-card-hover);}
  .resource-tabs button.active{
    background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 6px var(--accent-shadow), var(--neon-glow), var(--shadow-inset-top);
  }

  /* ---------- Mini timeline ---------- */
  .mini-timeline-wrap{padding:var(--sp-3) var(--sp-3) var(--sp-2);border-bottom:1px solid var(--border);}
  .mini-timeline{
    position:relative;height:32px;background:var(--free);border:1px solid var(--free-border);
    border-radius:var(--radius-sm);overflow:hidden;
  }
  .mini-timeline .mt-tick{position:absolute;top:0;bottom:0;width:1px;background:rgba(0,0,0,.07);}
  body.dark-mode .mini-timeline .mt-tick{background:rgba(255,255,255,.08);}
  .mini-timeline .mt-segment{
    position:absolute;top:0;bottom:0;cursor:pointer;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    transition:filter .15s ease, transform .1s cubic-bezier(.2,.8,.3,1);
  }
  .mini-timeline .mt-segment:hover{filter:brightness(1.08);}
  .mini-timeline .mt-segment:active{transform:scaleY(0.9);}
  .mini-timeline .mt-segment span{color:#fff;font-size:9.5px;font-weight:700;white-space:nowrap;padding:0 3px;}
  .mini-timeline .mt-now{
    position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--now-line);z-index:2;border-radius:2px;
  }
  .mini-timeline-labels{
    display:flex;justify-content:space-between;font-size:10.5px;font-weight:600;
    color:var(--muted-timeline);margin-top:6px;padding:0 1px;
  }

  /* ---------- Lista slot ---------- */
  .slot-list{
    padding:var(--sp-3);display:flex;flex-direction:column;gap:6px;max-height:65vh;overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  .slot{
    display:flex;align-items:center;justify-content:space-between;padding:16px 14px;
    border-radius:var(--radius-md);border:1px solid var(--free-border);background:var(--free);
    cursor:pointer;transition:transform .12s cubic-bezier(.2,.8,.3,1), box-shadow .15s ease, border-color .15s ease;
    box-shadow:0 1px 2px rgba(0,0,0,.03);
  }
  .slot:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08);}
  .slot:active{transform:scale(0.985);box-shadow:none;}
  .slot .slot-time{font-weight:700;font-size:var(--fs-base);color:var(--free-text);}
  .slot .slot-label{font-size:var(--fs-xs);color:var(--muted-free-label);}
  .slot.busy{background:var(--busy-bg);border-color:var(--busy-border);}
  .slot.busy .slot-time{color:var(--head);}
  .slot.busy .slot-label{color:var(--busy-text);font-weight:600;}
  .slot .slot-icon{font-size:17px;color:inherit;opacity:.7;font-style:normal;}
  .slot.busy .slot-icon{color:var(--danger);}
  .slot.free .slot-icon{color:var(--muted-free-label);}

  .allday-chips{display:flex;flex-wrap:wrap;gap:6px;padding:var(--sp-2) var(--sp-3) var(--sp-3);}
  .allday-chip{
    color:#fff;font-size:11.5px;font-weight:700;padding:6px 12px;border-radius:999px;cursor:pointer;
    box-shadow:0 2px 6px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.25);transition:transform .12s cubic-bezier(.2,.8,.3,1), box-shadow .15s ease;
  }
  .allday-chip:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,.26), inset 0 1px 0 rgba(255,255,255,.25);}
  .allday-chip:active{transform:scale(0.96);}

  .day-countdown{
    margin:var(--sp-2) var(--sp-3);padding:10px 14px;border-radius:var(--radius-sm);
    font-size:var(--fs-sm);font-weight:600;text-align:center;
  }
  .day-countdown.upcoming{background:var(--warn-bg);color:var(--warn-text);border:1px solid var(--warn-border);}
  .day-countdown.ongoing{background:var(--busy-bg);color:var(--busy-text);border:1px solid var(--busy-border);}

  .slot-now-line{position:relative;display:flex;align-items:center;gap:8px;margin:6px 2px;}
  .slot-now-line::before, .slot-now-line::after{content:"";flex:1;height:1.5px;background:var(--now-line);border-radius:2px;opacity:.55;}
  .slot-now-line span{
    font-size:10px;font-weight:700;color:#fff;background:var(--now-line);padding:3px 9px;
    border-radius:999px;white-space:nowrap;box-shadow:0 2px 5px rgba(225,29,72,.3);letter-spacing:.02em;
  }

  /* ---------- Vista settimana ---------- */
  .week-list{padding:var(--sp-3);display:flex;flex-direction:column;gap:var(--sp-3);}
  .week-day{border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;background:var(--surface);box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .week-day-header{
    display:flex;align-items:center;justify-content:space-between;padding:11px 14px;
    background:var(--surface-2);cursor:pointer;
    transition:background .15s ease;
  }
  .week-day-header:hover{background:var(--bg-soft);}
  .week-day-header:active{background:var(--border);}
  .week-mini-timeline-wrap{padding:0 14px 10px;background:var(--surface-2);overflow:hidden;}
  .week-mini-timeline-wrap .mini-timeline{height:8px;}
  .week-mini-timeline-wrap .mini-timeline .mt-now{top:0;bottom:0;}
  .week-mini-timeline-wrap .mt-segment span{display:none;}
  .week-day-header.today{background:var(--accent-soft);}
  .week-day-header.today + .week-mini-timeline-wrap{background:var(--accent-soft);}
  .week-day-header .wd-name{font-weight:700;color:var(--head);font-size:var(--fs-base);letter-spacing:-.01em;}
  .week-day-header .wd-count{
    font-size:var(--fs-xs);color:var(--text-muted);background:var(--surface);
    padding:3px 9px;border-radius:999px;border:1px solid var(--border);
  }
  .week-day-body{padding:0 14px 12px;display:none;flex-direction:column;gap:6px;}
  .week-day-body.open{display:flex;padding-top:10px;}
  .week-item{
    display:flex;align-items:center;justify-content:space-between;padding:9px 11px;
    border-radius:var(--radius-sm);background:var(--bg-soft);border:1px solid var(--border);font-size:var(--fs-sm);
    transition:background .15s ease, transform .1s cubic-bezier(.2,.8,.3,1);
  }
  .week-item:hover{background:var(--border);}
  .week-item:active{transform:scale(0.99);}
  .week-item .wi-res{font-weight:700;color:var(--head);}
  .week-item .wi-time{color:var(--muted-week-time);}
  .week-item .wi-del{color:var(--danger);cursor:pointer;font-size:15px;padding:6px 9px;}
  .week-empty{padding:10px 0;text-align:center;color:var(--muted-empty);font-size:var(--fs-sm);}

  /* ---------- Vista mese ---------- */
  .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:var(--sp-3);}
  .month-dow{
    text-align:center;font-size:10.5px;font-weight:700;color:var(--text-muted);
    padding:6px 0;text-transform:uppercase;letter-spacing:.06em;
  }
  .month-cell{
    aspect-ratio:1;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:5px 2px;
    cursor:pointer;transition:background .15s ease, border-color .15s ease, transform .12s cubic-bezier(.2,.8,.3,1);
    position:relative;
  }
  .month-cell:hover{background:var(--bg-soft);border-color:var(--border-strong);transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.08);}
  .month-cell:active{transform:scale(0.95);}
  .month-cell.other-month{opacity:.35;}
  .month-cell.today{border-color:var(--accent);border-width:2px;background:var(--accent-soft);}
  .month-cell .mc-num{font-size:13px;font-weight:600;color:var(--num-color);}
  .month-cell.today .mc-num{color:var(--accent);font-weight:800;}
  .month-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:4px;max-width:100%;}
  .month-dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);}

  /* ---------- Footer supporto ---------- */
  .app-footer{
    display:flex;justify-content:flex-start;padding:var(--sp-5) 0 var(--sp-3);
  }
  .footer-support-link{
    border:none;background:transparent;color:var(--text-muted);
    font-size:12.5px;font-weight:600;cursor:pointer;padding:8px 14px;
    border-radius:999px;transition:background .15s,color .15s;
    text-decoration:underline;text-underline-offset:3px;
  }
  .footer-support-link:hover{background:var(--bg-soft);color:var(--head);}

  /* ---------- FAB ---------- */
  .fab{
    position:fixed;right:20px;bottom:20px;width:56px;height:56px;border-radius:50%;
    background:var(--accent);color:#fff;border:none;font-size:26px;
    box-shadow:0 8px 22px var(--accent-shadow), var(--neon-glow), inset 0 1px 0 rgba(255,255,255,.35);cursor:pointer;z-index:60;
    display:flex;align-items:center;justify-content:center;transition:transform .12s,background .15s,box-shadow .15s;
  }
  .fab:hover{background:var(--accent-dark);box-shadow:0 10px 26px var(--accent-shadow), var(--neon-glow), inset 0 1px 0 rgba(255,255,255,.35);}
  .fab:active{transform:scale(0.92);}

  /* ---------- Modali ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(22,18,14,.5);display:none;align-items:center;justify-content:center;
    z-index:100;padding:16px;backdrop-filter:blur(3px);
  }
  .modal-overlay.open{display:flex;}
  /* Il modale supporto può essere aperto anche dalla schermata di login
     (z-index:500), quindi deve stare sopra di essa. */
  #support-overlay{z-index:600;}
  .modal{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
    padding:var(--sp-5);width:100%;max-width:380px;box-shadow:var(--shadow-pop), var(--shadow-inset-top);
  }
  .modal h3{margin:0 0 var(--sp-3);color:var(--head);font-size:var(--fs-md);font-weight:700;letter-spacing:-.01em;}
  .modal label{display:block;font-size:10.5px;font-weight:600;color:var(--text-muted);margin:var(--sp-2) 0 4px;text-transform:uppercase;letter-spacing:.05em;}
  .modal select, .modal input{
    width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);
    font-size:15px;background:var(--bg-soft);color:var(--text-main);
  }
  .modal select:focus, .modal input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--focus-shadow);}
  .allday-toggle{
    display:flex !important;align-items:center;gap:8px;font-size:13px !important;font-weight:600;
    color:var(--head) !important;cursor:pointer;margin:var(--sp-2) 0 4px;text-transform:none !important;letter-spacing:0 !important;
  }
  .allday-toggle input{
    width:16px !important;height:16px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;padding:0;
    -webkit-appearance:none;appearance:none;border:2px solid var(--border-strong);border-radius:4px;
    background:var(--bg-soft);position:relative;
  }
  .allday-toggle input:checked{background:var(--accent);border-color:var(--accent);}
  .allday-toggle input:checked::after{
    content:"";position:absolute;left:3px;top:0px;width:4px;height:8px;
    border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);
  }
  .modal-row{display:flex;gap:8px;}
  .modal-row > div{flex:1;min-width:0;}
  .modal input[type="time"]{width:100%;max-width:100%;box-sizing:border-box;}
  .modal-actions{display:flex;gap:8px;margin-top:var(--sp-4);}
  .modal-actions button{
    flex:1;padding:10px;border:none;border-radius:var(--radius-sm);font-size:13.5px;font-weight:700;cursor:pointer;
    transition:background .15s;
  }
  .modal-actions .btn-cancel{background:var(--btn-secondary-bg);color:var(--btn-secondary-text);}
  .modal-actions .btn-cancel:hover{background:var(--border);}
  .modal-actions .btn-confirm{background:var(--accent);color:#fff;box-shadow:0 3px 10px var(--accent-shadow);}
  .modal-actions .btn-confirm:hover{background:var(--accent-dark);}

  /* ---------- Login ---------- */
  #login-overlay{
    position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;
    background:
      radial-gradient(1100px 800px at 15% -10%, rgba(192,57,47,.75), transparent 65%),
      radial-gradient(1000px 800px at 110% 110%, rgba(192,57,47,.6), transparent 65%),
      var(--bg);
  }
  body.dark-mode #login-overlay{
    background:
      radial-gradient(1100px 800px at 15% -10%, rgba(255,0,132,.55), transparent 65%),
      radial-gradient(1000px 800px at 110% 110%, rgba(255,0,132,.42), transparent 65%),
      var(--bg);
  }
  .login-card{
    background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:40px 32px;width:100%;max-width:380px;box-shadow:var(--shadow-pop), var(--shadow-inset-top);text-align:center;
    animation:loginCardIn .45s cubic-bezier(.2,.8,.3,1);
  }
  @keyframes loginCardIn{
    from{opacity:0;transform:translateY(14px) scale(.97);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }
  #login-theme-toggle{
    position:fixed;top:20px;right:20px;z-index:501;
    border:1px solid var(--border);background:var(--surface);color:var(--head);
    width:38px;height:38px;border-radius:var(--radius-sm);font-size:15px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s,border-color .15s,box-shadow .15s;
    box-shadow:var(--shadow-btn);
  }
  #login-theme-toggle:hover{background:var(--bg-soft);box-shadow:var(--shadow-card-hover);}
  #login-help-toggle{
    position:fixed;top:20px;right:66px;z-index:501;
    border:1px solid var(--border);background:var(--surface);color:var(--head);
    width:38px;height:38px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s,border-color .15s,box-shadow .15s;
    box-shadow:var(--shadow-btn);
  }
  #login-help-toggle:hover{background:var(--bg-soft);box-shadow:var(--shadow-card-hover);}
  .login-lang-switch{
    display:flex;justify-content:center;gap:6px;margin-bottom:var(--sp-4);
  }
  .login-lang-switch .lang-btn{
    border:1px solid var(--border);background:var(--surface);color:var(--text-muted);
    padding:5px 12px;border-radius:999px;font-size:11.5px;font-weight:700;letter-spacing:.04em;
    cursor:pointer;transition:background .15s,color .15s,border-color .15s,box-shadow .15s;
    box-shadow:var(--shadow-btn);
  }
  .login-lang-switch .lang-btn:hover{background:var(--bg-soft);}
  .login-lang-switch .lang-btn.active{
    background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:var(--neon-glow), var(--shadow-inset-top);
  }
  .login-logo{
    height:56px;margin-bottom:var(--sp-4);border-radius:var(--radius-md);
    mix-blend-mode:multiply;transition:filter .2s, mix-blend-mode .2s;
  }
  body.dark-mode .login-logo{
    filter:invert(1) hue-rotate(160deg) saturate(2.4);
    mix-blend-mode:screen;
  }
  .login-card h2{margin:0 0 4px;color:var(--head);font-size:22px;font-weight:800;letter-spacing:-.02em;}
  .login-subtitle{margin:0 0 var(--sp-6);color:var(--text-muted);font-size:var(--fs-sm);}
  .login-card input{
    width:100%;padding:13px 14px;margin-bottom:12px;border:1px solid var(--border);
    border-radius:var(--radius-sm);font-size:16px;background:var(--bg-soft);color:var(--text-main);
    transition:border-color .15s, box-shadow .15s;
    box-shadow:inset 0 1px 3px rgba(0,0,0,.05);
  }
  .login-card input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--focus-shadow);}
  .login-error{color:var(--danger);font-size:var(--fs-xs);min-height:16px;margin-bottom:8px;font-weight:600;}
  .login-btn{
    width:100%;padding:14px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;
    background:var(--accent);color:#fff;box-shadow:0 8px 22px var(--accent-shadow), var(--neon-glow), inset 0 1px 0 rgba(255,255,255,.3);letter-spacing:.01em;
    transition:transform .12s, background .15s, box-shadow .15s;
  }
  .login-btn:hover{background:var(--accent-dark);transform:translateY(-1px);}
  .login-btn:active{transform:translateY(0);}

  #loading-overlay{
    display:none;position:fixed;inset:0;z-index:600;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    background:var(--bg);
  }
  .loading-spinner{
    width:44px;height:44px;border-radius:50%;border:4px solid var(--border);border-top-color:var(--accent);
    animation:spin .8s linear infinite;
  }
  .loading-text{color:var(--head);font-size:var(--fs-base);font-weight:700;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------- Gestione risorse / utenti ---------- */
  .manage-res-modal{max-width:440px;max-height:85vh;overflow-y:auto;}
  .res-manage-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;margin-bottom:var(--sp-4);}
  .res-manage-item{
    display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--radius-sm);
    background:var(--bg-soft);border:1px solid var(--border);cursor:grab;
    transition:background .15s ease, border-color .15s ease;
  }
  .res-manage-item:hover{border-color:var(--border-strong);}
  .res-manage-item.dragging{opacity:.4;}
  .res-manage-item .rm-handle{color:var(--text-muted);font-size:15px;flex-shrink:0;cursor:grab;}
  .rm-color-picker{
    -webkit-appearance:none;appearance:none;
    width:26px !important;min-width:26px;max-width:26px;height:26px;min-height:26px;max-height:26px;
    flex-shrink:0;border:2px solid var(--border);border-radius:50%;
    padding:0 !important;cursor:pointer;background:none;overflow:hidden;
  }
  .rm-color-picker::-webkit-color-swatch-wrapper{padding:0;border-radius:50%;width:100%;height:100%;}
  .rm-color-picker::-webkit-color-swatch{border:none;border-radius:50%;}
  .rm-color-picker::-moz-color-swatch{border:none;border-radius:50%;}
  .res-manage-item .rm-name{flex:1;font-size:var(--fs-sm);font-weight:600;color:var(--text-main);}
  .res-manage-item .rm-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .user-announce-toggle{display:flex;align-items:center;gap:4px;font-size:var(--fs-sm);cursor:pointer;flex-shrink:0;color:var(--text-muted);}
  .user-announce-toggle input{width:15px;height:15px;cursor:pointer;accent-color:var(--accent);}
  .rm-arrows{display:flex;flex-direction:column;gap:1px;flex-shrink:0;}
  .rm-arrows button{
    border:none;background:transparent;color:var(--text-muted);font-size:11px;cursor:pointer;
    padding:5px 8px;line-height:1;min-width:28px;min-height:20px;
  }
  .rm-arrows button:hover:not(:disabled){color:var(--accent);}
  .rm-arrows button:disabled{opacity:.25;cursor:default;}
  .res-manage-item .rm-delete{color:var(--danger);cursor:pointer;font-size:15px;padding:6px 9px;flex-shrink:0;}
  .res-add-row{display:flex;gap:8px;}
  .res-add-row input{flex:1;}
  .res-add-row button{
    background:var(--accent);color:#fff;border:none;padding:0 var(--sp-4);
    border-radius:var(--radius-sm);font-size:var(--fs-sm);font-weight:700;cursor:pointer;white-space:nowrap;
    transition:background .15s;
  }
  .res-add-row button:hover{background:var(--accent-dark);}

  /* ---------- Dettaglio giorno ---------- */
  .day-detail{
    background:var(--surface);border-radius:var(--radius-md);padding:var(--sp-4);
  }
  .side-card .day-detail{padding:2px;}
  .day-detail.is-today{border-left:3px solid var(--accent);padding-left:calc(var(--sp-4) - 3px);}
  .side-card .day-detail.is-today{padding-left:10px;}
  .day-detail h4{margin:0 0 var(--sp-3);color:var(--head);font-size:var(--fs-base);display:flex;align-items:center;gap:8px;flex-wrap:wrap;letter-spacing:-.01em;}
  .today-badge{
    background:var(--accent);color:#fff;font-size:10px;font-weight:800;
    padding:3px 9px;border-radius:999px;letter-spacing:.06em;
    box-shadow:var(--neon-glow), 0 2px 5px var(--accent-shadow), inset 0 1px 0 rgba(255,255,255,.3);
  }
  .month-mini-timeline-wrap{margin-bottom:var(--sp-3);}
  .day-detail .dd-item{
    display:flex;justify-content:space-between;align-items:center;padding:8px 10px;
    background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius-sm);
    margin-bottom:6px;font-size:var(--fs-sm);
  }
  .day-detail .dd-item .dd-del{color:var(--danger);cursor:pointer;padding:6px 9px;}
  .day-detail .dd-empty{color:var(--muted-empty);font-size:var(--fs-sm);text-align:center;padding:var(--sp-2) 0;}

  /* ---------- Mobile ---------- */
  @media (max-width:600px){
    .app{padding:10px;padding-bottom:96px;}
    header{padding:8px 10px;flex-wrap:wrap;gap:6px;row-gap:8px;}
    header h1{font-size:15px;flex:1 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;order:1;}
    header img{height:28px;order:0;}
    #theme-toggle, #search-toggle, #users-toggle, #announce-toggle, #lang-toggle{width:32px;height:32px;font-size:11px;}
    #logout-toggle{height:32px;padding:0 9px;font-size:11px;}
    .profile-pic{width:24px;height:24px;}
    .profile-name{font-size:11px;max-width:70px;}
    .profile-badge{padding:3px 9px 3px 3px;gap:5px;}
    .date-nav .date-label{font-size:13.5px;}
    .month-cell .mc-num{font-size:12px;}
    .fab{right:16px;bottom:calc(16px + env(safe-area-inset-bottom));width:46px;height:46px;font-size:20px;}
    .view-switch button{font-size:10.5px;padding:9px 3px;gap:3px;}
    .view-switch button i{font-size:14px;}

    /* Ordine header mobile: logo, titolo, poi logout+profilo (invertiti,
       a sinistra), poi lingua/annunci/utenti, poi ricerca+tema in fondo
       a destra */
    #logout-toggle{order:2;}
    .profile-badge{order:3;}
    .lang-dropdown-wrap{order:4;}
    #announce-toggle{order:5;}
    #users-toggle{order:6;}
    #search-toggle{order:7;}
    #theme-toggle{order:8;}

    .announce-banner.visible{
      display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--accent);
      border-radius:var(--radius-sm);padding:9px 12px;margin-bottom:10px;box-shadow:var(--shadow-card);
    }
    .ab-icon{font-size:14px;flex-shrink:0;}
    .ab-text{flex:1;min-width:0;font-size:12px;color:var(--text-main);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;white-space:normal;line-height:1.35;}
    .ab-check{
      border:none;background:var(--accent);color:#fff;width:26px;height:26px;border-radius:50%;
      font-size:13px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    }

    #side-detail-card .day-detail{
      padding:8px 12px;margin-top:0;display:flex;align-items:center;gap:8px;flex-wrap:nowrap;
      border-radius:var(--radius-sm);
    }
    #side-detail-card .day-detail h4{margin:0;font-size:11.5px;flex-shrink:1;gap:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
    #side-detail-card .today-badge{font-size:9px;padding:2px 7px;}
    #side-detail-card .month-mini-timeline-wrap{display:none;}
    #side-detail-card .day-detail .dd-item{display:none;}
    #side-detail-card .day-detail .dd-empty{display:none;}
    #side-detail-card .day-detail::after{
      content:attr(data-count);font-size:11px;color:var(--text-muted);white-space:nowrap;flex-shrink:0;margin-left:auto;
    }

    .resource-tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:8px;}
    .resource-tabs button{padding:8px 6px;font-size:11.5px;text-align:center;justify-content:center;display:flex;align-items:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    .day-toolbar{flex-direction:column;align-items:stretch;}
    .toolbar-actions{margin:8px 8px 0;order:-1;display:flex;gap:8px;}
    .duplicate-day-btn, .manage-res-btn{flex:1;justify-content:center;}
    .duplicate-day-btn .dup-txt{display:inline;}

    .modal{width:88vw;max-width:340px;padding:16px;}
    .modal h3{font-size:15px;margin-bottom:var(--sp-2);}
    .modal-row{gap:6px;}
    .modal-row > div{width:100%;min-width:0;}
    .modal input[type="time"]{padding:7px 4px;font-size:13px;width:100%;box-sizing:border-box;}
    .modal input[type="date"]{padding:7px 4px;font-size:12px;width:100%;box-sizing:border-box;}
  }
</style>
</head>
<body>

<div id="login-overlay">
  <button id="login-theme-toggle" onclick="toggleTheme()" title="Cambia tema" aria-label="Cambia tema"><svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
  <button id="login-help-toggle" onclick="openSupportModal()" title="Aiuto" aria-label="Aiuto">?</button>
  <div class="login-card">
    <div class="login-lang-switch" id="login-lang-switch">
      <button class="lang-btn" data-lang="it" onclick="setLanguage('it')">IT</button>
      <button class="lang-btn" data-lang="de" onclick="setLanguage('de')">DE</button>
      <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">EN</button>
    </div>
    <img src="L.jpg" alt="Logo" class="login-logo">
    <h2 data-i18n="login.title">LOGIN</h2>
    <input type="text" id="login-username" data-i18n-placeholder="login.username" placeholder="E-Mail" autocomplete="username">
    <input type="password" id="login-password" data-i18n-placeholder="login.password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter') attemptLogin()">
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" onclick="attemptLogin()" data-i18n="login.submit">Accedi</button>
  </div>
</div>

<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" data-i18n="loading.text">Caricamento...</div>
</div>

<div class="app">
  <header>
    <img src="L.jpg" alt="Logo" id="logo-img">
    <h1 data-i18n="app.title">Gestionale</h1>
    <div class="lang-dropdown-wrap" id="lang-dropdown-wrap">
      <button id="lang-toggle" onclick="toggleLangDropdown()" title="Lingua / Language / Sprache" aria-label="Lingua">
        <span id="lang-toggle-label">IT</span>
      </button>
      <div class="lang-dropdown-menu" id="lang-dropdown-menu">
        <button data-lang="it" onclick="setLanguage('it'); closeLangDropdown();">Italiano</button>
        <button data-lang="de" onclick="setLanguage('de'); closeLangDropdown();">Deutsch</button>
        <button data-lang="en" onclick="setLanguage('en'); closeLangDropdown();">English</button>
      </div>
    </div>
    <button id="announce-toggle" onclick="openAnnouncementsPanel()" title="Annunci" aria-label="Annunci" style="display:none;"><svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"></path><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"></path></svg><span class="announce-badge" id="announce-badge" style="display:none;"></span></button>
    <button id="users-toggle" onclick="openUsersPanel()" title="Gestisci utenti" aria-label="Gestisci utenti" style="display:none;"><svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></button>
    <button id="search-toggle" onclick="toggleSearchBar()" title="Cerca" aria-label="Cerca"><svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg></button>
    <button id="theme-toggle" onclick="toggleTheme()" title="Cambia tema" aria-label="Cambia tema"><svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
    <button id="logout-toggle" onclick="doLogout()" title="Esci" aria-label="Esci">Log Out</button>
    <div class="profile-badge" id="profile-badge">
      <img src="pfp.jpg" alt="Profilo" class="profile-pic">
      <span class="profile-name" id="profile-name"></span>
    </div>
  </header>

  <div class="announce-banner" id="announce-banner" style="display:none;">
    <span class="ab-icon" aria-hidden="true"><svg class="icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"></path><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"></path></svg></span>
    <span class="ab-text" id="announce-banner-text"></span>
    <button class="ab-check" id="announce-banner-check" onclick="toggleAnnouncementCheck()" title="Segna come letto"><svg class="icon-svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg></button>
  </div>

  <div class="search-bar" id="search-bar" style="display:none;">
    <span class="search-icon" aria-hidden="true"><svg class="icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg></span>
    <input type="text" id="search-input" placeholder="Cerca per descrizione o risorsa..." oninput="onSearchInput()">
    <select id="search-resource-filter" onchange="onSearchInput()"></select>
    <button id="search-clear" onclick="clearSearch()" style="display:none;" aria-label="Cancella ricerca"><svg class="icon-svg" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"></path></svg></button>
  </div>
  <div class="search-results" id="search-results" style="display:none;"></div>

  <div class="main-layout">
    <div class="main-col">
      <div class="topbar-row" id="topbar-row">
        <div class="date-nav">
          <button onclick="goToday()" class="today-text-btn" aria-label="Vai a oggi">Oggi</button>
          <div class="date-label-wrap">
            <div class="date-label" id="date-label" aria-label="Apri calendario"></div>
            <input type="date" id="date-picker-input" class="date-picker-input" onchange="onDatePickerChange(this.value)" aria-label="Seleziona una data">
          </div>
          <div class="date-nav-arrows">
            <button onclick="navPrev()" aria-label="Precedente"><svg class="icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg></button>
            <button onclick="navNext()" aria-label="Successivo"><svg class="icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg></button>
          </div>
        </div>

        <div class="view-switch">
          <button id="tab-day" onclick="switchView('day')"><span aria-hidden="true"><svg class="icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg></span>Giorno</button>
          <button id="tab-week" onclick="switchView('week')"><span aria-hidden="true"><svg class="icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M16 2v4M8 2v4M3 10h18M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"></path></svg></span>Settimana</button>
          <button id="tab-agenda" onclick="switchView('agenda')"><span aria-hidden="true"><svg class="icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"></rect><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><path d="M9 12h6M9 16h6M9 8h6"></path></svg></span>Agenda</button>
        </div>
      </div>

      <div class="card side-card" id="side-detail-card">
        <div id="month-detail"></div>

   pronta da inserire con innerHTML. Il colore segue sempre currentColor,
   quindi eredita automaticamente il colore del testo/tema circostante. */
function icon(name, size, extraClass){
  const svg = ICONS[name];
  if(!svg) return "";
  const cls = "icon-svg" + (extraClass ? " "+extraClass : "");
  const sz = size || 16;
  return svg.replace("<svg ", `<svg class="${cls}" width="${sz}" height="${sz}" `);
}

const LOCALE_MAP = { it: "it-IT", de: "de-DE", en: "en-GB" };

function getCurrentLanguage(){
  try{
    const saved = localStorage.getItem("gestionale_lang");
    if(saved && I18N[saved]) return saved;
  }catch(e){}
  return "it";
}
let currentLang = getCurrentLanguage();

function t(key, vars){
  let str = (I18N[currentLang] && I18N[currentLang][key]) || I18N.it[key] || key;
  if(vars){
    Object.keys(vars).forEach(k=>{ str = str.replace("{"+k+"}", vars[k]); });
  }
  return str;
}
function currentLocale(){ return LOCALE_MAP[currentLang] || "it-IT"; }

function setLanguage(lang){
  if(!I18N[lang]) return;
  currentLang = lang;
  try{ localStorage.setItem("gestionale_lang", lang); }catch(e){}
  applyTranslations();
  if(typeof renderAll === "function" && typeof currentUser !== "undefined" && currentUser){
    renderAll();
    refreshSidePanel();
  }
}

function toggleLangDropdown(){
  const menu = document.getElementById("lang-dropdown-menu");
  if(menu) menu.classList.toggle("open");
}
function closeLangDropdown(){
  const menu = document.getElementById("lang-dropdown-menu");
  if(menu) menu.classList.remove("open");
}
document.addEventListener("click",(e)=>{
  const wrap = document.getElementById("lang-dropdown-wrap");
  if(wrap && !wrap.contains(e.target)) closeLangDropdown();
});

/* Applica le traduzioni a tutti gli elementi statici marcati con
   data-i18n (testo) o data-i18n-placeholder (placeholder input), e
   aggiorna lo stato attivo del selettore lingua nel login. */
function applyTranslations(){
  document.title = t("app.title");
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.textContent = t(el.getAttribute("data-i18n"));
  });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el=>{
    el.placeholder = t(el.getAttribute("data-i18n-placeholder"));
  });
  document.querySelectorAll(".login-lang-switch .lang-btn").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.lang === currentLang);
  });
  const langLabel = document.getElementById("lang-toggle-label");
  if(langLabel) langLabel.textContent = currentLang.toUpperCase();
  document.querySelectorAll(".lang-dropdown-menu button").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.lang === currentLang);
  });
  const logoutBtn = document.getElementById("logout-toggle");
  if(logoutBtn) logoutBtn.textContent = t("logout");
  const dvtTimeline = document.getElementById("dvt-timeline");
  const dvtList = document.getElementById("dvt-list");
  if(dvtTimeline) dvtTimeline.innerHTML = '<span class="icon-mono" aria-hidden="true">'+icon("barChart",14)+'</span> ' + t("day.timelineTab");
  if(dvtList) dvtList.innerHTML = '<span class="icon-mono" aria-hidden="true">'+icon("clipboardList",14)+'</span> ' + t("day.listTab");
  const megaTitle = document.querySelector(".mega-timeline-title");
  if(megaTitle) megaTitle.textContent = t("day.timelineTitle");
  const tabDay = document.getElementById("tab-day");
  const tabWeek = document.getElementById("tab-week");
  const tabAgenda = document.getElementById("tab-agenda");
  if(tabDay) tabDay.innerHTML = "<span aria-hidden=\"true\">"+icon("sun",14)+"</span>" + t("view.day");
  if(tabWeek) tabWeek.innerHTML = "<span aria-hidden=\"true\">"+icon("calendarDays",14)+"</span>" + t("view.week");
  if(tabAgenda) tabAgenda.innerHTML = "<span aria-hidden=\"true\">"+icon("clipboardList",14)+"</span>" + t("view.agenda");
  const todayBtn = document.querySelector(".today-text-btn");
  if(todayBtn) todayBtn.textContent = t("nav.today");
  const searchInput = document.getElementById("search-input");
  if(searchInput) searchInput.placeholder = t("search.placeholder");
  const notesTitle = document.querySelector(".agenda-notes-title");
  if(notesTitle) notesTitle.textContent = t("agenda.notesTitle");
  const todoTitleEls = document.querySelectorAll(".todo-section .agenda-notes-title");
  if(todoTitleEls[0]) todoTitleEls[0].textContent = t("agenda.todoTitle");
  const notesTextarea = document.getElementById("agenda-notes-input");
  if(notesTextarea) notesTextarea.placeholder = t("agenda.notesPlaceholder");
  const todoInput = document.getElementById("todo-input");
  if(todoInput) todoInput.placeholder = t("agenda.todoPlaceholder");
  const todoAddBtn = document.querySelector(".todo-add-row button");
  if(todoAddBtn) todoAddBtn.textContent = t("agenda.todoAdd");
  const dupTxts = document.querySelectorAll(".dup-txt");
  if(dupTxts[0]) dupTxts[0].textContent = t("day.manageResources");
  if(dupTxts[1]) dupTxts[1].textContent = t("day.duplicateDay");
}

const ADMIN_USERNAME = "admin";
const ADMIN_PASSWORD = "derweg";
const SPECIAL_VIEWER_EMAIL = "dario.volani@lastrada-derweg.org";

async function sha256(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}

function loadUsers(){
  try{
    const raw = localStorage.getItem("gestionale_users");
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {};
}
function saveUsers(users){
  try{ localStorage.setItem("gestionale_users", JSON.stringify(users)); }catch(e){}
}

let currentUser = null;

/* Genera una chiave localStorage specifica per l'utente corrente, così
   ogni account ha prenotazioni, risorse, note e todo completamente
   separati dagli altri. Solo gli annunci restano su una chiave globale
   condivisa (vedi loadAnnouncement/saveAnnouncement, che non usano
   questa funzione). Se per qualche motivo non c'è un utente loggato,
   ricade su una chiave neutra "_guest" invece di scrivere su una chiave
   condivisa per errore. */
function userKey(baseKey){
  const userId = currentUser || "_guest";
  return baseKey + "__" + userId;
}

function isAdmin(){ return currentUser === ADMIN_USERNAME; }
function isSpecialViewer(){ return currentUser === SPECIAL_VIEWER_EMAIL; }
function canSeeCheckmarkCounts(){ return isAdmin() || isSpecialViewer(); }

async function attemptLogin(){
  const nameInp = document.getElementById("login-username");
  const passInp = document.getElementById("login-password");
  const errEl = document.getElementById("login-error");
  const name = nameInp.value.trim();
  const pass = passInp.value;

  if(!name || !pass){
    errEl.textContent = t("login.errNeedBoth");
    return;
  }

  if(name === ADMIN_USERNAME){
    if(pass === ADMIN_PASSWORD){
      completeLogin(ADMIN_USERNAME, true);
    } else {
      errEl.textContent = t("login.errPassword");
    }
    return;
  }

  const users = loadUsers();
  const user = users[name];
  if(!user){
    errEl.textContent = t("login.errUserNotFound");
    return;
  }
  const hashed = await sha256(pass);
  if(hashed !== user.passwordHash){
    errEl.textContent = t("login.errPassword");
    return;
  }
  completeLogin(name, true);
}

function completeLogin(username, showLoading){
  currentUser = username;
  try{ sessionStorage.setItem("gestionale_current_user", username); }catch(e){}

  // Tutte le variabili dati sono state inizializzate all'avvio dello
  // script quando currentUser era ancora null (chiave "_guest"). Ora che
  // sappiamo chi si è loggato, ricarichiamo tutto con la chiave corretta
  // per quell'account, così ogni utente vede solo i propri dati privati.
  RESOURCES = loadResources();
  customResourceColors = loadCustomColors();
  bookings = JSON.parse(safeGetInit());
  idCounter = computeMaxId(bookings) + 1;
  todos = loadTodos();

  document.getElementById("login-overlay").style.display = "none";
  document.getElementById("login-error").textContent = "";
  document.getElementById("login-username").value = "";
  document.getElementById("login-password").value = "";

  document.getElementById("users-toggle").style.display = isAdmin() ? "flex" : "none";
  document.getElementById("announce-toggle").style.display = "flex";
  const profileNameEl = document.getElementById("profile-name");
  if(profileNameEl) profileNameEl.textContent = username;

  refreshAnnouncementBadge();
  if(typeof switchView === "function") switchView("day");

  if(showLoading){
    showLoadingScreen();
    setTimeout(hideLoadingScreen, 3000);
  }
}

function showLoadingScreen(){
  const el = document.getElementById("loading-overlay");
  if(el) el.style.display = "flex";
}
function hideLoadingScreen(){
  const el = document.getElementById("loading-overlay");
  if(el) el.style.display = "none";
}

function doLogout(){
  currentUser = null;
  try{ sessionStorage.removeItem("gestionale_current_user"); }catch(e){}
  document.getElementById("login-overlay").style.display = "flex";
}

function tryRestoreSession(){
  let saved = null;
  try{ saved = sessionStorage.getItem("gestionale_current_user"); }catch(e){}
  if(saved === ADMIN_USERNAME){
    completeLogin(ADMIN_USERNAME);
    return true;
  }
  if(saved){
    const users = loadUsers();
    if(users[saved]){
      completeLogin(saved);
      return true;
    }
  }
  return false;
}

/* ---- Gestione utenti (solo Admin) ---- */
function openUsersPanel(){
  if(!isAdmin()) return;
  renderUsersManageList();
  document.getElementById("users-overlay").classList.add("open");
}
function closeUsersPanel(){
  document.getElementById("users-overlay").classList.remove("open");
}
function renderUsersManageList(){
  const listEl = document.getElementById("users-manage-list");
  listEl.innerHTML = "";
  const users = loadUsers();
  const names = Object.keys(users);

  if(names.length === 0){
    listEl.innerHTML = "<div class='todo-empty'>"+t("users.none")+"</div>";
    return;
  }

  names.forEach(name=>{
    const item = document.createElement("div");
    item.className = "res-manage-item";
    const isSpecial = name === SPECIAL_VIEWER_EMAIL;
    const canAnnounce = !!users[name].canAnnounce;
    item.innerHTML = `
      <span class="rm-dot" style="background:${isSpecial ? 'var(--accent)' : 'var(--text-muted)'};"></span>
      <span class="rm-name">${escapeHtml(name)}${isSpecial ? " <small>"+t("users.seesCheckmarks")+"</small>" : ""}</span>
      <label class="user-announce-toggle" title="Annunci">
        <input type="checkbox" ${canAnnounce ? "checked" : ""}> ${icon("megaphone",14)}
      </label>
      <span class="rm-delete" title="${t('detail.delete')}">${icon("trash",15)}</span>
    `;
    item.querySelector(".user-announce-toggle input").onchange = (e)=>{
      const u = loadUsers();
      if(u[name]){
        u[name].canAnnounce = e.target.checked;
        saveUsers(u);
      }
    };
    item.querySelector(".rm-delete").onclick = ()=>{
      const u = loadUsers();
      delete u[name];
      saveUsers(u);
      renderUsersManageList();
    };
    listEl.appendChild(item);
  });
}
async function addNewUser(){
  const nameInp = document.getElementById("new-user-name");
  const passInp = document.getElementById("new-user-pass");
  const name = nameInp.value.trim();
  const pass = passInp.value;

  if(!name || !pass){ alert(t("users.needBoth")); return; }
  if(name === ADMIN_USERNAME){ alert(t("users.reserved")); return; }

  const users = loadUsers();
  if(users[name]){ alert(t("users.exists")); return; }

  const passwordHash = await sha256(pass);
  users[name] = { passwordHash };
  saveUsers(users);

  nameInp.value = "";
  passInp.value = "";
  renderUsersManageList();
}
document.getElementById("users-overlay").addEventListener("click",(e)=>{

});

/* Intervallo orario mostrato nella timeline giornaliera: le ore fuori da
   questo intervallo (notte e prima mattina) non vengono visualizzate.
   Tutti i calcoli di posizione percentuale usano queste costanti. */
const TL_START_HOUR = 0;
const TL_END_HOUR = 24;
const TL_SPAN_HOURS = TL_END_HOUR - TL_START_HOUR;
/* Converte un'ora decimale (es. 13.5) nella sua posizione percentuale
   all'interno della timeline visibile, con clamp ai bordi. */
function hourToPct(h){
  const pct = (h - TL_START_HOUR) / TL_SPAN_HOURS * 100;
  return Math.max(0, Math.min(100, pct));
}

const DEFAULT_RESOURCES = ["1","2","3","4","5","6","7","8"];


let RESOURCES = loadResources();

const RESOURCE_COLORS = {
  "Sala C": ["#e0a800","#b88700"],
  "Furgone": ["#6c757d","#495157"],
  "Gazebo": ["#2b7fd6","#1c5aa0"],
  "Impianto audio": ["#8a4fd6","#6a35ab"],
  "Tavoli": ["#2ca86b","#1f8253"]
};
const AUTO_PALETTE = [
  ["#d6486f","#a8355a"], ["#3ba8a0","#297f78"], ["#c98a2b","#a06d1e"],
  ["#5b7fd6","#3f5cab"], ["#9a5bd6","#7440ab"], ["#5bb85b","#3f8f3f"]
];

let customResourceColors = loadCustomColors();

function loadCustomColors(){
  try{
    const raw = localStorage.getItem(userKey("gestionale_resource_colors"));
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {};
}
function saveCustomColors(){
  try{ localStorage.setItem(userKey("gestionale_resource_colors"), JSON.stringify(customResourceColors)); }catch(e){}
}
function darkenColor(hex, amount){
  hex = hex.replace("#","");
  const r = Math.max(0, parseInt(hex.substring(0,2),16) - amount);
  const g = Math.max(0, parseInt(hex.substring(2,4),16) - amount);
  const b = Math.max(0, parseInt(hex.substring(4,6),16) - amount);
  return "#" + [r,g,b].map(v=>v.toString(16).padStart(2,"0")).join("");
}
function setResourceColor(res, hex){
  customResourceColors[res] = [hex, darkenColor(hex, 35)];
  saveCustomColors();
}
function getResourceColor(res){
  if(customResourceColors[res]) return customResourceColors[res];
  if(RESOURCE_COLORS[res]) return RESOURCE_COLORS[res];
  let hash = 0;
  for(let i=0;i<res.length;i++) hash = (hash*31 + res.charCodeAt(i)) >>> 0;
  return AUTO_PALETTE[hash % AUTO_PALETTE.length];
}

function loadResources(){
  try{
    const raw = localStorage.getItem(userKey("gestionale_resources"));
    if(raw){
      const parsed = JSON.parse(raw);
      if(Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  }catch(e){}
  return DEFAULT_RESOURCES.slice();
}
function saveResources(){
  try{ localStorage.setItem(userKey("gestionale_resources"), JSON.stringify(RESOURCES)); }catch(e){}
}

function safeGetInit(){
  try{
    const raw = localStorage.getItem(userKey("gestionale_data_v2"));
    return raw || "{}";
  }catch(e){ return "{}"; }
}
function computeMaxId(b){
  let max = 0;
  Object.values(b).forEach(arr=>arr.forEach(x=>{ if(x.id>max) max=x.id; }));
  return max;
}
function persist(){
  try{
    localStorage.setItem(userKey("gestionale_data_v2"), JSON.stringify(bookings));
  }catch(e){ /* storage non disponibile, i dati restano solo in memoria per la sessione */ }
}

let bookings = JSON.parse(safeGetInit());
let idCounter = computeMaxId(bookings) + 1;

function fmtDate(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+day;
}
function todayDate(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function sameDay(a,b){ return fmtDate(a)===fmtDate(b); }

let currentView = "day";
let currentDate = todayDate();
let selectedResource = RESOURCES[0];
let openWeekDayKey = null;

function onSearchInput(){
  const q = document.getElementById("search-input").value.trim().toLowerCase();
  const resFilter = document.getElementById("search-resource-filter").value;
  const clearBtn = document.getElementById("search-clear");
  const resultsEl = document.getElementById("search-results");

  clearBtn.style.display = q ? "flex" : "none";

  if(!q && !resFilter){
    resultsEl.style.display = "none";
    return;
  }

  const matches = [];
  Object.keys(bookings).forEach(key=>{
    (bookings[key]||[]).forEach(it=>{
      const matchesText = !q || it.label.toLowerCase().includes(q) || it.res.toLowerCase().includes(q);
      const matchesRes = !resFilter || it.res === resFilter;
      if(matchesText && matchesRes){
        matches.push({key, item:it});
      }
    });
  });
  matches.sort((a,b)=> a.key.localeCompare(b.key) || a.item.start-b.item.start);

  resultsEl.innerHTML = "";
  resultsEl.style.display = "block";

  if(matches.length === 0){
    resultsEl.innerHTML = "<div class='search-no-results'>"+t("search.noResults")+"</div>";
    return;
  }

  matches.slice(0,30).forEach(m=>{
    const d = new Date(m.key+"T00:00:00");
    const dateStr = d.toLocaleDateString(currentLocale(),{day:"numeric",month:"short",year:"numeric"});
    const row = document.createElement("div");
    row.className = "search-result-item";
    row.innerHTML = "<span class='sr-label'>"+escapeHtml(m.item.label)+"</span><span class='sr-meta'>"+escapeHtml(m.item.res)+" · "+dateStr+" · "+fmtHourLabel(m.item.start)+"–"+fmtHourLabel(m.item.end)+"</span>";
    row.onclick = ()=>{ showEventDetail(m.key, m.item.id); };
    resultsEl.appendChild(row);
  });
}

function clearSearch(){
  document.getElementById("search-input").value = "";
  document.getElementById("search-resource-filter").value = "";
  document.getElementById("search-clear").style.display = "none";
  document.getElementById("search-results").style.display = "none";
}

function toggleSearchBar(){
  const bar = document.getElementById("search-bar");

  if(isOpen){

  const btnList = document.getElementById("dvt-list");

  document.getElementById("tab-agenda").classList.toggle("active", view==="agenda");

  const dateToShow = (currentView === "day") ? currentDate : todayDate();
  showMonthDayDetail(dateToShow);
  updateRightColOffset();
}

function navPrev(){
  if(currentView==="day"){ currentDate.setDate(currentDate.getDate()-1); }
  else if(currentView==="week"){ currentDate.setDate(currentDate.getDate()-7); }
  else { currentDate.setMonth(currentDate.getMonth()-1); }
  renderAll();
  refreshSidePanel();
}
function navNext(){
  if(currentView==="day"){ currentDate.setDate(currentDate.getDate()+1); }
  else if(currentView==="week"){ currentDate.setDate(currentDate.getDate()+7); }
  else { currentDate.setMonth(currentDate.getMonth()+1); }
  renderAll();
  refreshSidePanel();
}
function goToday(){
